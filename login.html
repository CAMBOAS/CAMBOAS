<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Login — CAMBO MINI</title>
  <link rel="icon" type="image/png" href="images/logo/LOGO%20CAMBOMINI.png">
  <link rel="shortcut icon" type="image/png" href="images/logo/LOGO%20CAMBOMINI.png">
  <link rel="apple-touch-icon" href="images/logo/LOGO%20CAMBOMINI.png">
  <meta name="description" content="CAMBO MINI — Premium Workspace">
  <link rel="stylesheet" href="assets/css/templatemo-glass-admin-style.css?v=160">
  <style>
    .login-error {
      display:none; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3);
      color:#fca5a5; border-radius:12px; padding:10px 14px; font-size:13px;
      margin-bottom:12px; text-align:center;
    }
    [data-theme="light"] .login-error { background:rgba(239,68,68,.07); color:#dc2626; border-color:rgba(239,68,68,.2); }
    .login-error.show { display:block; }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    .login-spinner { display:none; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-primary.loading .login-spinner { display:inline-block; }
    .btn-primary.loading .btn-arrow { display:none; }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-page">
    <button class="theme-toggle-float" id="theme-toggle" title="Toggle Light/Dark Mode">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/>
        <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
        <path d="M2 12h2"/><path d="M20 12h2"/>
        <path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo" style="background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;font-weight:800;font-size:22px">C</div>
          <h1 class="login-title">CAMBO MINI</h1>
          <p class="login-subtitle">ចូលប្រើប្រាស់ Workspace របស់អ្នក</p>
        </div>

        <div class="login-error" id="loginError">Account ឬ Password មិនត្រូវ — សូមព្យាយាមម្ដងទៀត</div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="loginAccount">Account</label>
            <input type="text" id="loginAccount" class="form-input" placeholder="Enter your account" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <div class="form-row">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" checked> Remember me
            </label>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">
            Sign In
            <span class="btn-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </span>
            <span class="login-spinner"></span>
          </button>
        </form>
      </div>
    </div>

    <footer class="site-footer">
      <p>Copyright © 2026 CAMBO MINI</p>
    </footer>
  </div>

  <script src="assets/js/cambo-api.js?v=160"></script>
  <script src="assets/js/auth.js?v=160"></script>
  <script>
  (function () {
    // If login not required → skip login page
    if (window.CamboAuth && !window.CamboAuth.isLoginRequired()) {
      location.replace('index.html');
      return;
    }
    // If already logged in → skip
    if (window.CamboAuth && window.CamboAuth.isLoggedIn()) {
      location.replace('index.html');
      return;
    }

    var form    = document.getElementById('loginForm');
    var btn     = document.getElementById('loginBtn');
    var errBox  = document.getElementById('loginError');

    function showError(msg) {
      errBox.textContent = msg || 'Account ឬ Password មិនត្រូវ';
      errBox.classList.add('show');
    }
    function hideError() { errBox.classList.remove('show'); }

    function setLoading(on) {
      btn.disabled = on;
      btn.classList.toggle('loading', on);
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      hideError();
      var account  = document.getElementById('loginAccount').value.trim();
      var password = document.getElementById('loginPassword').value;
      var remember = document.getElementById('rememberMe').checked;
      if (!account || !password) return;

      setLoading(true);
      window.CamboAuth.verify(account, password).then(function (ok) {
        setLoading(false);
        if (ok) {
          window.CamboAuth.setLoggedIn(remember);
          location.replace('index.html');
        } else {
          showError('Account ឬ Password មិនត្រូវ — សូមព្យាយាមម្ដងទៀត');
          document.getElementById('loginPassword').value = '';
          document.getElementById('loginPassword').focus();
        }
      }).catch(function () {
        setLoading(false);
        showError('មានបញ្ហា Connection — សូម Check Internet');
      });
    });
  })();
  </script>
  <script src="assets/js/dashboard-layout.js?v=160"></script>
  <script src="assets/js/sw-register.js?v=160"></script>
</body>
</html>
