<!DOCTYPE html>
<html lang="km">
<head>
  <script>(function(){var r=localStorage.getItem('cambo_login_required');if(r==='false')return;var k='cambo_session';if(sessionStorage.getItem(k)==='1'||localStorage.getItem(k)==='1')return;document.documentElement.style.visibility='hidden';location.replace('../login.html');})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Daily Report - CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="shortcut icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="apple-touch-icon" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=158">
  <link rel="stylesheet" href="../assets/css/main.css?v=158">
  <style>
  .dr-wrap { display:grid; gap:18px; padding:4px 0 12px; grid-template-columns:minmax(0,1fr) }

  /* ── Filter Bar ── */
  .dr-filter { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:14px 20px; border-radius:20px; overflow:visible !important; min-width:0; width:100%; box-sizing:border-box }
  .dr-filter-left { display:flex; flex-direction:column; gap:2px; min-width:0; overflow:hidden }
  .dr-filter-left h2 { margin:0; font-size:17px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .dr-filter-left p { margin:0; font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .dr-filter-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; overflow:visible; flex-shrink:0 }

  /* ── Filter Buttons ── */
  .dr-btn { display:inline-flex; align-items:center; gap:6px; height:38px; padding:0 14px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text); font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; transition:background .12s; white-space:nowrap }
  .dr-btn:hover { background:rgba(255,255,255,.08) }
  [data-theme="light"] .dr-btn { background:#fff }
  [data-theme="light"] .dr-btn:hover { background:#f1f5f9 }
  .dr-btn svg { opacity:.55; flex-shrink:0 }
  .dr-btn .chev { transition:transform .2s }
  .dr-btn.open .chev { transform:rotate(180deg) }

  /* ── Date Input ── */
  /* ── Date range pill button ── */
  .dr-date-pill { position:relative; display:inline-flex; align-items:center }
  .dr-date-pill-btn {
    display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 14px;
    border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.04);
    color:var(--text); font-size:12px; font-weight:700; font-family:inherit;
    cursor:pointer; outline:none; white-space:nowrap; transition:border-color .15s, background .15s;
  }
  .dr-date-pill-btn:hover,.dr-date-pill-btn.open { border-color:#8b5cf6; background:rgba(139,92,246,.08) }
  [data-theme="light"] .dr-date-pill-btn { background:#fff }
  [data-theme="light"] .dr-date-pill-btn:hover,[data-theme="light"] .dr-date-pill-btn.open { background:rgba(109,40,217,.06) }
  .dr-date-pill-icon { opacity:.55; flex-shrink:0 }
  .dr-date-pill-label { font-weight:800; color:var(--text) }
  .dr-date-pill-sub { font-size:10px; font-weight:600; opacity:.5; margin-left:2px }
  /* Popup — compact single column */
  .dr-date-pop {
    position:fixed; z-index:9999; background:#1a2235; border:1px solid rgba(139,92,246,.25);
    border-radius:16px; padding:12px; box-shadow:0 12px 36px rgba(0,0,0,.5);
    display:none; flex-direction:column; gap:10px; width:290px;
  }
  .dr-date-pop.show { display:flex }
  [data-theme="light"] .dr-date-pop { background:#fff; border-color:rgba(109,40,217,.15); box-shadow:0 6px 24px rgba(0,0,0,.12) }
  /* Presets grid */
  .dr-date-presets { display:grid; grid-template-columns:1fr 1fr; gap:4px }
  .dr-preset-btn {
    padding:6px 10px; border-radius:8px; border:1px solid transparent;
    background:rgba(255,255,255,.05); color:#94a3b8;
    font-size:11.5px; font-weight:600; font-family:inherit;
    cursor:pointer; text-align:center; transition:all .12s; white-space:nowrap;
  }
  [data-theme="light"] .dr-preset-btn { background:#f1f5f9; color:#475569 }
  .dr-preset-btn:hover { background:rgba(139,92,246,.15); color:#c4b5fd; border-color:rgba(139,92,246,.2) }
  [data-theme="light"] .dr-preset-btn:hover { background:rgba(109,40,217,.08); color:#6d28d9 }
  .dr-preset-btn.active { background:rgba(139,92,246,.22); color:#c4b5fd; border-color:rgba(139,92,246,.4); font-weight:700 }
  [data-theme="light"] .dr-preset-btn.active { background:rgba(109,40,217,.1); color:#6d28d9; border-color:rgba(109,40,217,.25) }
  .dr-preset-btn.full { grid-column:span 2 }
  /* Divider */
  .dr-date-pop-div { height:1px; background:rgba(148,163,200,.12) }
  /* Custom inputs row */
  .dr-date-inputs { display:flex; align-items:center; gap:6px }
  .dr-date-inputs input[type="date"] {
    flex:1; height:34px; padding:0 8px; border-radius:9px; border:1px solid rgba(148,163,200,.2);
    background:rgba(255,255,255,.06); color:var(--text); font-size:12px; font-weight:700;
    font-family:inherit; cursor:pointer; outline:none; box-sizing:border-box; min-width:0;
  }
  [data-theme="light"] .dr-date-inputs input[type="date"] { background:#f8fafc; border-color:#e2e8f0; color:#0f172a }
  .dr-date-inputs input[type="date"]:focus { border-color:#8b5cf6 }
  .dr-date-inputs-sep { font-size:11px; font-weight:700; color:var(--muted); flex-shrink:0 }
  /* Footer */
  .dr-date-pop-foot { display:flex; justify-content:flex-end; gap:6px }
  .dr-date-pop-apply {
    height:32px; padding:0 16px; border-radius:8px; border:none;
    background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff;
    font-size:12px; font-weight:700; font-family:inherit; cursor:pointer;
  }
  .dr-date-pop-apply:hover { opacity:.88 }
  .dr-date-pop-cancel {
    height:32px; padding:0 10px; border-radius:8px; border:1px solid rgba(148,163,200,.2);
    background:transparent; color:var(--muted); font-size:12px; font-weight:600;
    font-family:inherit; cursor:pointer;
  }

  /* ── Page dropdown ── */
  .dr-page-wrap { position:relative; }
  .dr-page-menu {
    display:none; position:fixed; z-index:99999;
    background:#1e1b2e; border:1px solid rgba(139,92,246,.25); border-radius:14px;
    padding:6px; box-shadow:0 12px 40px rgba(0,0,0,.45);
    min-width:200px; max-width:260px; max-height:340px; overflow-y:auto;
    flex-direction:column; gap:2px;
  }
  [data-theme="light"] .dr-page-menu { background:#fff; border-color:rgba(0,0,0,.1); box-shadow:0 8px 32px rgba(0,0,0,.15) }
  .dr-page-menu.show { display:flex }
  .dr-menu-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 12px; border-radius:10px; border:none; background:none;
    color:#e2e8f0; font-size:13px; font-family:inherit; cursor:pointer;
    transition:background .12s; text-align:left; width:100%;
  }
  [data-theme="light"] .dr-menu-item { color:#1e293b }
  .dr-menu-item:hover { background:rgba(139,92,246,.15) }
  .dr-menu-item.active { background:rgba(139,92,246,.2); color:#c4b5fd; font-weight:700 }
  [data-theme="light"] .dr-menu-item.active { background:rgba(139,92,246,.1); color:#7c3aed }
  /* Checkbox visual */
  .dr-menu-cb {
    width:16px; height:16px; border-radius:5px; border:1.5px solid rgba(148,163,184,.4);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px;
  }
  .dr-menu-item.active .dr-menu-cb { background:#8b5cf6; border-color:#8b5cf6; color:#fff; }
  [data-theme="light"] .dr-menu-item.active .dr-menu-cb { background:#7c3aed; border-color:#7c3aed; }
  .dr-menu-pg-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .dr-menu-divider { height:1px; background:rgba(148,163,184,.15); margin:4px 6px }
  /* Selected count badge on button */
  .dr-page-count { display:none; background:#8b5cf6; color:#fff; font-size:10px; font-weight:800; padding:1px 6px; border-radius:999px; margin-left:2px }
  .dr-page-count.show { display:inline-flex }

  /* ── Actions button ── */
  .dr-act-wrap { position:relative }
  .dr-act-btn {
    display:flex; align-items:center; justify-content:center; gap:6px;
    height:38px; padding:0 14px; border-radius:12px;
    border:1px solid var(--line); background:rgba(255,255,255,.04);
    color:var(--text); font-size:13px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:border-color .15s, background .15s; white-space:nowrap;
  }
  .dr-act-btn:hover,.dr-act-btn.open { border-color:#8b5cf6; background:rgba(139,92,246,.08) }
  [data-theme="light"] .dr-act-btn { background:#fff }
  [data-theme="light"] .dr-act-btn:hover,[data-theme="light"] .dr-act-btn.open { background:rgba(109,40,217,.06) }
  .dr-act-drop {
    position:fixed; z-index:9999; background:#1a2235; border:1px solid rgba(139,92,246,.25);
    border-radius:14px; padding:6px; box-shadow:0 12px 36px rgba(0,0,0,.5);
    display:none; flex-direction:column; gap:2px; min-width:200px;
  }
  .dr-act-drop.show { display:flex }
  [data-theme="light"] .dr-act-drop { background:#fff; border-color:rgba(109,40,217,.15); box-shadow:0 6px 24px rgba(0,0,0,.12) }
  .dr-act-item {
    display:flex; align-items:center; gap:10px; padding:9px 12px;
    border-radius:9px; border:none; background:none;
    color:#e2e8f0; font-size:13px; font-weight:600; font-family:inherit;
    cursor:pointer; text-align:left; width:100%; transition:background .1s;
  }
  [data-theme="light"] .dr-act-item { color:#1e293b }
  .dr-act-item:hover { background:rgba(139,92,246,.15); color:#c4b5fd }
  [data-theme="light"] .dr-act-item:hover { background:rgba(109,40,217,.08); color:#6d28d9 }
  .dr-act-item svg { flex-shrink:0; opacity:.7 }

  /* ── Refresh ── */
  .dr-refresh {
    display:flex; align-items:center; gap:6px; height:38px; padding:0 16px;
    border-radius:12px; background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    border:none; color:#fff; font-size:13px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:opacity .15s; white-space:nowrap;
  }
  .dr-refresh:hover { opacity:.88 }
  .dr-refresh.loading { opacity:.6; pointer-events:none }
  .dr-refresh svg { flex-shrink:0 }

  /* ── KPI Cards ── */
  .dr-kpi { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px }
  .kpi-c { padding:18px 20px; border-radius:20px; position:relative; overflow:hidden }
  .kpi-c::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:20px 20px 0 0 }
  .kpi-c.kc1::before { background:linear-gradient(90deg,#06b6d4,#22d3ee) }
  .kpi-c.kc2::before { background:linear-gradient(90deg,#8b5cf6,#a78bfa) }
  .kpi-c.kc3::before { background:linear-gradient(90deg,#10b981,#34d399) }
  .kpi-c.kc4::before { background:linear-gradient(90deg,#f59e0b,#fbbf24) }
  .kpi-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px }
  .kpi-ico { width:40px; height:40px; border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0 }
  .kpi-ico svg { width:20px; height:20px }
  .kc1 .kpi-ico { background:rgba(6,182,212,.15); color:#22d3ee }
  .kc2 .kpi-ico { background:rgba(139,92,246,.15); color:#a78bfa }
  .kc3 .kpi-ico { background:rgba(16,185,129,.15); color:#34d399 }
  .kc4 .kpi-ico { background:rgba(245,158,11,.15); color:#fbbf24 }
  .kpi-lbl { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted) }
  .kpi-val { font-size:26px; font-weight:800; color:var(--text); line-height:1; margin-top:2px }
  .kpi-note { font-size:11px; color:var(--muted); margin-top:6px }

  /* ── Order List ── */
  .dr-orders-card { padding:16px 20px; border-radius:20px }
  .dr-orders-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px }
  .dr-orders-head h3 { margin:0; font-size:15px; font-weight:800; color:var(--text) }
  .dr-orders-head p { margin:0; font-size:11px; color:var(--muted) }
  .dr-orders-search { display:flex; align-items:center; gap:8px }
  .dr-search-box {
    position:relative; width:200px;
  }
  .dr-search-box input {
    width:100%; height:34px; padding:0 12px 0 32px; border-radius:10px;
    border:1px solid var(--line); background:rgba(255,255,255,.05);
    color:var(--text); font-size:12px; font-family:inherit; outline:none; box-sizing:border-box;
  }
  [data-theme="light"] .dr-search-box input { background:#fff }
  .dr-search-box svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none }

  .dr-orders-empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px }
  .dr-orders-empty svg { opacity:.3; margin-bottom:12px }

  /* ── Order Table ── */
  .dr-table-wrap { overflow-x:auto; max-height:calc(100vh - 320px); scrollbar-width:thin; scrollbar-color:rgba(148,163,200,.15) transparent }
  .dr-table { width:100%; border-collapse:collapse; border-spacing:0; min-width:600px; font-size:13px; table-layout:fixed }
  .dr-table thead th {
    position:sticky; top:0; z-index:10;
    padding:8px 10px; background:rgba(9,15,35,.97);
    border-bottom:2px solid rgba(148,163,200,.15);
    font-size:10.5px; font-weight:800; letter-spacing:.06em;
    color:var(--muted); text-transform:uppercase;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    vertical-align:middle; text-align:left;
  }
  [data-theme="light"] .dr-table thead th { background:#f8fafc; border-bottom-color:rgba(148,163,184,.18); color:#64748b }
  .dr-table tbody td {
    padding:9px 10px; border-bottom:1px solid rgba(148,163,200,.07);
    color:var(--text); vertical-align:middle;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-size:12.5px;
  }
  [data-theme="light"] .dr-table tbody td { border-bottom-color:rgba(148,163,184,.1) }
  .dr-table tbody tr { cursor:pointer; transition:background .12s }
  .dr-table tbody tr.dr-tr-main:hover td { background:rgba(139,92,246,.06) }
  [data-theme="light"] .dr-table tbody tr.dr-tr-main:hover td { background:rgba(99,102,241,.05) }
  .dr-table tbody tr:last-child td { border-bottom:none }
  .dr-table .dr-col-num  { width:34px; text-align:center }
  .dr-table .dr-col-cust { width:130px }
  .dr-table .dr-col-phone   { width:105px }
  .dr-table .dr-col-prod    { width:160px; white-space:normal !important; line-height:1.4 }
  .dr-table .dr-col-page    { width:100px }
  .dr-table .dr-col-closeby { width:90px }
  .dr-table .dr-col-delfee  { width:72px }
  .dr-table .dr-col-tot     { width:80px; text-align:right; padding-right:16px !important }
  .dr-table .dr-col-date    { width:90px; text-align:center; font-size:12px; color:var(--muted); white-space:nowrap }
  .dr-table .dr-col-st      { width:80px }
  .dr-th-inner { display:inline-flex; align-items:center; gap:5px; line-height:1 }
  .dr-th-inner svg { flex-shrink:0; opacity:.7 }

  /* Cell helpers */
  .dr-tc-num  { font-size:11px; font-weight:800; color:var(--muted); text-align:center }
  .dr-tc-cust { font-weight:700 }
  .dr-tc-phone{ color:#60a5fa; font-size:12px }
  [data-theme="light"] .dr-tc-phone { color:#2563eb }
  .dr-tc-prod-main { font-size:12px; font-weight:600 }
  .dr-tc-prod-more { font-size:11px; color:#8b5cf6; font-weight:700; display:inline; margin-left:4px }
  [data-theme="light"] .dr-tc-prod-more { color:#7c3aed }
  .dr-tc-page { font-size:12px; font-weight:600; color:var(--muted); white-space:nowrap }
  .dr-tc-tot  { font-weight:800; color:#7dd3fc; text-align:right }
  [data-theme="light"] .dr-tc-tot { color:#4f46e5 }
  .dr-tc-badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700 }
  .dr-tc-badge.st-done    { background:rgba(16,185,129,.12); color:#34d399 }
  .dr-tc-badge.st-pending { background:rgba(245,158,11,.12); color:#fbbf24 }
  .dr-tc-badge.st-cancel  { background:rgba(239,68,68,.12); color:#f87171 }
  .dr-tc-badge.st-other   { background:rgba(148,163,184,.1); color:var(--muted) }
  [data-theme="light"] .dr-tc-badge.st-done    { background:rgba(34,197,94,.1); color:#16a34a }
  [data-theme="light"] .dr-tc-badge.st-pending { background:rgba(245,158,11,.1); color:#d97706 }
  [data-theme="light"] .dr-tc-badge.st-cancel  { background:rgba(239,68,68,.1); color:#dc2626 }

  /* Detail expand row */
  .dr-tr-detail { display:none }
  .dr-tr-detail.open { display:table-row }
  .dr-tr-detail td { background:rgba(0,0,0,.025) !important; padding:12px 14px 14px !important; white-space:normal !important; cursor:default }
  [data-theme="light"] .dr-tr-detail td { background:rgba(0,0,0,.015) !important }
  .dr-chevron { transition:transform .2s; opacity:.45; vertical-align:middle }
  .dr-tr-main.open .dr-chevron { transform:rotate(180deg) }
  .dr-tr-main.open td { border-bottom:none }

  /* Footer */
  .dr-table-footer { padding:10px 14px; border-top:1px solid rgba(148,163,200,.08); font-size:12px; color:var(--muted) }
  [data-theme="light"] .dr-table-footer { border-top-color:rgba(148,163,184,.12) }

  /* Hide phone col on narrow mobile */
  @media(max-width:500px) { .dr-col-phone { display:none } }

  /* Order meta row */
  .dr-meta-row { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:14px; padding:10px 14px; border-radius:10px; background:rgba(148,163,184,.06); border:1px solid rgba(148,163,184,.1) }
  [data-theme="light"] .dr-meta-row { background:rgba(0,0,0,.03); border-color:rgba(0,0,0,.06) }
  .dr-meta-item { display:flex; flex-direction:column; gap:3px; min-width:70px }
  .dr-meta-lbl { font-size:10px; font-weight:700; color:var(--muted); opacity:.75 }
  .dr-meta-val { font-size:13px; font-weight:700; color:var(--text) }

  /* Items table */
  .dr-items-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:8px }
  .dr-item-row {
    display:grid; grid-template-columns:1fr auto auto auto;
    gap:8px; align-items:center;
    padding:8px 10px; border-radius:10px; margin-bottom:4px;
    background:rgba(255,255,255,.04); border:1px solid rgba(148,163,184,.1);
  }
  [data-theme="light"] .dr-item-row { background:#f8fafc; border-color:#e2e8f0 }
  .dr-item-name { font-size:13px; font-weight:700; color:var(--text) }
  .dr-item-qty { font-size:12px; font-weight:700; color:var(--muted); background:rgba(148,163,184,.12); padding:2px 8px; border-radius:6px; text-align:center }
  .dr-item-price { font-size:12px; font-weight:700; color:var(--muted); text-align:right }
  .dr-item-sub { font-size:13px; font-weight:800; color:#10b981; text-align:right }
  [data-theme="light"] .dr-item-sub { color:#059669 }
  .dr-items-total { display:flex; justify-content:flex-end; gap:12px; align-items:center; margin-top:8px; padding-top:8px; border-top:1px dashed rgba(148,163,184,.2) }
  .dr-items-total-lbl { font-size:11px; font-weight:700; color:var(--muted) }
  .dr-items-total-val { font-size:15px; font-weight:800; color:#8b5cf6 }

  /* Note */
  .dr-note { margin-top:8px; padding:8px 10px; border-radius:8px; font-size:12px; color:var(--muted); background:rgba(245,158,11,.06); border:1px solid rgba(245,158,11,.15) }

  /* ── Product Summary ── */
  /* ── Products section (full-width, compact) ── */
  .dr-prod-card { padding:14px 16px; border-radius:16px; margin-top:0 }
  .dr-prod-head { margin-bottom:10px; display:flex; align-items:center; justify-content:space-between }
  .dr-prod-head h3 { margin:0 0 1px; font-size:13px; font-weight:800; color:var(--text) }
  .dr-prod-head p { margin:0; font-size:10px; color:var(--muted) }

  @media(max-width:1200px) { .dr-prod-grid { grid-template-columns:repeat(4,minmax(0,1fr)) } }
  @media(max-width:900px)  { .dr-prod-grid { grid-template-columns:repeat(3,minmax(0,1fr)) } }
  @media(max-width:600px)  { .dr-prod-grid { grid-template-columns:repeat(2,minmax(0,1fr)) } }
  @media(max-width:400px)  { .dr-prod-grid { grid-template-columns:1fr } }
  .dr-prod-row {
    display:flex; flex-direction:column; gap:4px; padding:8px 10px;

<script>
(function(){
  'use strict';

  /* ── KHR Rate (shared with products page) ── */
  var KHR_RATE = (function(){ try { var r = Number(localStorage.getItem('cambo_khr_rate')); return r > 0 ? r : 4100; } catch(e) { return 4100; } })();

  /* ── State ── */
  var allOrders      = [];
  var filteredOrders = [];
  var selectedPages  = [];   /* empty = all */
  var dateFrom       = '';
  var dateTo         = '';
  var searchQuery    = '';
  var _dataReady     = false;

  /* ── Helpers ── */
  function pad(n) { return String(n).padStart(2,'0'); }
  function todayYMD() {
    var d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }
  function fmtMoney(v) { var n = Number(v||0); return '$' + n.toFixed(2).replace(/\.00$/,''); }
  function fmtMoneyFull(v) { var n = Number(v||0); return '$' + n.toFixed(2); }
  function fmtDate(ymd) { if(!ymd) return '-'; var p=ymd.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function calcOrderTotal(o) {
    var prod = (o.products||[]).reduce(function(s,p){ return s + (Number(p.qty||0)*Number(p.price||0)) - Number(p.discount||0); }, 0);
    return prod + Number(o.deliveryFee||0);
  }
  function totalItems(o) { return (o.products||[]).reduce(function(s,p){ return s + Number(p.qty||0); }, 0); }
  function statusClass(s) {
    var lower = String(s||'').toLowerCase();
    if (lower.includes('done') || lower.includes('delivered') || lower.includes('success')) return 'st-done';
    if (lower.includes('cancel') || lower.includes('reject')) return 'st-cancel';
    if (lower.includes('pending') || lower.includes('wait')) return 'st-pending';
    return 'st-other';
  }

  /* ── Date pill popup with presets ── */
  dateFrom = dateTo = todayYMD();
  var _activePreset = 'today';

  // Helper: add/subtract days from YYYY-MM-DD
  function _ymdLocal(d) {
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }
  function _addDays(ymd, n) {
    var d = new Date(ymd + 'T00:00:00'); d.setDate(d.getDate() + n);
    return _ymdLocal(d);
  }
  function _startOfWeek(ymd) {
    var d = new Date(ymd + 'T00:00:00'), day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); // Mon
    return _ymdLocal(d);
  }
  function _startOfMonth(ymd) { return ymd.slice(0,7) + '-01'; }
  function _endOfMonth(ymd) {
    var p = ymd.split('-'), d = new Date(+p[0], +p[1], 0);
    return _ymdLocal(d);
  }

  var _PRESETS = [
    { id:'today',      label:'Today',        fn: function(t){ return {f:t,to:t}; } },
    { id:'yesterday',  label:'Yesterday',    fn: function(t){ var y=_addDays(t,-1); return {f:y,to:y}; } },
    { id:'last7',      label:'Last 7 Days',  fn: function(t){ return {f:_addDays(t,-6),to:t}; } },
    { id:'last14',     label:'Last 14 Days', fn: function(t){ return {f:_addDays(t,-13),to:t}; } },
    { id:'last28',     label:'Last 28 Days', fn: function(t){ return {f:_addDays(t,-27),to:t}; } },
    { id:'last30',     label:'Last 30 Days', fn: function(t){ return {f:_addDays(t,-29),to:t}; } },
    { id:'thisweek',   label:'This Week',    fn: function(t){ return {f:_startOfWeek(t),to:t}; } },
    { id:'thismonth',  label:'This Month',   fn: function(t){ return {f:_startOfMonth(t),to:t}; } },
    { id:'lastmonth',  label:'Last Month',   fn: function(t){
      var p=t.split('-'),y=+p[0],m=+p[1]-1;
      if(m<1){m=12;y--;} var my=y+'-'+(m<10?'0':'')+m;
      return {f:_startOfMonth(my+'-01'),to:_endOfMonth(my+'-01')};
    }},
  ];

  // Build compact popup HTML
  var _datePop = document.createElement('div');
  _datePop.className = 'dr-date-pop';
  var presetsHTML = '<div class="dr-date-presets">';
  _PRESETS.forEach(function(p){
    var full = (p.id==='thisweek'||p.id==='thismonth'||p.id==='lastmonth') ? ' full' : '';
    presetsHTML += '<button class="dr-preset-btn'+full+(p.id==='today'?' active':'')+'" data-preset="'+p.id+'">'+p.label+'</button>';
  });
  presetsHTML += '</div>';
  var customHTML =
    '<div class="dr-date-pop-div"></div>' +
    '<div class="dr-date-inputs">' +
      '<input type="date" id="drDateFrom">' +
      '<span class="dr-date-inputs-sep">→</span>' +
      '<input type="date" id="drDateTo">' +
    '</div>' +
    '<div class="dr-date-pop-foot">' +
      '<button class="dr-date-pop-cancel" id="drDateCancel">Cancel</button>' +
      '<button class="dr-date-pop-apply" id="drDateApply">Apply</button>' +
    '</div>';
  _datePop.innerHTML = presetsHTML + customHTML;
  document.body.appendChild(_datePop);

  var _pillBtn   = document.getElementById('drDatePillBtn');
  var _pillLabel = document.getElementById('drPillLabel');
  var _pillSub   = document.getElementById('drPillSub');
  var inputFrom  = document.getElementById('drDateFrom');
  var inputTo    = document.getElementById('drDateTo');

  function _fmtShort(ymd) {
    if(!ymd) return '—';
    var p=ymd.split('-'); return p[2]+'/'+p[1];
  }
  function _updatePill() {
    var preset = _PRESETS.find(function(p){ return p.id===_activePreset; });
    if(preset) {
      _pillLabel.textContent = preset.label;
      _pillSub.textContent = (dateFrom===dateTo) ? _fmtShort(dateFrom) : _fmtShort(dateFrom)+' → '+_fmtShort(dateTo);
    } else {
      _pillLabel.textContent = (dateFrom===dateTo) ? _fmtShort(dateFrom) : _fmtShort(dateFrom)+' → '+_fmtShort(dateTo);
      _pillSub.textContent = '';
    }
  }
  function _applyPreset(id) {
    var today = todayYMD();
    var preset = _PRESETS.find(function(p){ return p.id===id; });
    if(!preset) return;
    var r = preset.fn(today);
    dateFrom=r.f; dateTo=r.to;
    _activePreset=id;
    inputFrom.value=dateFrom; inputTo.value=dateTo;
    _datePop.querySelectorAll('.dr-preset-btn').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-preset')===id);
    });
    _updatePill();
    applyFilters();
  }
  function _openDatePop() {
    _drCloseAllPopups();
    inputFrom.value = _activePreset ? '' : dateFrom;
    inputTo.value   = _activePreset ? '' : dateTo;
    var r=_pillBtn.getBoundingClientRect(), popW=290;
    var left=r.right-popW;
    if(left<8) left=8;
    if(left+popW>window.innerWidth-8) left=window.innerWidth-popW-8;
    _datePop.style.top=(r.bottom+6)+'px';
    _datePop.style.left=left+'px';
    _datePop.classList.add('show');
    _pillBtn.classList.add('open');
  }
  function _closeDatePop() {
    _datePop.classList.remove('show');
    _pillBtn.classList.remove('open');
  }
  function _drCloseAllPopups() {
    _closeDatePop();
    var pm = document.getElementById('drPageMenu'), pb = document.getElementById('drPageBtn');
    if(pm){ pm.classList.remove('show'); } if(pb){ pb.classList.remove('open'); }
    var ad = document.getElementById('drActDrop'), ab = document.getElementById('drActBtn');
    if(ad){ ad.classList.remove('show'); } if(ab){ ab.classList.remove('open'); }
  }

  // Init: Today
  _applyPreset('today');

  _pillBtn.addEventListener('click', function(e){
    e.stopPropagation();
    _datePop.classList.contains('show') ? _closeDatePop() : _openDatePop();
  });
  _datePop.querySelectorAll('.dr-preset-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      _applyPreset(this.getAttribute('data-preset'));
    });
  });
  document.getElementById('drDateCancel').addEventListener('click', _closeDatePop);
  document.getElementById('drDateApply').addEventListener('click', function(){
    var f=inputFrom.value, t=inputTo.value;
    if(!f){ _closeDatePop(); return; }
    if(!t) t=f;          // To empty → same day as From
    if(f>t) t=f;
    dateFrom=f; dateTo=t; _activePreset=null;
    _updatePill(); _closeDatePop(); applyFilters();
  });
  inputFrom.addEventListener('change', function(){ _activePreset=null; });
  inputTo.addEventListener('change',   function(){ _activePreset=null; });
  _datePop.addEventListener('click', function(e){ e.stopPropagation(); });
  document.addEventListener('click', _closeDatePop);
  window.addEventListener('scroll', _closeDatePop, true);

  /* ── Page dropdown ── */
  var pageBtn   = document.getElementById('drPageBtn');
  var pageMenu  = document.getElementById('drPageMenu');
  var pageLbl   = document.getElementById('drPageLabel');
  var pageCnt   = document.getElementById('drPageCount');
  var _allPages = [];

  function buildPageMenu(pages) {
    _allPages = pages;
    pageMenu.innerHTML = '';

    /* "All" row */
    var allIsActive = selectedPages.length === 0;
    var allBtn = document.createElement('button');
    allBtn.className = 'dr-menu-item' + (allIsActive ? ' active' : '');
    allBtn.innerHTML =
      '<span class="dr-menu-cb">' + (allIsActive ? '✓' : '') + '</span>' +
      '<span class="dr-menu-pg-name">All Pages</span>';
    allBtn.addEventListener('click', function(e){
      e.stopPropagation();
      selectedPages = [];
      updatePageLabel();
      buildPageMenu(pages);
      applyFilters();
    });
    pageMenu.appendChild(allBtn);

    if (pages.length) {
      var div = document.createElement('div');
      div.className = 'dr-menu-divider';
      pageMenu.appendChild(div);
    }

    pages.forEach(function(pg){
      var isActive = selectedPages.indexOf(pg) >= 0;
      var btn = document.createElement('button');
      btn.className = 'dr-menu-item' + (isActive ? ' active' : '');
      btn.innerHTML =
        '<span class="dr-menu-cb">' + (isActive ? '✓' : '') + '</span>' +
        '<span class="dr-menu-pg-name">' + esc(pg) + '</span>';
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        var idx = selectedPages.indexOf(pg);
        if (idx >= 0) selectedPages.splice(idx, 1);
        else selectedPages.push(pg);
        updatePageLabel();
        buildPageMenu(pages);
        applyFilters();
      });
      pageMenu.appendChild(btn);
    });
  }

  function updatePageLabel() {
    if (selectedPages.length === 0) {
      pageLbl.textContent = 'All Pages';
      pageCnt.classList.remove('show');
    } else {
      pageLbl.textContent = 'Pages';
      pageCnt.textContent = selectedPages.length;
      pageCnt.classList.add('show');
    }
  }

  /* Move menu to body so CSS transform on .main-content doesn't trap position:fixed */
  document.body.appendChild(pageMenu);

  /* toggle open/close */
  pageBtn.addEventListener('click', function(e){
    e.stopPropagation();
    var isOpen = pageMenu.classList.contains('show');
    if (isOpen) {
      pageMenu.classList.remove('show');
      pageBtn.classList.remove('open');
    } else {
      _drCloseAllPopups();
      var r = pageBtn.getBoundingClientRect();
      var menuW = 220;
      var menuH = 340;
      var left = r.right - menuW;
      if (left < 8) left = 8;
      pageMenu.style.left = left + 'px';
      /* open upward if not enough space below */
      if (r.bottom + menuH + 6 > window.innerHeight) {
        pageMenu.style.top = (r.top - menuH - 6) + 'px';
      } else {
        pageMenu.style.top = (r.bottom + 6) + 'px';
      }
      pageMenu.classList.add('show');
      pageBtn.classList.add('open');
    }
  });

  /* close on outside click or scroll */
  document.addEventListener('click', function(){
    pageMenu.classList.remove('show');
    pageBtn.classList.remove('open');
  });
  window.addEventListener('scroll', function(e){
    /* ignore scroll inside the dropdown itself */
    if (pageMenu.contains(e.target)) return;
    pageMenu.classList.remove('show');
    pageBtn.classList.remove('open');
  }, true);
  pageMenu.addEventListener('click', function(e){ e.stopPropagation(); });

  /* ── Date range label helper ── */
  function fmtRange() {
    if (dateFrom === dateTo) return fmtDate(dateFrom);
    return fmtDate(dateFrom) + ' → ' + fmtDate(dateTo);
  }

  /* ── Filter & Render ── */
  function applyFilters() {
    if (!_dataReady) return;
    var byDate = allOrders.filter(function(o){
      var d = CamboOrdersData.toYMD(o.date);
      return d >= dateFrom && d <= dateTo;
    });
    var byPage = selectedPages.length === 0 ? byDate : byDate.filter(function(o){
      return selectedPages.some(function(pg){ return String(o.page||'').toLowerCase() === pg.toLowerCase(); });
    });
    var q = searchQuery.trim().toLowerCase();
    filteredOrders = q ? byPage.filter(function(o){
      return String(o.customer||'').toLowerCase().includes(q) ||
             String(o.id||'').toLowerCase().includes(q) ||
             String(o.phone||'').toLowerCase().includes(q);
    }) : byPage;

    renderKPI();
    renderOrders();
    renderProducts();
  }

  /* ── KPI ── */
  function renderKPI() {
    var orders  = filteredOrders.length;
    var items   = filteredOrders.reduce(function(s,o){ return s + totalItems(o); }, 0);
    var revenue = filteredOrders.reduce(function(s,o){ return s + calcOrderTotal(o); }, 0);
    var avg     = orders ? revenue / orders : 0;

    document.getElementById('kpiOrders').textContent  = orders;
    document.getElementById('kpiItems').textContent   = items;
    document.getElementById('kpiRevenue').textContent = fmtMoney(revenue);
    document.getElementById('kpiKhr').textContent     = Math.round(revenue * KHR_RATE).toLocaleString() + '៛';
    document.getElementById('kpiAvg').textContent     = fmtMoney(avg);
    document.getElementById('kpiOrdersNote').textContent  = fmtRange();
    document.getElementById('kpiItemsNote').textContent   = items + ' items';
    document.getElementById('kpiRevenueNote').textContent = 'Rate: ' + KHR_RATE.toLocaleString() + '៛/$1';
    document.getElementById('kpiAvgNote').textContent     = orders + ' orders';
    var _sub = document.getElementById('drOrdersSubtitle'); if(_sub) _sub.textContent = orders + ' orders · ' + fmtRange();
    document.getElementById('drSubtitle').textContent = fmtRange() + (selectedPages.length ? ' · ' + selectedPages.join(', ') : ' · All Pages');
  }

  function renderOrders() {

        o.deliveryName ? '<div class="dr-meta-item"><div class="dr-meta-lbl">ដឹកជញ្ជូន</div><div class="dr-meta-val">' + esc(o.deliveryName) + '</div></div>' : '',
        o.deliveryFee  ? '<div class="dr-meta-item"><div class="dr-meta-lbl">ថ្លៃដឹក</div><div class="dr-meta-val">$' + Number(o.deliveryFee).toFixed(2) + '</div></div>' : '',
        o.payment      ? '<div class="dr-meta-item"><div class="dr-meta-lbl">ការទូទាត់</div><div class="dr-meta-val">' + esc(o.payment) + '</div></div>' : '',

          '<td class="dr-col-prod"><span class="dr-tc-prod-main">' + first + '</span>' + more + '</td>' +

          '<td class="dr-col-closeby" style="font-size:12px;color:var(--muted)">' + esc(o.closeBy||o.closeby||'—') + '</td>' +
          '<td class="dr-col-delfee" style="font-size:12px;color:var(--muted)">' + (Number(o.deliveryFee||0) > 0 ? '$' + Number(o.deliveryFee).toFixed(2) : '—') + '</td>' +
          '<td class="dr-col-tot"><span class="dr-tc-tot">' + fmtMoneyFull(total) + '</span></td>' +
          '<td class="dr-col-date">' + fmtDate(CamboOrdersData.toYMD(o.date)) + '</td>' +
          '<td style="width:30px;text-align:center"><svg class="dr-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></td>' +

      var detailRow =

            itemsHtml +
            '<div class="dr-items-total">' +
              '<span class="dr-items-total-lbl">Grand Total</span>' +
              '<span class="dr-items-total-val">' + fmtMoneyFull(total) + ' · ' + Math.round(total * KHR_RATE).toLocaleString() + '៛</span>' +
            '</div>' +

      return mainRow + detailRow;

    container.innerHTML =

  window.drToggleRow = function(i){
    var main   = document.getElementById('dr-row-' + i);
    var detail = document.getElementById('dr-detail-' + i);
    if (!main) return;
    main.classList.toggle('open');
    detail.classList.toggle('open');

  /* ── Product Summary ── */
  var _drProdList = [];

  function renderProducts() {
    var prodMap = {};
    filteredOrders.forEach(function(o){
      (o.products||[]).forEach(function(p){
        var key = String(p.name||'').trim();
        if (!key) return;
        if (!prodMap[key]) prodMap[key] = { name:key, qty:0, revenue:0, orders:0, customers:[] };
        prodMap[key].qty     += Number(p.qty||0);
        prodMap[key].revenue += (Number(p.qty||0)*Number(p.price||0)) - Number(p.discount||0);
        prodMap[key].orders  += 1;
        prodMap[key].customers.push({ name: o.customer||'—', phone: o.phone||'—', qty: Number(p.qty||0) });
      });
    });
    var sorted = Object.values(prodMap).sort(function(a,b){ return b.qty - a.qty; });
    _drProdList = sorted;
    var maxQty = sorted.length ? sorted[0].qty : 1;
    var grid = document.getElementById('drProdGrid');
    document.getElementById('drProdSubtitle').textContent = sorted.length + ' ប្រភេទផលិតផល · ' + fmtRange();

    if (!sorted.length) {
      grid.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">គ្មានទិន្នន័យ</div>';
      return;
    }
    grid.innerHTML = sorted.map(function(p, i){
      var rankCls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      var pct = maxQty > 0 ? (p.qty / maxQty * 100) : 0;
      return '<div class="dr-prod-row" onclick="drShowProdModal(' + i + ')">' +
        '<div class="dr-prod-top">' +
          '<div class="dr-prod-rank ' + rankCls + '">' + (i+1) + '</div>' +
          '<div class="dr-prod-name">' + esc(p.name) + '</div>' +
        '</div>' +
        '<div class="dr-prod-bar-wrap"><div class="dr-prod-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="dr-prod-footer">' +
          '<div class="dr-prod-sub">' + p.orders + ' order' + (p.orders !== 1 ? 's' : '') + ' · ' + p.qty + ' items</div>' +
          '<div class="dr-prod-rev">' + fmtMoney(p.revenue) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  var _drActiveProd = null;

  window.drShowProdModal = function(idx) {
    var p = _drProdList[idx];
    if (!p) return;

    /* clear all previous highlights */
    document.querySelectorAll('.dr-prod-row').forEach(function(el){ el.classList.remove('dr-prod-active'); });
    document.querySelectorAll('.dr-tr-main.dr-hl').forEach(function(el){ el.classList.remove('dr-hl'); });

    /* toggle: click same product again → clear */
    if (_drActiveProd === p.name) { _drActiveProd = null; return; }
    _drActiveProd = p.name;

    /* highlight active product card */
    var cards = document.querySelectorAll('.dr-prod-row');
    if (cards[idx]) cards[idx].classList.add('dr-prod-active');

    /* highlight matching order rows */
    var firstEl = null;
    filteredOrders.forEach(function(o, i){
      var match = (o.products||[]).some(function(pr){
        return String(pr.name||'').trim() === p.name;
      });
      if (match) {
        var rowEl = document.getElementById('dr-row-' + i);
        if (rowEl) { rowEl.classList.add('dr-hl'); if (!firstEl) firstEl = rowEl; }
      }
    });

    /* scroll to first highlighted row */
    if (firstEl) firstEl.scrollIntoView({ behavior:'smooth', block:'center' });
  };

  /* ── Load Data ── */
  async function loadData() {
    var btn = document.getElementById('drRefreshBtn');
    var container = document.getElementById('drOrderList');
    btn.classList.add('loading');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin .8s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading...';
    if (_dataReady && container) container.style.opacity = '0.45';
    try {
      /* Fetch pages list directly from SaleInfor sheet (column C) + orders in parallel */
      var [ordersResult, inforResult] = await Promise.all([
        CamboOrdersData.fetchOrders(5000),
        window.CamboAPI
          ? window.CamboAPI.get({ action: 'saleinfor' })
          : fetch('https://script.google.com/macros/s/AKfycbyhPAP25edj3Q2hlW1yZNMW56BzsC3Hd9fH60lRZofqQnRUMcuqa-CRIo60912HGweM1w/exec?action=saleinfor&_=' + Date.now()).then(function(r){ return r.json(); })
      ]);
      allOrders = ordersResult;
      _dataReady = true;

      /* Pages: SaleInfor column C is the master list (exact Sheet order) */
      var masterPages = (inforResult && Array.isArray(inforResult.pages))
        ? inforResult.pages
        : (inforResult && inforResult.saleinfor && Array.isArray(inforResult.saleinfor.pages))
          ? inforResult.saleinfor.pages
          : [];
      /* Merge: master first, then any extra from orders not yet in Sheet */
      var masterSet = {};
      masterPages.forEach(function(p){ masterSet[p] = true; });
      var extraPages = {};
      allOrders.forEach(function(o){ if(o.page && !masterSet[o.page]) extraPages[o.page] = true; });
      var pageList = masterPages.concat(Object.keys(extraPages).sort());
      buildPageMenu(pageList);

      applyFilters();
    } catch(e) {
      document.getElementById('drOrderList').innerHTML = '<div class="dr-orders-empty" style="color:#f87171">Error loading data: ' + esc(String(e.message||e)) + '</div>';
    } finally {
      if (container) container.style.opacity = '';
      btn.classList.remove('loading');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Refresh';
    }
  }

  /* ── Search ── */
  document.getElementById('drSearchInput').addEventListener('input', function(){
    searchQuery = this.value;
    applyFilters();
  });

  /* ── Refresh button ── */
  document.getElementById('drRefreshBtn').addEventListener('click', loadData);

  /* ── Actions dropdown ── */
  (function(){
    var actBtn  = document.getElementById('drActBtn');
    var actDrop = document.createElement('div');
    actDrop.className = 'dr-act-drop';
    actDrop.id = 'drActDrop';
    var svgDl = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    var svgPdf= '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>';
    actDrop.innerHTML =
      '<button class="dr-act-item" id="drExportImg">'+svgDl+' Export as Image (PNG)</button>' +
      '<button class="dr-act-item" id="drExportImgRev">'+svgDl+' Export as Image + Revenue</button>' +
      '<button class="dr-act-item" id="drExportPdf">'+svgPdf+' Export as PDF</button>';
    document.body.appendChild(actDrop);

    function openAct() {
      _drCloseAllPopups();
      var r = actBtn.getBoundingClientRect();
      var w = 200;
      var left = r.right - w;
      if(left < 8) left = 8;
      actDrop.style.top  = (r.bottom + 6) + 'px';
      actDrop.style.left = left + 'px';
      actDrop.classList.add('show');
      actBtn.classList.add('open');
    }
    function closeAct() { actDrop.classList.remove('show'); actBtn.classList.remove('open'); }

    actBtn.addEventListener('click', function(e){
      e.stopPropagation();
      actDrop.classList.contains('show') ? closeAct() : openAct();
    });
    actDrop.addEventListener('click', function(e){ e.stopPropagation(); });
    document.addEventListener('click', closeAct);
    window.addEventListener('scroll', closeAct, true);

    /* ── Shared: build rows per day (all dates in range, even empty ones) ── */
    function buildDayRows() {
      /* aggregate orders by date */
      var days = {};
      filteredOrders.forEach(function(o){
        var d = (CamboOrdersData.toYMD(o.date)||'').slice(0,10);
        if(!d || d.length < 10) return;
        if(!days[d]) days[d] = { orders:0, itemsTotal:0, revenue:0 };
        days[d].orders++;
        days[d].itemsTotal += totalItems(o);
        days[d].revenue += calcOrderTotal(o);
      });

      /* fill every date in the selected range */
      var rows = [];
      if (dateFrom && dateTo) {
        var cur = new Date(dateFrom + 'T00:00:00');
        var end = new Date(dateTo  + 'T00:00:00');
        while (cur <= end) {
          var ymd = cur.getFullYear() + '-' +
                    String(cur.getMonth()+1).padStart(2,'0') + '-' +
                    String(cur.getDate()).padStart(2,'0');
          var p   = ymd.split('-');
          var lbl = p[2]+'/'+p[1]+'/'+p[0].slice(2);
          var data = days[ymd] || { orders:0, itemsTotal:0, revenue:0 };
          rows.push({ date:lbl, orders:data.orders, items:data.itemsTotal, revenue:data.revenue });
          cur.setDate(cur.getDate() + 1);
        }
      } else {
        /* fallback: only dates with data (original behaviour) */
        rows = Object.keys(days).sort().map(function(d){
          var p = d.split('-');
          return { date:p[2]+'/'+p[1]+'/'+p[0].slice(2), orders:days[d].orders, items:days[d].itemsTotal, revenue:days[d].revenue };
        });
      }
      return rows;
    }

    /* ── Truncate canvas text safely ── */
    function truncate(ctx, text, maxW) {
      if(ctx.measureText(text).width <= maxW) return text;
      var out = '';
      for(var i=0; i<text.length; i++){
        if(ctx.measureText(out+text[i]+'…').width > maxW) break;
        out += text[i];
      }
      return out + '…';
    }

    /* ── Export PNG ── */
    document.getElementById('drExportImg').addEventListener('click', function(){
      closeAct();
      try {
        var rows = buildDayRows();
        // Layout constants — white background, blue header like screenshot
        var scale=2, pad=40, titleH=70, colH=44, rowH=40;
        var W=560, colDate=180, colOrd=140, colItem=W-colDate-colOrd;
        var H = titleH + colH + rows.length*rowH + 40;

        var canvas=document.createElement('canvas');
        canvas.width=W*scale; canvas.height=H*scale;
        var ctx=canvas.getContext('2d');
        ctx.scale(scale,scale);

        // White background
        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);

        // Title "Daily Report"
        ctx.fillStyle='#1a1a2e'; ctx.font='bold 22px system-ui,sans-serif';
        ctx.fillText('Daily Report', pad, 38);

        // Subtitle date range + selected pages
        var r0=rows[0], rN=rows[rows.length-1];
        ctx.fillStyle='#6b7280'; ctx.font='12px system-ui,sans-serif';
        var sub = r0 ? (r0.date+(rows.length>1?' -> '+rN.date:'')) : '';
        var pageSub = '   |   Page: ' + (selectedPages.length ? selectedPages.join(', ') : 'All Pages');
        ctx.fillText(sub+pageSub, pad, 58);

        // Header row — blue background
        ctx.fillStyle='#4285f4';
        ctx.fillRect(pad, titleH, W-pad*2, colH);

        ctx.fillStyle='#ffffff'; ctx.font='bold 13px system-ui,sans-serif';
        var x1=pad+16, x2=pad+colDate+20, x3=pad+colDate+colOrd+20;
        ctx.fillText('Date',   x1, titleH+colH/2+5);
        ctx.fillText('Orders', x2, titleH+colH/2+5);
        ctx.fillText('Items',  x3, titleH+colH/2+5);

        // Data rows
        rows.forEach(function(row,i){
          var y = titleH+colH + i*rowH;
          ctx.fillStyle = i%2===0 ? '#ffffff' : '#f9fafb';
          ctx.fillRect(pad, y, W-pad*2, rowH);

          ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(pad,y+rowH); ctx.lineTo(W-pad,y+rowH); ctx.stroke();

          var cy = y+rowH/2+5;
          ctx.fillStyle='#111827'; ctx.font='600 13px system-ui,sans-serif';
          ctx.fillText(row.date, x1, cy);
          ctx.fillStyle='#374151'; ctx.font='13px system-ui,sans-serif';
          ctx.fillText(String(row.orders), x2, cy);
          ctx.fillText(String(row.items),  x3, cy);
        });

        // Outer border
        ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
        ctx.strokeRect(pad, titleH, W-pad*2, colH+rows.length*rowH);

        // Footer
        ctx.fillStyle='#9ca3af'; ctx.font='10px system-ui,sans-serif';
        ctx.fillText('CAMBO MINI  Export Date: '+(function(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();})(), pad, H-12);

        var link=document.createElement('a');
        link.download='daily-report-'+dateFrom+(dateFrom!==dateTo?'_'+dateTo:'')+'.png';
        link.href=canvas.toDataURL('image/png'); link.click();
      } catch(e){ alert('Export error: '+e.message); }
    });

    /* ── Export PNG + Revenue ── */
    document.getElementById('drExportImgRev').addEventListener('click', function(){
      closeAct();
      try {
        var rows = buildDayRows();
        var scale=2, pad=40, titleH=70, colH=44, rowH=40;
        var W=640, colDate=160, colOrd=110, colItem=110, colRev=W-pad*2-colDate-colOrd-colItem;
        var H = titleH + colH + rows.length*rowH + 40;

        var canvas=document.createElement('canvas');
        canvas.width=W*scale; canvas.height=H*scale;
        var ctx=canvas.getContext('2d');
        ctx.scale(scale,scale);

        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);

        ctx.fillStyle='#1a1a2e'; ctx.font='bold 22px system-ui,sans-serif';
        ctx.fillText('Daily Report', pad, 38);

        var r0=rows[0], rN=rows[rows.length-1];
        ctx.fillStyle='#6b7280'; ctx.font='12px system-ui,sans-serif';
        var sub = r0 ? (r0.date+(rows.length>1?' -> '+rN.date:'')) : '';
        var pageSub = '   |   Page: ' + (selectedPages.length ? selectedPages.join(', ') : 'All Pages');
        ctx.fillText(sub+pageSub, pad, 58);

        ctx.fillStyle='#4285f4';
        ctx.fillRect(pad, titleH, W-pad*2, colH);

        ctx.fillStyle='#ffffff'; ctx.font='bold 13px system-ui,sans-serif';
        var x1=pad+16, x2=pad+colDate+16, x3=pad+colDate+colOrd+16, x4=pad+colDate+colOrd+colItem+16;
        ctx.fillText('Date',    x1, titleH+colH/2+5);
        ctx.fillText('Orders',  x2, titleH+colH/2+5);
        ctx.fillText('Items',   x3, titleH+colH/2+5);
        ctx.fillText('Revenue', x4, titleH+colH/2+5);

        rows.forEach(function(row,i){
          var y = titleH+colH + i*rowH;
          ctx.fillStyle = i%2===0 ? '#ffffff' : '#f9fafb';
          ctx.fillRect(pad, y, W-pad*2, rowH);

          ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(pad,y+rowH); ctx.lineTo(W-pad,y+rowH); ctx.stroke();

          var cy = y+rowH/2+5;
          ctx.fillStyle='#111827'; ctx.font='600 13px system-ui,sans-serif';
          ctx.fillText(row.date, x1, cy);
          ctx.fillStyle='#374151'; ctx.font='13px system-ui,sans-serif';
          ctx.fillText(String(row.orders), x2, cy);
          ctx.fillText(String(row.items),  x3, cy);
          ctx.fillStyle='#111827'; ctx.font='700 13px system-ui,sans-serif';
          ctx.fillText('$'+row.revenue.toFixed(2), x4, cy);
        });

        ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
        ctx.strokeRect(pad, titleH, W-pad*2, colH+rows.length*rowH);

        ctx.fillStyle='#9ca3af'; ctx.font='10px system-ui,sans-serif';
        ctx.fillText('CAMBO MINI  Export Date: '+(function(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();})(), pad, H-12);

        var link=document.createElement('a');
        link.download='daily-report-revenue-'+dateFrom+(dateFrom!==dateTo?'_'+dateTo:'')+'.png';
        link.href=canvas.toDataURL('image/png'); link.click();
      } catch(e){ alert('Export error: '+e.message); }
    });

    /* ── Export PDF (print) ── */
    document.getElementById('drExportPdf').addEventListener('click', function(){
      closeAct();
      var rows = buildDayRows();
      var r0=rows[0], rN=rows[rows.length-1];
      var sub = r0 ? (r0.date+(rows.length>1?' -> '+rN.date:'')) : '';
      sub += '   |   Page: ' + (selectedPages.length ? selectedPages.join(', ') : 'All Pages');
      var trs = rows.map(function(row,i){
        return '<tr style="background:'+(i%2===0?'#fff':'#f9fafb')+'">' +
          '<td>'+row.date+'</td>' +
          '<td class="num">'+row.orders+'</td>' +
          '<td class="num">'+row.items+'</td>' +
          '<td class="num rev">$'+row.revenue.toFixed(2)+'</td>' +
        '</tr>';
      }).join('');

      var win=window.open('','_blank','width=700,height=900');
      win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Daily Report</title><style>' +
        '*{box-sizing:border-box;margin:0;padding:0}' +
        'body{font-family:system-ui,sans-serif;padding:32px;color:#111827;background:#fff}' +
        'h1{font-size:22px;font-weight:700;margin-bottom:4px}' +
        '.sub{font-size:12px;color:#6b7280;margin-bottom:24px}' +
        'table{width:100%;border-collapse:collapse;font-size:13px}' +
        'thead tr{background:#4285f4}' +
        'thead th{color:#fff;padding:11px 16px;text-align:left;font-size:13px;font-weight:700}' +
        'td{padding:10px 16px;border-bottom:1px solid #e5e7eb;color:#374151}' +
        'td.num{text-align:left;font-weight:600}' +
        'td.rev{color:#111827;font-weight:700}' +
        '.footer{margin-top:24px;font-size:10px;color:#9ca3af}' +
        '@media print{@page{margin:20mm}body{padding:0}}' +
        '</style></head><body>' +
        '<h1>Daily Report</h1>' +
        '<div class="sub">'+sub+'</div>' +
        '<table>' +
          '<thead><tr><th>Date</th><th>Orders</th><th>Items</th><th>Revenue</th></tr></thead>' +
          '<tbody>'+trs+'</tbody>' +
        '</table>' +
        '<div class="footer">CAMBO MINI &nbsp; Export Date: '+(function(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();})()+'</div>' +
        '<script>window.onload=function(){setTimeout(function(){window.print();},300);}<\/script>' +
        '</body></html>');
      win.document.close();
    });
  })();

  /* ── Spin animation ── */
  var style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);

  /* ── Auto load ── */
  loadData();
})();
</script>
</body>
</html>
