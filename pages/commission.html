<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Commission - CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .cw{display:grid;gap:18px}

    /* ── KPI ── */
    .stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .kpi{padding:16px 18px;border-radius:20px}
    .kpi-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .kpi-val{display:block;margin-top:8px;font-size:22px;font-weight:800;color:var(--text)}

    /* ── Date Filter ── */
    .df-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .df-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
    .df-btn:hover{border-color:rgba(139,92,246,.4);color:var(--text)}
    .df-btn.active{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.5);color:#c4b5fd}
    .df-custom{display:none;gap:6px;align-items:center}
    .df-custom.show{display:flex}
    .df-input{padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:12px;font-family:inherit}
    .df-input:focus{outline:none;border-color:rgba(139,92,246,.4)}

    /* ── Main layout ── */
    .clayout{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
    .cp{padding:20px 22px;border-radius:22px}
    .cp-title{margin:0 0 16px;font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}

    /* ── Breadcrumb ── */
    .breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:12px}
    .bc-item{color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:6px;transition:background .12s}
    .bc-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .bc-item.active{color:var(--text);font-weight:700;cursor:default}
    .bc-sep{color:var(--muted);font-size:10px}

    /* ── Search ── */
    .srch-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .srch-bar input,.srch-bar select{min-height:36px;padding:0 12px;border-radius:10px;font-size:12px;font-family:inherit}
    .srch-bar input{flex:1;min-width:120px}

    /* ── Table ── */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    thead th{text-align:left;padding:8px 12px;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line);white-space:nowrap}
    tbody td{padding:10px 12px;border-bottom:1px solid rgba(148,163,200,.06);font-size:13px;color:var(--text);vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:rgba(255,255,255,.03);cursor:pointer}
    .no-data{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:2}

    /* ── Agent row ── */
    .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,rgba(139,92,246,.4),rgba(6,182,212,.3));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
    .ai{display:flex;align-items:center;gap:10px}
    .ai-name{font-weight:700;color:var(--text)}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;padding:0 7px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid}
    .badge-purple{background:rgba(139,92,246,.15);color:#c4b5fd;border-color:rgba(139,92,246,.25)}
    .badge-teal{background:rgba(6,182,212,.1);color:#7dd3fc;border-color:rgba(6,182,212,.2)}
    .comm-val{color:#fde68a;font-weight:800;font-size:13px}
    .sales-val{color:var(--text);font-weight:700}
    .click-hint{font-size:10px;color:var(--muted);margin-top:2px}
    .arrow-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:3px 8px;border-radius:6px;transition:background .12s;font-family:inherit}
    .arrow-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}

    /* ── Rate input ── */
    .rate-inp{width:80px;padding:4px 8px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:12px;text-align:center;font-family:inherit}
    .rate-inp:focus{outline:none;border-color:rgba(139,92,246,.4)}
    .stchange{background:rgba(255,255,255,.06)!important;border:1px solid var(--line)!important;border-radius:8px!important;color:var(--text)!important;padding:4px 8px!important;font-size:11px!important;cursor:pointer;min-height:auto!important;font-family:inherit}

    /* ── Order detail view ── */
    .order-card{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,200,.08);margin-bottom:6px;cursor:pointer;transition:background .12s}
    .order-card:hover{background:rgba(255,255,255,.06)}
    .order-card-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .order-card-meta{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--muted);margin-top:4px;flex-wrap:wrap}
    .order-card-name{font-weight:700;color:var(--text);font-size:13px}
    .order-card-total{font-weight:800;color:#7dd3fc;font-size:13px;white-space:nowrap}
    .meta-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.05);font-size:11px}

    /* ── Product detail view ── */
    .prod-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,200,.06);margin-bottom:5px;font-size:13px}
    .prod-name{color:var(--text);font-weight:600}
    .prod-qty{color:#c4b5fd;text-align:right;font-size:12px}
    .prod-price{color:var(--muted);text-align:right;font-size:12px}
    .prod-sub{color:#7dd3fc;font-weight:700;text-align:right}

    /* ── Top CloseBy ── */
    .top-row{display:grid;grid-template-columns:28px 1fr auto auto;gap:10px;align-items:center;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,200,.08);margin-bottom:6px}
    .rk{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
    .r1{background:linear-gradient(135deg,#f59e0b,#fde68a);color:#78350f}
    .r2{background:linear-gradient(135deg,#94a3b8,#e2e8f0);color:#1e293b}
    .r3{background:linear-gradient(135deg,#b45309,#fbbf24);color:#fff}
    .rn{background:rgba(255,255,255,.08);color:var(--muted);font-size:10px}
    .top-info b{display:block;font-size:13px;color:var(--text);font-weight:700}
    .top-info small{font-size:11px;color:var(--muted)}
    .top-orders{font-size:13px;font-weight:800;color:#c4b5fd;text-align:right;white-space:nowrap}
    .top-comm{font-size:12px;font-weight:700;color:#fde68a;text-align:right;white-space:nowrap}

    /* ── Setup card ── */
    .setup-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(148,163,200,.08)}
    .setup-row:last-child{border-bottom:none;padding-bottom:0}
    .setup-label{font-size:13px;color:var(--text);font-weight:600}
    .setup-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .big-inp{width:90px;padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);font-size:14px;text-align:center;font-family:inherit;font-weight:700}
    .big-inp:focus{outline:none;border-color:rgba(139,92,246,.4)}
    .apply-btn{margin-top:10px;padding:7px 18px;border-radius:10px;background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    .apply-btn:hover{background:rgba(139,92,246,.3)}

    @media(max-width:1080px){.clayout{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
<div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="dashboard">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <main class="main-content">
    <div class="shared-topbar" id="sharedHeader"></div>
    <div class="cw">

      <!-- KPI Stats -->
      <div class="stats-row">
        <article class="glass-card kpi"><div class="kpi-label">Total Commission</div><strong class="kpi-val" id="sTot">0 ៛</strong></article>
        <article class="glass-card kpi"><div class="kpi-label">Paid Out</div><strong class="kpi-val" id="sPaid" style="color:#86efac">0 ៛</strong></article>
        <article class="glass-card kpi"><div class="kpi-label">Pending</div><strong class="kpi-val" id="sPend" style="color:#fde68a">0 ៛</strong></article>
        <article class="glass-card kpi"><div class="kpi-label">Active CloseBy</div><strong class="kpi-val" id="sAg">0</strong></article>
      </div>

      <!-- Header + Date Filter -->
      <section class="glass-card" style="padding:20px 24px;border-radius:22px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:14px">
          <div>
            <h2 style="margin:0 0 3px;color:var(--text)">Commission</h2>
            <p style="margin:0;color:var(--muted);font-size:13px">គ្រប់គ្រង commission CloseBy និង payout report</p>
          </div>
          <button onclick="loadData()" style="padding:7px 16px;border-radius:10px;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:#7dd3fc;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔄 Refresh</button>
        </div>
        <div class="df-bar">
          <button class="df-btn" data-mode="today" onclick="setMode('today')">ថ្ងៃនេះ</button>
          <button class="df-btn" data-mode="week" onclick="setMode('week')">សប្ដាហ៍នេះ</button>
          <button class="df-btn active" data-mode="month" onclick="setMode('month')">ខែនេះ</button>
          <button class="df-btn" data-mode="lastmonth" onclick="setMode('lastmonth')">ខែមុន</button>
          <button class="df-btn" data-mode="custom" onclick="setMode('custom')">Custom</button>
          <div class="df-custom" id="customRange">
            <input type="date" id="dateFrom" class="df-input" onchange="applyFilter()">
            <span style="color:var(--muted);font-size:12px">→</span>
            <input type="date" id="dateTo" class="df-input" onchange="applyFilter()">
          </div>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--muted)" id="rangeLabel"></div>
      </section>

      <!-- Main layout -->
      <div class="clayout">

        <!-- LEFT: Commission Records (drill-down) -->
        <article class="glass-card cp">
          <div class="cp-title">
            <span id="panelTitle">Commission Records</span>
          </div>

          <!-- Breadcrumb -->
          <div class="breadcrumb" id="breadcrumb">
            <span class="bc-item active" onclick="navTo('agents')">ទាំងអស់</span>
          </div>

          <!-- Search bar (agents view only) -->
          <div class="srch-bar" id="srchBar">
            <input type="text" id="srch" placeholder="ស្វែងរក CloseBy..." oninput="renderAgents()">
            <select id="fst" onchange="renderAgents()">
              <option value="">All Status</option>
              <option value="Paid">Paid</option>
              <option value="Pending">Pending</option>
              <option value="Processing">Processing</option>
            </select>
          </div>

          <!-- Panel content -->
          <div id="panelContent"></div>
        </article>

        <!-- RIGHT -->
        <div style="display:grid;gap:18px;align-content:start">

          <!-- Commission Setup -->
          <article class="glass-card cp">
            <div class="cp-title">⚙️ Commission Setup</div>
            <div class="setup-row">
              <div>
                <div class="setup-label">Rate ក្នុងមួយ Order</div>
                <div class="setup-sub">Orders × Rate = Commission</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <input type="number" id="defRate" class="big-inp" value="200" min="0" step="50">
                <span style="color:var(--muted);font-size:13px;font-weight:700">៛</span>
              </div>
            </div>
            <div class="setup-row">
              <div>
                <div class="setup-label">ឧទាហរណ៍</div>
                <div class="setup-sub" id="exCalc">10 orders × 200៛ = 2,000៛</div>
              </div>
            </div>
            <button class="apply-btn" onclick="applyDefRate()">✅ Apply to All</button>
          </article>

          <!-- Top CloseBy (SEPARATE TABLE) -->
          <article class="glass-card cp">
            <div class="cp-title">🏆 Top CloseBy <span style="font-size:11px;font-weight:400;color:var(--muted)">(តាមចំនួន Order)</span></div>
            <div id="topList"></div>
          </article>

        </div>
      </div>
    </div>
  </main>
</div>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/dashboard-layout.js"></script>
<script src="../assets/js/orders-data.js"></script>
<script>
(function(){
  /* ══ SETTINGS ══ */
  const CK = 'commission_settings_v2';
  function loadS(){ try{return JSON.parse(localStorage.getItem(CK)||'{}')}catch{return{}} }
  function saveS(s){ localStorage.setItem(CK,JSON.stringify(s)) }

  /* ══ STATE ══ */
  var _all=[], _filtered=[], _agents=[];
  var _mode='month';
  var _view='agents'; // 'agents' | 'orders' | 'products'
  var _selAgent=null;
  var _selOrder=null;

  /* ══ HELPERS ══ */
  function toDate(o){
    var raw=String(o.date||o.createdAt||'');
    if(!raw) return null;
    var d=new Date(raw);
    if(!isNaN(d)) return d;
    var m=raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m) return new Date(+m[3],+m[2]-1,+m[1]);
    return null;
  }
  function fmtD(o){
    if(window.CamboOrdersData) return CamboOrdersData.formatDate(o.date||'');
    var d=toDate(o); if(!d) return '-';
    return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
  }
  function total(o){
    if(window.CamboOrdersData) return CamboOrdersData.calcOrderTotal(o);
    return +(o.grandTotal||o.subtotal||0);
  }
  function $m(n){ return Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}); }

  /* ══ DATE FILTER ══ */
  window.setMode=function(m){
    _mode=m;
    document.querySelectorAll('.df-btn').forEach(function(b){
      b.classList.toggle('active',b.dataset.mode===m);
    });
    document.getElementById('customRange').classList.toggle('show',m==='custom');
    applyFilter();
  };

  window.applyFilter=function(){
    var now=new Date(); now.setHours(23,59,59,999);
    var today=new Date(); today.setHours(0,0,0,0);
    _filtered=_all.filter(function(o){
      var d=toDate(o); if(!d) return false;
      if(_mode==='today'){
        var s=new Date(today); var e=new Date(now);
        return d>=s&&d<=e;
      }
      if(_mode==='week'){
        var s=new Date(today); s.setDate(today.getDate()-today.getDay());
        return d>=s&&d<=now;
      }
      if(_mode==='month'){
        return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      }
      if(_mode==='lastmonth'){
        var s=new Date(now.getFullYear(),now.getMonth()-1,1);
        var e=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);
        return d>=s&&d<=e;
      }
      if(_mode==='custom'){
        var from=document.getElementById('dateFrom').value;
        var to=document.getElementById('dateTo').value;
        var ok=true;
        if(from) ok=ok&&d>=new Date(from);
        if(to){var te=new Date(to);te.setHours(23,59,59,999);ok=ok&&d<=te;}
        return ok;
      }
      return true;
    });
    updateRangeLabel();
    buildAgents();
    navTo('agents');
    renderKPI();
    renderTop();
  };

  function updateRangeLabel(){
    var labels={today:'ថ្ងៃនេះ',week:'សប្ដាហ៍នេះ',month:'ខែនេះ',lastmonth:'ខែមុន',custom:'Custom range'};
    document.getElementById('rangeLabel').textContent='📊 '+_filtered.length+' orders · '+labels[_mode];
  }

  /* ══ BUILD AGENTS ══ */
  function buildAgents(){
    var sett=loadS();
    var def=Number(document.getElementById('defRate').value)||0;
    var map={};
    _filtered.forEach(function(o){
      var cb=(o.closeBy||'').trim()||'Unknown';
      if(!map[cb]) map[cb]={name:cb,orders:[],rate:sett[cb]!==undefined?sett[cb].rate:def,status:sett[cb]!==undefined?sett[cb].status:'Pending'};
      map[cb].orders.push(o);
    });
    _agents=Object.values(map).sort(function(a,b){return b.orders.length-a.orders.length;});
  }

  /* ══ NAVIGATION ══ */
  window.navTo=function(view,agentName,orderIdx){
    _view=view;
    if(agentName!==undefined) _selAgent=agentName;
    if(orderIdx!==undefined) _selOrder=orderIdx;
    renderBreadcrumb();
    updatePanelTitle();
    document.getElementById('srchBar').style.display=view==='agents'?'':'none';
    if(view==='agents') renderAgents();
    else if(view==='orders') renderOrders();
    else if(view==='products') renderProducts();
  };

  function renderBreadcrumb(){
    var h='<span class="bc-item'+(  _view==='agents'?' active':'')+'" onclick="navTo(\'agents\')">ទាំងអស់</span>';
    if(_view==='orders'||_view==='products'){
      h+='<span class="bc-sep">›</span>';
      h+='<span class="bc-item'+(_view==='orders'?' active':'')+'" onclick="navTo(\'orders\',\''+encodeURIComponent(_selAgent||'')+'\')">'+((_selAgent||'').length>20?(_selAgent||'').slice(0,20)+'…':(_selAgent||''))+'</span>';
    }
    if(_view==='products'&&_selOrder!==null){
      var ag=_agents.find(function(a){return a.name===_selAgent;});
      var ord=ag&&ag.orders[_selOrder];
      if(ord){
        h+='<span class="bc-sep">›</span>';
        h+='<span class="bc-item active">'+(ord.customer||'Order').slice(0,18)+'</span>';
      }
    }
    document.getElementById('breadcrumb').innerHTML=h;
  }

  function updatePanelTitle(){
    var t={agents:'Commission Records',orders:'Orders របស់ '+((_selAgent||'').length>20?(_selAgent||'').slice(0,20)+'…':(_selAgent||'')),products:'ផលិតផល'};
    document.getElementById('panelTitle').textContent=t[_view]||'';
  }

  /* ══ VIEW 1: AGENTS TABLE ══ */
  window.renderAgents=function(){
    var q=(document.getElementById('srch').value||'').toLowerCase();
    var f=document.getElementById('fst').value;
    var list=_agents.filter(function(a){
      return (!q||a.name.toLowerCase().includes(q))&&(!f||a.status===f);
    });
    if(!list.length){
      document.getElementById('panelContent').innerHTML='<div class="no-data">គ្មានទិន្នន័យ CloseBy<br><small>Orders ត្រូវបំពេញ CloseBy field</small></div>';
      return;
    }
    var rows=list.map(function(a){
      var cnt=a.orders.length;
      var items=a.orders.reduce(function(s,o){return s+(Array.isArray(o.products)?o.products.reduce(function(ss,p){return ss+(+p.qty||1);},0):0);},0);
      var sales=a.orders.reduce(function(s,o){return s+total(o);},0);
      var comm=cnt*a.rate;
      var enc=encodeURIComponent(a.name);
      var init=(a.name.replace(/\s+/g,'').slice(0,2)||'??').toUpperCase();
      var stCls=a.status==='Paid'?'p-paid':a.status==='Processing'?'p-processing':'p-pending';
      return '<tr onclick="navTo(\'orders\',\''+enc+'\')">'
        +'<td><div class="ai"><div class="av">'+init+'</div><div>'
        +'<div class="ai-name">'+a.name+'</div>'
        +'<div class="click-hint">ចុចដើម្បីមើល orders</div>'
        +'</div></div></td>'
        +'<td><span class="badge badge-purple">'+cnt+'</span></td>'
        +'<td style="color:var(--muted);font-size:12px">'+items+'</td>'
        +'<td><span class="sales-val">$'+$m(sales)+'</span></td>'
        +'<td onclick="event.stopPropagation()"><input type="number" class="rate-inp" value="'+a.rate+'" min="0" step="50" onchange="_ur(\''+enc+'\',this.value)"> <span style="font-size:10px;color:var(--muted)">៛</span></td>'
        +'<td><span class="comm-val">'+comm.toLocaleString()+'៛</span></td>'
        +'<td onclick="event.stopPropagation()"><select class="stchange" onchange="_us(\''+enc+'\',this.value)">'+['Paid','Pending','Processing'].map(function(s){return'<option'+(s===a.status?' selected':'')+'>'+s+'</option>';}).join('')+'</select></td>'
        +'</tr>';
    }).join('');

    document.getElementById('panelContent').innerHTML='<div class="tbl-wrap"><table>'
      +'<thead><tr><th>CloseBy</th><th>Orders</th><th>Items</th><th>Sales</th><th>Rate(៛)</th><th>Commission</th><th>Status</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div>';
    renderKPI();
  };

  /* ══ VIEW 2: ORDERS OF AN AGENT ══ */
  window.renderOrders=function(){
    var name=decodeURIComponent(_selAgent||'');
    var ag=_agents.find(function(a){return a.name===name;});
    if(!ag){document.getElementById('panelContent').innerHTML='<div class="no-data">រកមិនឃើញ</div>';return;}
    var h='<div style="margin-bottom:8px;font-size:12px;color:var(--muted)">'+ag.orders.length+' orders · ចុចអតិថិជន ដើម្បីមើលផលិតផល</div>';
    h+=ag.orders.map(function(o,i){
      var prods=Array.isArray(o.products)?o.products:[];
      var qty=prods.reduce(function(s,p){return s+(+p.qty||1);},0);
      var enc=encodeURIComponent(ag.name);
      return '<div class="order-card" onclick="navTo(\'products\',\''+enc+'\','+i+')">'
        +'<div class="order-card-row">'
        +'<span class="order-card-name">'+(o.customer||'Unknown')+'</span>'
        +'<span class="order-card-total">$'+$m(total(o))+'</span>'
        +'</div>'
        +'<div class="order-card-meta">'
        +'<span class="meta-chip">📅 '+fmtD(o)+'</span>'
        +'<span class="meta-chip">📦 '+prods.length+' ផ្សសផលិតផល · '+qty+' ឈុត</span>'
        +(o.payment?'<span class="meta-chip">💳 '+o.payment+'</span>':'')
        +(o.receiptNo?'<span class="meta-chip">#'+o.receiptNo+'</span>':'')
        +'</div>'
        +'</div>';
    }).join('');
    document.getElementById('panelContent').innerHTML=h;
  };

  /* ══ VIEW 3: PRODUCTS OF AN ORDER ══ */
  window.renderProducts=function(){
    var name=decodeURIComponent(_selAgent||'');
    var ag=_agents.find(function(a){return a.name===name;});
    var ord=ag&&ag.orders[_selOrder];
    if(!ord){document.getElementById('panelContent').innerHTML='<div class="no-data">រកមិនឃើញ</div>';return;}
    var prods=Array.isArray(ord.products)?ord.products:[];
    var h='<div style="margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)">'
      +'<span>👤 <b style="color:var(--text)">'+(ord.customer||'-')+'</b></span>'
      +'<span>📅 '+fmtD(ord)+'</span>'
      +'<span>💵 $'+$m(total(ord))+'</span>'
      +'</div>';
    if(!prods.length){
      h+='<div class="no-data">គ្មានផលិតផល</div>';
    } else {
      h+=prods.map(function(p){
        var sub=((+p.qty||1)*(+p.price||0))-(+p.discount||0);
        return '<div class="prod-row">'
          +'<span class="prod-name">'+(p.name||p.product||'-')+'</span>'
          +'<span class="prod-qty">×'+(p.qty||1)+' ឈុត</span>'
          +'<span class="prod-price">$'+(+p.price||0)+'</span>'
          +'<span class="prod-sub">$'+$m(sub)+'</span>'
          +'</div>';
      }).join('');
    }
    document.getElementById('panelContent').innerHTML=h;
  };

  /* ══ KPI ══ */
  function renderKPI(){
    var sett=loadS();
    var def=Number(document.getElementById('defRate').value)||0;
    var agents=_agents;
    function rate(a){return a.rate!==undefined?a.rate:def;}
    var tot =agents.reduce(function(s,a){return s+a.orders.length*rate(a);},0);
    var paid=agents.filter(function(a){return a.status==='Paid';}).reduce(function(s,a){return s+a.orders.length*rate(a);},0);
    var pend=agents.filter(function(a){return a.status==='Pending';}).reduce(function(s,a){return s+a.orders.length*rate(a);},0);
    document.getElementById('sTot').textContent =tot.toLocaleString()+'៛';
    document.getElementById('sPaid').textContent=paid.toLocaleString()+'៛';
    document.getElementById('sPend').textContent=pend.toLocaleString()+'៛';
    document.getElementById('sAg').textContent  =agents.length;
  }

  /* ══ TOP CLOSEBY (separate sorted table) ══ */
  function renderTop(){
    var sorted=[..._agents].sort(function(a,b){return b.orders.length-a.orders.length;});
    if(!sorted.length){document.getElementById('topList').innerHTML='<div class="no-data">គ្មានទិន្នន័យ</div>';return;}
    var rc=function(i){return i===0?'r1':i===1?'r2':i===2?'r3':'rn';};
    var em=['🥇','🥈','🥉'];
    var def=Number(document.getElementById('defRate').value)||0;
    document.getElementById('topList').innerHTML=sorted.map(function(a,i){
      var comm=a.orders.length*(a.rate!==undefined?a.rate:def);
      return '<div class="top-row">'
        +'<div class="rk '+rc(i)+'">'+(i<3?em[i]:i+1)+'</div>'
        +'<div class="top-info"><b>'+a.name+'</b><small>'+a.orders.length+' orders</small></div>'
        +'<div style="text-align:right"><div class="top-orders">'+a.orders.length+'</div><div style="font-size:10px;color:var(--muted)">orders</div></div>'
        +'<div style="text-align:right"><div class="top-comm">'+comm.toLocaleString()+'៛</div><div style="font-size:10px;color:var(--muted)">commission</div></div>'
        +'</div>';
    }).join('');
  }

  /* ══ RATE / STATUS CALLBACKS ══ */
  window._ur=function(enc,val){
    var n=decodeURIComponent(enc);
    var s=loadS(); if(!s[n])s[n]={}; s[n].rate=+val||0; saveS(s);
    var ag=_agents.find(function(a){return a.name===n;}); if(ag) ag.rate=+val||0;
    renderKPI(); renderTop();
  };
  window._us=function(enc,st){
    var n=decodeURIComponent(enc);
    var s=loadS(); if(!s[n])s[n]={}; s[n].status=st; saveS(s);
    var ag=_agents.find(function(a){return a.name===n;}); if(ag) ag.status=st;
    renderKPI();
  };

  /* ══ SETUP ══ */
  window.applyDefRate=function(){
    var r=Number(document.getElementById('defRate').value)||0;
    var s=loadS(); s._default=r; saveS(s);
    _agents.forEach(function(a){
      if(!(s[a.name]&&s[a.name].rate!==undefined)) a.rate=r;
    });
    updateExCalc();
    renderAgents(); renderKPI(); renderTop();
  };

  function updateExCalc(){
    var r=Number(document.getElementById('defRate').value)||0;
    document.getElementById('exCalc').textContent='10 orders × '+r.toLocaleString()+'៛ = '+(10*r).toLocaleString()+'៛';
  }

  /* ══ LOAD DATA ══ */
  window.loadData=async function(){
    document.getElementById('panelContent').innerHTML='<div class="no-data">⏳ កំពុងទាញទិន្នន័យពី Google Sheets...</div>';
    try{
      if(window.CamboOrdersData) _all=await CamboOrdersData.fetchOrders(5000);
    }catch(e){ console.warn('Commission fetch error',e); }
    applyFilter();
  };

  /* ══ INIT ══ */
  document.addEventListener('DOMContentLoaded',function(){
    var s=loadS();
    if(s._default!==undefined) document.getElementById('defRate').value=s._default;
    document.getElementById('defRate').addEventListener('input',updateExCalc);
    updateExCalc();
    loadData();
  });
})();
</script>
<script src="../assets/js/sw-register.js"></script>
</body>
</html>
