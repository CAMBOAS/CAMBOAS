<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('cambo_theme')||'light');}catch(e){}})();</script>
  <title>Order List — CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=158">
  <link rel="stylesheet" href="../assets/css/main.css?v=158">
  <style>
  /* ── ORDER LIST INLINE STYLES ── */
  .ol-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  .ol-stat{padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,200,.1)}
  [data-theme="light"] .ol-stat{background:#fff;border-color:rgba(148,163,184,.15);box-shadow:0 2px 8px rgba(15,23,42,.05)}
  /* Drawer dark/light */
  #olDrawer { background: #0f172a; }
  [data-theme="light"] #olDrawer { background: #ffffff; border-left-color: rgba(148,163,184,.2) !important; box-shadow: -8px 0 32px rgba(15,23,42,.12) !important; }

  /* Drawer head */
  #olDrawer > div:first-child { background: #0f172a; border-bottom-color: rgba(148,163,200,.12) !important; }
  [data-theme="light"] #olDrawer > div:first-child { background: #ffffff; border-bottom-color: rgba(148,163,184,.15) !important; }

  /* Title */
  #olDrTitle { color: #e2e8f0 !important; }
  [data-theme="light"] #olDrTitle { color: #0f172a !important; }

  /* Info cards in view mode */
  [data-theme="light"] #olDrBody > div > div {
    background: #f8fafc !important;
    border-color: rgba(148,163,184,.15) !important;
  }
  [data-theme="light"] #olDrBody span { color: #0f172a !important; }
  [data-theme="light"] #olDrBody .dr-label { color: #64748b !important; }

  /* Edit inputs */
  #olDrBody input, #olDrBody select, #olDrBody textarea {
    background: rgba(255,255,255,.08) !important;
    border-color: rgba(148,163,200,.2) !important;
    color: #e2e8f0 !important;
  }
  [data-theme="light"] #olDrBody input,
  [data-theme="light"] #olDrBody select,
  [data-theme="light"] #olDrBody textarea {
    background: #f8fafc !important;
    border-color: #e2e8f0 !important;
    color: #0f172a !important;
  }
  [data-theme="light"] #olDrBody input:focus,
  [data-theme="light"] #olDrBody select:focus,
  [data-theme="light"] #olDrBody textarea:focus {
    border-color: #8b5cf6 !important;
    background: #fff !important;
  }

  /* Drawer footer */
  #olDrFoot { background: #0f172a; border-top-color: rgba(148,163,200,.1) !important; }
  [data-theme="light"] #olDrFoot { background: #ffffff; border-top-color: rgba(148,163,184,.15) !important; }
  [data-theme="light"] #olDrFoot button { border-color: rgba(148,163,184,.25) !important; }
  [data-theme="light"] #olDrReceiptNo { background: #f8fafc !important; border-color: #e2e8f0 !important; color: #0f172a !important; }

  /* Overlay */
  #olOverlay { background: rgba(2,6,23,.45) !important; }
  [data-theme="light"] #olOverlay { background: rgba(15,23,42,.3) !important; }

  /* Product rows */
  [data-theme="light"] .dr-prod-row input {
    background: #f8fafc !important;
    border-color: #e2e8f0 !important;
    color: #0f172a !important;
  }
  [data-theme="light"] .dr-prod-remove {
    background: rgba(239,68,68,.1) !important;
    color: #dc2626 !important;
  }
  .ol-stat-n{font-size:26px;font-weight:800;color:var(--text);line-height:1}
  .ol-stat-l{font-size:12px;color:var(--muted);margin-top:4px}
  .ol-s-warn .ol-stat-n{color:#f59e0b}
  .ol-s-green .ol-stat-n{color:#22c55e}
  .ol-s-blue .ol-stat-n{color:#7dd3fc}
  [data-theme="light"] .ol-s-blue .ol-stat-n{color:#4f46e5}

  .ol-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;margin-bottom:14px;border-radius:16px;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,200,.1)}
  [data-theme="light"] .ol-toolbar{background:#fff;border-color:rgba(148,163,184,.15)}
  .ol-tl{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
  .ol-tr{display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative}

  .ol-search-wrap{display:flex;align-items:center;gap:8px;padding:0 12px;border-radius:10px;border:1px solid rgba(148,163,200,.16);background:rgba(255,255,255,.06);height:38px;flex:1;min-width:200px}
  [data-theme="light"] .ol-search-wrap{background:#f8fafc;border-color:rgba(148,163,184,.2)}
  .ol-search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;width:100%}
  .ol-search-wrap input::placeholder{color:var(--muted);opacity:.6}

  /* ── BUTTONS ── */
  .ol-btn{height:38px;padding:0 16px;border-radius:10px;border:1px solid rgba(148,163,200,.18);background:rgba(255,255,255,.06);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .14s}
  .ol-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(148,163,200,.3)}
  [data-theme="light"] .ol-btn{background:#fff;border-color:rgba(148,163,184,.2);color:#1e293b}
  [data-theme="light"] .ol-btn:hover{background:#f1f5f9}
  .ol-btn-purple{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:#c4b5fd}
  .ol-btn-purple:hover{background:rgba(139,92,246,.22)!important;border-color:rgba(139,92,246,.5)!important}
  [data-theme="light"] .ol-btn-purple{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25);color:#4f46e5}

  /* ── DROPDOWN PANELS — position:fixed so they never overflow viewport ── */
  .ol-dropdown{position:fixed;z-index:9999;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.35);background:#1e293b;border:1px solid rgba(148,163,200,.2);width:200px;max-width:calc(100vw - 24px);box-sizing:border-box;padding:6px;display:none}
  [data-theme="light"] .ol-dropdown{background:#fff;border-color:#e2e8f0;box-shadow:0 8px 32px rgba(15,23,42,.12)}
  .ol-dropdown.open{display:block}

  /* Filter panel wider */
  #olFilterDropdown{width:260px;padding:0;overflow:hidden}
  .ol-fd-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #f1f5f9}
  [data-theme="dark"] .ol-fd-head{border-bottom-color:rgba(148,163,200,.1)}
  .ol-fd-head strong{font-size:15px;font-weight:700;color:var(--text)}
  .ol-fd-clear{font-size:13px;font-weight:600;color:#ef4444;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
  .ol-fd-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px}
  .ol-fd-field{display:flex;flex-direction:column;gap:4px}
  .ol-fd-field label{font-size:11px;font-weight:800;letter-spacing:.07em;color:#64748b;text-transform:uppercase}
  [data-theme="dark"] .ol-fd-field label{color:#94a3b8}
  .ol-fd-field select{width:100%;height:38px;padding:0 10px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;color:#0f172a;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
  .ol-fd-field select:focus{border-color:#8b5cf6}
  [data-theme="dark"] .ol-fd-field select{background:rgba(255,255,255,.08);border-color:rgba(148,163,200,.2);color:#e2e8f0}

  /* Actions panel items */
  .ol-dropdown button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border:none;background:transparent;color:var(--text);text-align:left;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border-radius:9px;transition:background .12s}
  .ol-dropdown button:hover{background:rgba(139,92,246,.14);color:#c4b5fd}
  [data-theme="light"] .ol-dropdown button:hover{background:rgba(99,102,241,.08);color:#4f46e5}
  .ol-divider{height:1px;background:rgba(148,163,200,.12);margin:4px 8px}

  /* Selected badge */
  .ol-sel{display:none;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#c4b5fd}
  .ol-sel.show{display:inline-flex;align-items:center;gap:4px}

  /* Date chip */
  .ol-date-chip{font-size:12px;color:#c4b5fd;padding:5px 12px;border-radius:20px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);white-space:nowrap;display:none}
  .ol-date-chip.show{display:inline-block}
  [data-theme="light"] .ol-date-chip{background:rgba(99,102,241,.08);color:#4f46e5;border-color:rgba(99,102,241,.2)}

  /* Active filter dot */
  .ol-filter-dot{display:none;width:8px;height:8px;border-radius:50%;background:#8b5cf6;position:absolute;top:6px;right:6px}
  .ol-filter-dot.show{display:block}

  /* Table */
  .ol-table-wrap{overflow-x:auto;max-height:calc(100vh - 340px);scrollbar-width:thin;scrollbar-color:rgba(148,163,200,.15) transparent}

  /* ── Column widths ── */
  .ol-table .ol-col-cb   { width:36px; padding:0 8px !important; }
  .ol-table .ol-col-num  { width:40px; text-align:center !important; padding:0 4px !important; }
  .ol-table .ol-col-date { width:100px; }
  .ol-table .ol-col-cust { width:160px; }
  .ol-table .ol-col-tel  { width:118px; }
  .ol-table .ol-col-prov { width:130px; }
  .ol-table .ol-col-prod { white-space:nowrap !important; overflow:hidden !important; text-overflow:ellipsis !important; min-width:200px; line-height:1.4; }
  .ol-table .ol-col-page { width:130px; }
  .ol-table .ol-col-cb2  { width:95px; }
  .ol-table .ol-col-tot  { width:100px; text-align:right !important; padding-right:32px !important; }

  /* ── Tablet: hide CloseBy ── */
  @media(max-width:1100px){
    .ol-table .ol-col-cb2,
    .ol-table th.ol-col-cb2 { display:none !important; }
  }
  /* ── Small tablet: hide Province ── */
  @media(max-width:860px){
    .ol-table .ol-col-prov,
    .ol-table th.ol-col-prov { display:none !important; }
  }

  /* ── Mobile: Card View (all phones + landscape) ── */
  @media(max-width:767px){
    #olTableCard { display:none !important; }
    #olCardList  { display:flex !important; }
  }
  @media(min-width:768px){
    #olCardList { display:none !important; }
  }
  #olCardList { flex-direction:column; gap:8px; padding:8px 0 80px; }
  .ol-card {
    background:var(--glass-bg,rgba(255,255,255,.04));
    border:1px solid rgba(148,163,184,.12);
    border-radius:14px; padding:12px 14px; cursor:pointer;
    transition:border-color .15s, box-shadow .15s;
  }
  .ol-card:hover { border-color:rgba(139,92,246,.4); box-shadow:0 4px 20px rgba(139,92,246,.1); }
  .ol-card-top  { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; gap:8px; }
  .ol-card-num  { font-size:10px; color:#8b5cf6; font-weight:700; background:rgba(139,92,246,.12); border-radius:5px; padding:1px 6px; flex-shrink:0; }
  .ol-card-name { font-size:14px; font-weight:700; flex:1; }
  .ol-card-total{ font-size:14px; font-weight:800; color:#8b5cf6; flex-shrink:0; }
  .ol-card-meta { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; font-size:11.5px; color:var(--muted,#94a3b8); margin-bottom:6px; }
  .ol-card-prod { font-size:12px; padding-top:6px; border-top:1px solid rgba(148,163,184,.1); line-height:1.7; color:var(--text,#f1f5f9); }
  [data-theme="light"] .ol-card { background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  [data-theme="light"] .ol-card-name { color:#0f172a; }
  [data-theme="light"] .ol-card-meta { color:#64748b; }
  .ol-table{
    width:100%;
    border-collapse:collapse;
    border-spacing:0;
    min-width:1000px;
    font-size:13px;
    table-layout:fixed;  /* KEY: forces columns to respect widths */
  }
  .ol-table thead th{
    position:sticky;top:0;z-index:10;
    padding:6px 12px;
    background:rgba(9,15,35,.97);
    border-bottom:2px solid rgba(148,163,200,.15);
    font-size:11px;font-weight:800;letter-spacing:.06em;
    color:var(--muted);text-transform:uppercase;
    white-space:nowrap;user-select:none;
    overflow:hidden;text-overflow:ellipsis;
    vertical-align:middle;
    text-align:left !important;  /* ALL headers left-aligned */
  }
  [data-theme="light"] .ol-table thead th{background:#f8fafc;border-bottom-color:rgba(148,163,184,.18);color:#64748b}
  /* Strict alignment — MUST come last to win over thead/td defaults */
  .ol-table thead th.ol-col-num,
  .ol-table tbody td.ol-col-num { text-align:center !important; }
  .ol-table thead th.ol-col-tot,
  .ol-table tbody td.ol-col-tot,
  .ol-table tbody td.ol-total { text-align:right !important; padding-right:32px !important; }
  .ol-table tbody td{
    padding:8px 10px;
    border-bottom:1px solid rgba(148,163,200,.07);
    color:var(--text);
    vertical-align:middle;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:left !important;
    font-size:12.5px;
    line-height:1.4;
  }
  .ol-table tbody tr{ height:auto; cursor:pointer; transition:background .12s; }
  .ol-table tbody tr:hover{ background:rgba(139,92,246,.06); }
  [data-theme="light"] .ol-table tbody tr:hover{ background:#f8fafc; }
  .ol-table thead th{ padding:8px 10px !important; font-size:10.5px !important; }
  /* Products tight line spacing */

  /* Products cell: allow wrap */
  .ol-table tbody td:nth-child(6){ white-space:normal; line-height:1.4; }
  /* Remove any right-align on total */
  .ol-total { text-align:right !important; }
  /* Checkbox col: center only */
  .ol-table thead th.ol-cb-th,
  .ol-table tbody td:first-child { text-align:center !important; }
  [data-theme="light"] .ol-table tbody td{border-bottom-color:rgba(148,163,184,.1)}

  .ol-table tbody tr:hover td{background:rgba(139,92,246,.06)}
  .ol-table tbody tr.sel td{background:rgba(139,92,246,.1)}
  [data-theme="light"] .ol-table tbody tr:hover td{background:rgba(99,102,241,.05)}
  [data-theme="light"] .ol-table tbody tr.sel td{background:rgba(99,102,241,.08)}
  .ol-table tbody tr:last-child td{border-bottom:none}
  .ol-cb-th{width:44px;text-align:center}
  .ol-sortable{cursor:pointer}
  .ol-arr{font-size:10px;opacity:.5;margin-left:2px}
  .ol-arr.asc::after{content:'↑';opacity:1}
  .ol-arr.desc::after{content:'↓';opacity:1}
  .ol-sortable:hover{color:var(--text)}
  .ol-customer{font-weight:700}
  .ol-phone{color:#60a5fa;font-size:12px}
  .ol-total{font-weight:800;color:#7dd3fc}
  [data-theme="light"] .ol-total{color:#4f46e5}
  .ol-muted{font-size:12px;color:var(--muted)}
  .ol-prod-more{font-size:11px;color:var(--muted);display:block}
  .ol-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .ol-badge.pending{background:rgba(245,158,11,.15);color:#fbbf24}
  .ol-badge.delivered{background:rgba(34,197,94,.15);color:#4ade80}
  .ol-badge.cancelled{background:rgba(239,68,68,.15);color:#f87171}
  [data-theme="light"] .ol-badge.pending{background:rgba(245,158,11,.1);color:#d97706}
  [data-theme="light"] .ol-badge.delivered{background:rgba(34,197,94,.1);color:#16a34a}
  [data-theme="light"] .ol-badge.cancelled{background:rgba(239,68,68,.1);color:#dc2626}
  /* Column widths — balanced */
  .ol-table colgroup col:nth-child(1) { width:42px }
  .ol-table colgroup col:nth-child(2) { width:100px }  /* date */
  .ol-table colgroup col:nth-child(3) { width:140px }  /* customer */
  .ol-table colgroup col:nth-child(4) { width:115px }  /* phone */
  .ol-table colgroup col:nth-child(5) { width:110px }  /* province */
  .ol-table colgroup col:nth-child(6) { width:220px }  /* products */
  .ol-table colgroup col:nth-child(7) { width:130px }  /* page */
  .ol-table colgroup col:nth-child(8) { width:100px }  /* closeby */
  .ol-table colgroup col:nth-child(9) { width:85px }   /* total */
  .ol-table colgroup col:nth-child(10){ width:85px }   /* status */
  /* Prevent overflow in cells */
  .ol-table td, .ol-table th { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:0 }
  .ol-table th { white-space:nowrap }
  /* Products column can wrap */
  .ol-table td:nth-child(6) { white-space:normal; min-width:0 }
  .ol-empty{text-align:center;padding:48px;color:var(--muted);background:transparent!important}
  .ol-footer{padding:10px 16px;border-top:1px solid rgba(148,163,200,.08);font-size:12px;color:var(--muted)}
  [data-theme="light"] .ol-footer{border-top-color:rgba(148,163,184,.12)}

  /* Date popover */
  #olDatePop{min-width:280px;right:0;left:auto;padding:10px}
  .ol-dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
  .ol-dp-grid button{padding:8px;border-radius:8px;border:1px solid rgba(148,163,200,.18);background:rgba(255,255,255,.07);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
  .ol-dp-grid button:hover,.ol-dp-grid button.active{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.4);color:#c4b5fd}
  [data-theme="light"] .ol-dp-grid button{background:#f8fafc;border-color:#e2e8f0;color:#1e293b}
  [data-theme="light"] .ol-dp-grid button:hover,[data-theme="light"] .ol-dp-grid button.active{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#4f46e5}
  .ol-dp-row{display:flex;gap:6px;align-items:center}
  .ol-dp-row input{flex:1;min-width:0;height:32px;padding:0 8px;border-radius:8px;border:1px solid rgba(148,163,200,.18);background:rgba(255,255,255,.07);color:var(--text);font-size:12px;font-family:inherit;outline:none;box-sizing:border-box;width:100%}
  [data-theme="light"] .ol-dp-row input{background:#f8fafc;border-color:#e2e8f0;color:#1e293b}
  .ol-dp-row span{color:var(--muted);font-size:12px}
  .ol-dp-row-lbl{font-size:11px;color:var(--muted);flex-shrink:0;width:28px;font-weight:600}
  .ol-dp-apply{height:32px;padding:0 12px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

  @media(max-width:900px){.ol-stats{grid-template-columns:1fr 1fr}}
  @media(max-width:600px){.ol-toolbar{flex-direction:column;align-items:stretch}.ol-tr{flex-wrap:wrap}}
  </style>
</head>
<body>
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <div class="main-content">
    <header class="shared-topbar" id="sharedHeader"></header>

    <!-- Stats -->
    <div class="ol-stats">
      <div class="ol-stat"><div class="ol-stat-n" id="olTotal">0</div><div class="ol-stat-l">សរុបការបញ្ជា</div></div>
      <div class="ol-stat ol-s-warn"><div class="ol-stat-n" id="olPending">0</div><div class="ol-stat-l">Pending</div></div>
      <div class="ol-stat ol-s-green"><div class="ol-stat-n" id="olDelivered">0</div><div class="ol-stat-l">Delivered</div></div>
      <div class="ol-stat ol-s-blue"><div class="ol-stat-n" id="olRevenue">$0</div><div class="ol-stat-l">Revenue</div></div>
    </div>

    <!-- Toolbar -->
    <div class="ol-toolbar">
      <div class="ol-tl">
        <!-- Search — same width as first stat card -->
        <div class="ol-search-wrap" style="max-width:220px;min-width:180px;flex:0 0 auto">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="olSearch" type="text" placeholder="ស្វែងរក...">
        </div>
        <!-- Filter button -->
        <button class="ol-btn" id="olFilterBtn" style="position:relative">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:5px"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>Filter
          <span class="ol-filter-dot" id="olFilterDot"></span>
        </button>
      </div>

      <div class="ol-tr">
        <!-- Selected badge -->
        <span class="ol-sel" id="olSel">Selected: <b id="olSelCnt">0</b></span>
        <!-- Date button -->
