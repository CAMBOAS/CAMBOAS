<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('cambo_theme')||'light');}catch(e){}})();</script>
  <title>Order List — CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=158">
  <link rel="stylesheet" href="../assets/css/main.css?v=158">
  <style>
  /* ── ORDER LIST INLINE STYLES ── */
  .ol-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  .ol-stat{padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,200,.1)}
  [data-theme="light"] .ol-stat{background:#fff;border-color:rgba(148,163,184,.15);box-shadow:0 2px 8px rgba(15,23,42,.05)}
  /* ══════════════════════════════════════════════
     MOBILE STABILITY — prevent wobble / shake
     ══════════════════════════════════════════════ */

  /* 1. Prevent whole-page bounce on iOS (rubber-band) */
  html, body {
    overscroll-behavior: none;
    -webkit-overflow-scrolling: auto;
  }

  /* 2. Lock BOTH html + body when drawer is open */
  html.drawer-open,
  body.drawer-open {
    overflow: hidden !important;
    position: fixed !important;
    width: 100% !important;
    height: 100% !important;
    touch-action: none !important;
  }

  /* 3. Drawer: GPU layer, NO smooth scroll (smooth scroll = wobble) */
  #olDrawer {
    background: #0f172a;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    transform: translateZ(0);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* 4. Drawer scroll area: only pan-y, no diagonal drift */
  #olDrBody {
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: auto;        /* NO smooth — causes jank on keyboard open */
    touch-action: pan-y;
  }

  /* 5. Inputs: scroll into view above keyboard, no flash */
  #olDrBody input, #olDrBody select, #olDrBody textarea {
    scroll-margin-top: 100px;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
  }

  /* 6. Overlay: block ALL touch through */
  #olOverlay {
    touch-action: none;
    overscroll-behavior: none;
  }

  /* 7. Footer: safe-area padding for iPhone home bar */
  #olDrFoot {
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  [data-theme="light"] #olDrawer { background: #ffffff; border-left-color: rgba(148,163,184,.2) !important; box-shadow: -8px 0 32px rgba(15,23,42,.12) !important; }

  /* Drawer head */
  #olDrawer > div:first-child { background: #0f172a; border-bottom-color: rgba(148,163,200,.12) !important; }
  [data-theme="light"] #olDrawer > div:first-child { background: #ffffff; border-bottom-color: rgba(148,163,184,.15) !important; }

  /* Title */
  #olDrTitle { color: #e2e8f0 !important; }
  [data-theme="light"] #olDrTitle { color: #0f172a !important; }

  /* Info cards in view mode */
  [data-theme="light"] #olDrBody > div > div {
    background: #f8fafc !important;
    border-color: rgba(148,163,184,.15) !important;
  }
  [data-theme="light"] #olDrBody span { color: #0f172a !important; }
  [data-theme="light"] #olDrBody .dr-label { color: #64748b !important; }

  /* Edit inputs — viewport has user-scalable=no so iOS won't zoom on focus */
  #olDrBody input, #olDrBody select, #olDrBody textarea {
    background: rgba(255,255,255,.08) !important;
    border-color: rgba(148,163,200,.2) !important;
    color: #e2e8f0 !important;
    touch-action: manipulation;
  }
  /* Receipt No input in footer */
  #olDrReceiptNo, #olDrFoot input {
    touch-action: manipulation;
  }
  [data-theme="light"] #olDrBody input,
  [data-theme="light"] #olDrBody select,
  [data-theme="light"] #olDrBody textarea {
    background: #f8fafc !important;
    border-color: #e2e8f0 !important;
    color: #0f172a !important;
  }
  [data-theme="light"] #olDrBody input:focus,
  [data-theme="light"] #olDrBody select:focus,
  [data-theme="light"] #olDrBody textarea:focus {
    border-color: #8b5cf6 !important;
    background: #fff !important;
  }

  /* Drawer footer */
  #olDrFoot { background: #0f172a; border-top-color: rgba(148,163,200,.1) !important; }
  [data-theme="light"] #olDrFoot { background: #ffffff; border-top-color: rgba(148,163,184,.15) !important; }
  [data-theme="light"] #olDrFoot button { border-color: rgba(148,163,184,.25) !important; }
  [data-theme="light"] #olDrReceiptNo { background: #f8fafc !important; border-color: #e2e8f0 !important; color: #0f172a !important; }

  /* Overlay */
  #olOverlay { background: rgba(2,6,23,.45) !important; }
  [data-theme="light"] #olOverlay { background: rgba(15,23,42,.3) !important; }

  /* Product rows */
  [data-theme="light"] .dr-prod-row input {
    background: #f8fafc !important;
    border-color: #e2e8f0 !important;
    color: #0f172a !important;
  }
  [data-theme="light"] .dr-prod-remove {
    background: rgba(239,68,68,.1) !important;
    color: #dc2626 !important;
  }
  .ol-stat-n{font-size:26px;font-weight:800;color:var(--text);line-height:1}
  .ol-stat-l{font-size:12px;color:var(--muted);margin-top:4px}
  .ol-s-warn .ol-stat-n{color:#f59e0b}
  .ol-s-green .ol-stat-n{color:#22c55e}
  .ol-s-blue .ol-stat-n{color:#7dd3fc}
  [data-theme="light"] .ol-s-blue .ol-stat-n{color:#4f46e5}

  /* ── Auto-refresh toast (fixed position) ── */
  .ol-new-badge{
    position:fixed;bottom:24px;right:24px;z-index:4000;
    display:flex;align-items:center;gap:8px;
    padding:10px 16px;border-radius:14px;
    background:rgba(15,23,42,.92);
    border:1px solid rgba(16,185,129,.35);
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    backdrop-filter:blur(12px);
    font-size:13px;font-weight:700;color:#34d399;
    cursor:pointer;
    transition:opacity .35s ease,transform .35s ease;
    opacity:0;transform:translateY(12px);pointer-events:none;
  }
  .ol-new-badge.show{opacity:1;transform:translateY(0);pointer-events:auto}
  .ol-new-badge:hover{background:rgba(15,23,42,.98);border-color:rgba(16,185,129,.6)}

  /* ── Sync button ── */
  .ol-sync-btn{position:relative}
  .ol-sync-dot{
    display:none;position:absolute;top:3px;right:3px;
    width:8px;height:8px;border-radius:50%;
    background:#10b981;border:1.5px solid rgba(15,23,42,.9);
  }
  .ol-sync-dot.active{display:block;animation:syncPulse 1.2s ease-in-out infinite}
  @keyframes syncPulse{
    0%,100%{transform:scale(1);opacity:1}
    50%{transform:scale(1.55);opacity:.55}
  }
  /* spinning animation when refreshing */
  .ol-sync-btn.spinning svg{animation:spinIcon .7s linear infinite}
  @keyframes spinIcon{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* Latest customer name — smaller text so it fits */
  .ol-stat-cust{font-size:13px !important;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  [data-theme="light"] .ol-new-badge{background:rgba(255,255,255,.95);color:#059669;border-color:rgba(16,185,129,.3);box-shadow:0 8px 24px rgba(0,0,0,.12)}
  .ol-toolbar{display:flex;flex-direction:row;align-items:center;gap:10px;padding:8px 12px;margin-bottom:10px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,200,.1)}
  [data-theme="light"] .ol-toolbar{background:#fff;border-color:rgba(148,163,184,.15)}
  .ol-tl{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
  .ol-tr{display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative}

  .ol-search-wrap{display:flex;align-items:center;gap:8px;padding:0 16px;border-radius:999px;border:1.5px solid rgba(148,163,200,.3);background:transparent;height:40px;flex:1;min-width:0;max-width:360px;box-sizing:border-box;transition:box-shadow .15s,border-color .15s}
  .ol-search-wrap:focus-within{border-color:rgba(139,92,246,.5);box-shadow:0 0 0 3px rgba(139,92,246,.1)}
  [data-theme="light"] .ol-search-wrap{border-color:rgba(0,0,0,.15)}
  [data-theme="light"] .ol-search-wrap:focus-within{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
  .ol-search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit;flex:1}
  .ol-search-wrap input::placeholder{color:#9ca3af;opacity:1}
  .ol-search-clear{background:none;border:none;color:#9ca3af;cursor:pointer;padding:3px;font-size:13px;flex-shrink:0;display:none;line-height:1;border-radius:50%;width:20px;height:20px;align-items:center;justify-content:center;transition:background .12s}
  .ol-search-clear:hover{background:rgba(148,163,184,.2)}
  .ol-search-clear.show{display:flex}
  .ol-btns-row{display:flex;gap:6px;flex-shrink:0;margin-left:auto}
  .ol-btn3{display:flex;align-items:center;justify-content:center;gap:5px}
  .ol-btn-icon{width:38px;padding:0!important;justify-content:center}

  /* ── BUTTONS ── */
  .ol-btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid rgba(148,163,200,.18);background:rgba(255,255,255,.06);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .14s}
  .ol-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(148,163,200,.3)}
  [data-theme="light"] .ol-btn{background:#e9ecf0;border-color:rgba(148,163,184,.3);color:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  [data-theme="light"] .ol-btn:hover{background:#dde1e7}
  .ol-btn-purple{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:#c4b5fd}
  .ol-btn-purple:hover{background:rgba(139,92,246,.22)!important;border-color:rgba(139,92,246,.5)!important}
  [data-theme="light"] .ol-btn-purple{background:#e9ecf0;border-color:rgba(148,163,184,.3);color:#1e293b}

  /* ── Mobile buttons (Smartphone) ── */
  @media(max-width:768px){
    .ol-toolbar{flex-direction:column!important;align-items:stretch!important;gap:6px!important}
    .ol-search-wrap{flex:none!important;width:100%!important}
    .ol-btns-row{gap:8px;margin-left:0}
    .ol-btns-row .ol-btn{height:44px!important;border-radius:12px;font-size:13px!important;font-weight:700;padding:0 10px!important;flex:1}
    .ol-btn-icon{width:auto!important;padding:0 10px!important}
    .ol-btns-row .ol-btn svg{width:15px;height:15px;flex-shrink:0}
  }

  /* ── DROPDOWN PANELS ── */
  .ol-dropdown{position:fixed;z-index:9999;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.35);background:#1e293b;border:1px solid rgba(148,163,200,.2);width:200px;max-width:calc(100vw - 16px);box-sizing:border-box;padding:6px;display:none;overflow:hidden}
  [data-theme="light"] .ol-dropdown{background:#fff;border-color:#e2e8f0;box-shadow:0 8px 32px rgba(15,23,42,.12)}
  .ol-dropdown.open{display:block}

  /* Backdrop for mobile bottom sheet */
  .ol-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;-webkit-tap-highlight-color:transparent}
  .ol-backdrop.show{display:block}

  /* Filter panel — desktop */
  #olFilterDropdown{width:260px;padding:0;overflow:hidden}
  #olFilterDropdown.open{display:flex;flex-direction:column}
  .ol-fd-head{flex-shrink:0}
  .ol-fd-body{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;min-height:0}

  /* Filter panel — Mobile Bottom Sheet */
  @media(max-width:768px){
    #olFilterDropdown.open{
      left:0!important;right:0!important;bottom:0!important;top:auto!important;
      width:100%!important;max-width:100%!important;max-height:85vh!important;
      border-radius:20px 20px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.4);
      animation:olSlideUp .25s ease;
    }
    .ol-fd-handle{display:flex!important}
    @keyframes olSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    #olDatePop.open, #olActDrop.open{
      left:0!important;right:0!important;bottom:0!important;top:auto!important;
      width:100%!important;max-width:100%!important;max-height:85vh!important;
      border-radius:20px 20px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.4);
      animation:olSlideUp .25s ease;overflow-y:auto;padding:0!important;
      -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    }
  }
  /* Handle bar (hidden on desktop) */
  .ol-fd-handle{display:none;justify-content:center;padding:10px 0 4px}
  .ol-fd-handle span{width:40px;height:4px;border-radius:4px;background:rgba(148,163,184,.35);display:block}
  .ol-fd-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #f1f5f9}
  [data-theme="dark"] .ol-fd-head{border-bottom-color:rgba(148,163,200,.1)}
  .ol-fd-head strong{font-size:15px;font-weight:700;color:var(--text)}
  .ol-fd-clear{font-size:13px;font-weight:600;color:#ef4444;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
  .ol-fd-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px}
  .ol-fd-field{display:flex;flex-direction:column;gap:4px}
  .ol-fd-field label{font-size:11px;font-weight:800;letter-spacing:.07em;color:#64748b;text-transform:uppercase}
  [data-theme="dark"] .ol-fd-field label{color:#94a3b8}
  .ol-fd-field select{width:100%;height:38px;padding:0 10px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;color:#0f172a;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
  .ol-fd-field select:focus{border-color:#8b5cf6}
  [data-theme="dark"] .ol-fd-field select{background:rgba(255,255,255,.08);border-color:rgba(148,163,200,.2);color:#e2e8f0}

  /* Actions panel items */
  .ol-dropdown button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border:none;background:transparent;color:var(--text);text-align:left;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border-radius:9px;transition:background .12s}
  .ol-dropdown button:hover{background:rgba(139,92,246,.14);color:#c4b5fd}
  [data-theme="light"] .ol-dropdown button:hover{background:rgba(99,102,241,.08);color:#4f46e5}
  .ol-divider{height:1px;background:rgba(148,163,200,.12);margin:4px 8px}

  /* Selected badge */
  .ol-sel{display:none;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#c4b5fd}
  .ol-sel.show{display:inline-flex;align-items:center;gap:4px}

  /* Date chip */
  .ol-date-chip{font-size:12px;color:#c4b5fd;padding:5px 12px;border-radius:20px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);white-space:nowrap;display:none}
  .ol-date-chip.show{display:inline-block}
  [data-theme="light"] .ol-date-chip{background:rgba(99,102,241,.08);color:#4f46e5;border-color:rgba(99,102,241,.2)}

  /* Active filter dot */
  .ol-filter-dot{display:none;width:8px;height:8px;border-radius:50%;background:#8b5cf6;position:absolute;top:6px;right:6px}
  .ol-filter-dot.show{display:block}

  /* Table */
  .ol-table-wrap{overflow-x:auto;max-height:calc(100vh - 260px);scrollbar-width:thin;scrollbar-color:rgba(148,163,200,.15) transparent}

  /* ── Column widths (compact for iPad/Tablet) ── */
  .ol-table .ol-col-cb   { width:22px; padding:0 4px !important; }
  .ol-table .ol-col-num  { width:24px; text-align:center !important; padding:0 2px !important; }
  .ol-table .ol-col-date { width:82px; }
  .ol-table .ol-col-cust { width:130px; }
  .ol-table .ol-col-tel  { width:100px; }
  .ol-table .ol-col-prov { width:110px; }
  .ol-table .ol-col-prod { white-space:nowrap !important; overflow:hidden !important; text-overflow:ellipsis !important; width:155px; min-width:155px; line-height:1.4; }
  .ol-table .ol-col-page { width:105px; }
  .ol-table .ol-col-cb2  { width:82px; }
  .ol-table .ol-col-tot  { width:78px; text-align:right !important; padding-right:16px !important; }

  /* ── Tablet ≤1100px: hide CloseBy + Date ── */
  @media(max-width:1100px){
    .ol-table .ol-col-cb2,
    .ol-table th.ol-col-cb2 { display:none !important; }
    .ol-table .ol-col-date,
    .ol-table th.ol-col-date { display:none !important; }
  }
  /* ── Small tablet ≤860px: also hide Province ── */
  @media(max-width:860px){
    .ol-table .ol-col-prov,
    .ol-table th.ol-col-prov { display:none !important; }
  }

  /* ══════════════════════════════════════
     MOBILE RESPONSIVE — Smartphone ≤ 767px
     ══════════════════════════════════════ */
  @media(max-width:767px){

    /* Stats: 2 columns instead of 4 */
    .ol-stats { grid-template-columns: repeat(2,1fr) !important; gap:8px !important; }
    .ol-stat  { padding:12px 14px !important; }
    .ol-stat-n{ font-size:22px !important; }

    /* Toolbar: stack search + buttons */
    .ol-toolbar { padding:8px 10px !important; gap:6px !important; }
    .ol-tl { min-width:0 !important; }
    .ol-search-wrap { min-width:0 !important; height:36px !important; }
    .ol-btn { height:36px !important; padding:0 10px !important; font-size:12px !important; }

    /* Table → Card view */
    #olTableCard { display:none !important; }
    #olCardList  { display:flex !important; }

    /* Drawer: full screen on mobile, start BELOW navbar */
    #olDrawer {
      width:100vw !important;
      top: var(--topbar-offset, 56px) !important;
      right:0 !important; bottom:0 !important; left:0 !important;
      border-left:none !important;
      border-radius:0 !important;
    }
    /* Overlay also starts below navbar */
    #olOverlay {
      top: var(--topbar-offset, 56px) !important;
    }

    /* Drawer header */
    #olDrawer > div:first-child {
      padding:12px 14px !important;
    }
    #olDrTitle { font-size:15px !important; }

    /* Drawer body padding */
    #olDrBody { padding:12px 14px !important; }

    /* drRow label column narrower */
    .dr-label { font-size:12px !important; }

    /* Products grid — hide Unit column on very small */
    #olDrBody [style*="grid-template-columns:1fr 46px 58px 65px 58px"] {
      grid-template-columns: 1fr 36px 50px 55px !important;
    }

    /* Footer action buttons: single row, compact */
    #olDrFoot { padding:8px 12px !important; gap:6px !important; }
    #olDrFoot > div:first-child { gap:6px !important; }
    #olDrFoot > div:last-child {
      display:flex !important;
      flex-direction:row !important;
      gap:6px !important;
    }
    #olDrFoot > div:last-child button {
      height:42px !important;
      flex:1 !important;
      border-radius:10px !important;
      min-width:0 !important;
    }
    /* Grand total font */
    #olDrBody [style*="font-size:18px"] { font-size:16px !important; }
  }

  /* ── Mobile: Card View (all phones + landscape) ── */
  @media(max-width:767px){
    #olTableCard { display:none !important; }
    #olCardList  { display:flex !important; }
  }
  @media(min-width:768px){
    #olCardList { display:none !important; }
  }
  #olCardList { flex-direction:column; gap:8px; padding:8px 0 80px; }
  .ol-card {
    background:var(--glass-bg,rgba(255,255,255,.04));
    border:1px solid rgba(148,163,184,.12);
    border-radius:14px; padding:12px 14px; cursor:pointer;
    transition:border-color .15s, box-shadow .15s;
    position:relative; touch-action:manipulation;
  }
  .ol-item-badge{position:absolute;bottom:10px;right:10px;min-width:22px;height:22px;border-radius:11px;background:#3b82f6;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;line-height:1;box-shadow:0 2px 6px rgba(59,130,246,.4)}
  .ol-card:hover { border-color:rgba(139,92,246,.4); box-shadow:0 4px 20px rgba(139,92,246,.1); }
  .ol-card-top  { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .ol-card-num  { font-size:10px; color:#8b5cf6; font-weight:700; background:rgba(139,92,246,.12); border-radius:5px; padding:2px 6px; flex-shrink:0; }
  .ol-card-name { font-size:14px; font-weight:700; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ol-card-phone{ font-size:12px; font-weight:600; color:#3b82f6; flex:1; text-align:center; white-space:nowrap; }
  .ol-card-total{ font-size:14px; font-weight:800; color:#ef4444; flex-shrink:0; }
  .ol-card-info { display:flex; align-items:stretch; gap:0; font-size:11.5px; color:var(--muted,#94a3b8); margin-bottom:6px; }

  .ol-table thead th{ padding:8px 10px !important; font-size:10.5px !important; }
  /* Products tight line spacing */

  /* Prevent overflow in cells */

<body>
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <div class="main-content">
    <header class="shared-topbar" id="sharedHeader"></header>

    <!-- Stats -->
    <div class="ol-stats">
      <div class="ol-stat ol-s-blue"><div class="ol-stat-n" id="olRevenue">$0</div><div class="ol-stat-l">Revenue</div></div>
      <div class="ol-stat"><div class="ol-stat-n" id="olTotal">0</div><div class="ol-stat-l">Total Orders</div></div>
      <div class="ol-stat ol-s-warn" style="gap:2px" title="Top Agent">
        <div class="ol-stat-n ol-stat-cust" id="olTopAgent">—</div>
        <div id="olTopAgentCount" style="font-size:11px;color:var(--muted);font-weight:500"></div>
        <div class="ol-stat-l">Top CloseBy Sale</div>
      </div>
      <div class="ol-stat ol-s-green" title="Latest Customer" style="gap:2px">
        <div class="ol-stat-n ol-stat-cust" id="olLatestCust">—</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span id="olLatestPhone" style="font-size:11px;color:var(--muted);font-weight:500"></span>
          <span id="olLatestTotal" style="font-size:11px;font-weight:700;color:#a78bfa"></span>
        </div>
        <div class="ol-stat-l">Latest Customer</div>
      </div>
    </div>

    <!-- Auto-refresh new orders badge -->
    <div class="ol-new-badge" id="olNewBadge" onclick="olDismissNewBadge()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span id="olNewBadgeText">order ថ្មី</span>
      <span style="margin-left:auto;font-size:11px;opacity:.7">ចុចដើម្បីបើក</span>
    </div>

    <!-- Toolbar -->
    <div class="ol-toolbar">
      <!-- Search full width -->
      <div class="ol-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="olSearch" type="text" placeholder="ស្វែងរក...">
        <button class="ol-search-clear" id="olSearchClear" onclick="var i=document.getElementById('olSearch');i.value='';this.classList.remove('show');i.dispatchEvent(new Event('input'))">✕</button>
      </div>
      <!-- 3 equal buttons -->
      <div class="ol-btns-row">
        <span class="ol-sel" id="olSel">Selected: <b id="olSelCnt">0</b></span>
        <span class="ol-date-chip" id="olDateChip"></span>
        <button class="ol-btn ol-btn3" id="olDateBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Today
        </button>
        <button class="ol-btn ol-btn3 ol-btn-icon ol-sync-btn" id="olSyncBtn" onclick="olDismissNewBadge()" title="Sync / Refresh">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          <span class="ol-sync-dot" id="olSyncDot"></span>
        </button>
        <button class="ol-btn ol-btn3 ol-btn-icon" id="olFilterBtn" style="position:relative" title="Filter">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          <span class="ol-filter-dot" id="olFilterDot"></span>
        </button>
        <button class="ol-btn ol-btn3 ol-btn-icon ol-csb-mobbtn" id="olCardSelBtn"
          onclick="olExitCardSel()" title="Cancel Select">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="ol-btn ol-btn3 ol-btn-purple ol-btn-icon" id="olActBtn" title="Actions">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="19" r="1.2" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Table (desktop) -->
    <div id="olTableCard" class="glass-card" style="padding:0;overflow:hidden">
      <div class="ol-table-wrap">
        <table class="ol-table">

            <th class="ol-col-tel"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>PHONE</span></th>
            <th class="ol-col-prov"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>PROVINCE</span></th>
            <th class="ol-col-prod"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>PRODUCTS</span></th>
            <th class="ol-col-page"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>PAGE</span></th>
            <th class="ol-col-cb2"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>CLOSEBY</span></th>
            <th class="ol-col-tot ol-sortable" data-col="total"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>TOTAL <span class="ol-arr" id="arr-total"></span></span></th>
            <th class="ol-col-date ol-sortable" data-col="date"><span class="ol-th-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>DATE <span class="ol-arr" id="arr-date"></span></span></th>
          </tr></thead>
          <tbody id="olBody"><tr><td colspan="10" class="ol-empty">⏳ Loading...</td></tr></tbody>
