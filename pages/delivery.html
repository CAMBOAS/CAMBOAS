<!DOCTYPE html>
<html lang="km">
<head>
  <script>(function(){var r=localStorage.getItem('cambo_login_required');if(r==='false')return;var k='cambo_session';if(sessionStorage.getItem(k)==='1'||localStorage.getItem(k)==='1')return;document.documentElement.style.visibility='hidden';location.replace('../login.html');})();</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Delivery - CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=158">
  <link rel="stylesheet" href="../assets/css/main.css?v=158">
  <style>
    .dw{display:grid;gap:18px}
    .stats-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}
    .kpi{padding:14px 16px;border-radius:18px}
    .kpi span{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .kpi strong{display:block;margin-top:7px;font-size:22px;color:var(--text)}
    .dp{padding:20px 22px;border-radius:22px}
    .dp-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .dp-head h3{margin:0;font-size:16px;font-weight:700;color:var(--text)}
    .stabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
    .stab{padding:6px 13px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
    .stab.on{background:rgba(6,182,212,.12);border-color:rgba(6,182,212,.3);color:#7dd3fc}
    .dgrid{display:grid;gap:10px}
    .dc{padding:15px 18px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,200,.1);transition:.15s}
    .dc:hover{border-color:rgba(6,182,212,.22)}
    .dc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
    .dc-id{color:#7dd3fc;font-weight:800;font-size:12px;margin-bottom:3px}
    .dc-name{font-size:15px;font-weight:700;color:var(--text)}
    .dc-addr{font-size:12px;color:var(--muted);margin-top:2px}
    .dc-right{text-align:right;flex-shrink:0}
    .dc-amt{font-size:14px;font-weight:800;color:#7dd3fc;margin-top:5px}
    .dc-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center;font-size:12px;color:var(--muted)}
    .pill{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid}
    .p-pending{background:rgba(251,191,36,.1);color:#fde68a;border-color:rgba(251,191,36,.18)}
    .p-processing{background:rgba(6,182,212,.1);color:#7dd3fc;border-color:rgba(6,182,212,.2)}
    .p-shipped{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:rgba(139,92,246,.2)}
    .p-delivered{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.2)}
    .p-cancelled{background:rgba(239,68,68,.1);color:#fca5a5;border-color:rgba(239,68,68,.2)}
    .track{display:flex;align-items:flex-start;gap:0;margin-top:10px;position:relative}
    .track::before{content:'';position:absolute;top:9px;left:9px;right:9px;height:2px;background:rgba(148,163,200,.14);z-index:0}
    .ts{flex:1;text-align:center;position:relative;z-index:1}
    .td{width:18px;height:18px;border-radius:50%;border:2px solid rgba(148,163,200,.2);background:var(--bg,#090b16);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
    .td.done{background:linear-gradient(135deg,#8b5cf6,#06b6d4);border-color:transparent;color:#fff}
    .td.cur{background:rgba(6,182,212,.18);border-color:#06b6d4;color:#7dd3fc}
    .tl{font-size:9px;color:var(--muted)}
    .tl.active{color:#7dd3fc}
    .schange{background:rgba(255,255,255,.06)!important;border:1px solid var(--line)!important;border-radius:8px!important;color:var(--text)!important;padding:4px 8px!important;font-size:11px!important;cursor:pointer;min-height:auto!important}
    .dc-update{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
    .dc-update span{font-size:12px;color:var(--muted)}
    .btn-refresh{min-height:36px;padding:0 14px;border-radius:10px;font-size:13px;font-weight:700;background:rgba(6,182,212,.12);color:#7dd3fc;border:1px solid rgba(6,182,212,.3);cursor:pointer;font-family:inherit;transition:.15s}
    .btn-refresh:hover{background:rgba(6,182,212,.2)}
    .btn-refresh:disabled{opacity:.5;cursor:not-allowed}
    @media(max-width:1000px){.stats-row{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media(max-width:640px){.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
<div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="dashboard">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <main class="main-content">
    <div class="shared-topbar" id="sharedHeader"></div>
    <div class="dw">
      <section class="glass-card" style="padding:20px 24px;border-radius:22px">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <div><h2 style="margin:0 0 4px;color:var(--text)">Delivery</h2><p style="margin:0;color:var(--muted);font-size:14px">ត្រួតពិនិត្យ និងគ្រប់គ្រងការដឹកជញ្ជូន</p></div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="date" id="dDate" onchange="rd()" style="min-height:36px;padding:0 10px;border-radius:10px;font-size:13px">
            <button class="btn btn-secondary" onclick="document.getElementById('dDate').value='';rd()">Clear</button>
            <button class="btn-refresh" id="btnRefresh" onclick="loadDelivery()">⟳ Refresh</button>
            <button class="btn" id="btnDeliveryReport"
              style="min-height:36px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:700;
                     background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#fff;border:none;cursor:pointer;
                     display:flex;align-items:center;gap:6px;font-family:inherit;"
              onclick="exportDeliveryReport()">
              📋 Report Delivery
            </button>
          </div>
        </div>
      </section>
      <div class="stats-row">
        <article class="glass-card kpi"><span>Total</span><strong id="sTot">0</strong></article>
        <article class="glass-card kpi"><span>Pending</span><strong id="sPend" style="color:#fde68a">0</strong></article>
        <article class="glass-card kpi"><span>Processing</span><strong id="sProc" style="color:#7dd3fc">0</strong></article>
        <article class="glass-card kpi"><span>Shipped</span><strong id="sShip" style="color:#c4b5fd">0</strong></article>
        <article class="glass-card kpi"><span>Delivered</span><strong id="sDone" style="color:#86efac">0</strong></article>
      </div>
      <article class="glass-card dp">
        <div class="dp-head">
          <h3>Delivery List</h3>
          <input type="text" id="dsrch" placeholder="ស្វែងរក..." oninput="rd()" style="min-height:36px;padding:0 12px;border-radius:10px;font-size:13px;width:220px">
        </div>
        <div class="stabs" id="tabs"></div>
        <div class="dgrid" id="dgrid"></div>
      </article>
    </div>
  </main>
</div>
<script src="../assets/js/layout.js?v=158"></script>
<script src="../assets/js/dashboard-layout.js?v=158"></script>
<script src="../assets/js/cambo-api.js?v=158"></script>
<script src="../assets/js/orders-data.js?v=158"></script>
<script src="../assets/js/export-delivery-report.js?v=158"></script>
<script>
const STEPS = ['Pending','Processing','Shipped','Delivered'];
const SM    = {Pending:0, Processing:1, Shipped:2, Delivered:3};
let active  = 'All';
let D       = [];
let _loading = false;

/* Map a real order object → delivery card data */
function mapOrder(o){
  return {
    id:          o.id || o.orderId || '',
    name:        o.customer || '-',
    phone:       o.phone || '-',
    addr:        o.province || '-',
    prod:        (o.products||[]).map(p=>(p.name||'-')+' ×'+(p.qty||1)).join(', ') || '-',
    amt:         CamboOrdersData.calcOrderTotal(o),
    st:          o.status || 'Pending',
    date:        CamboOrdersData.toYMD(o.date) || '',          // YYYY-MM-DD for filter
    dateDisplay: CamboOrdersData.formatDate(o.date),           // DD/MM/YYYY for display
    delivery:    CamboOrdersData.normalizeDeliveryName(o.deliveryName||'') || '-',
    deliveryFee: Number(o.deliveryFee||0),
    closeBy:     o.closeBy || '-',
    payment:     o.payment || '-',
  };
}

/* Fetch real orders from Apps Script */
async function loadDelivery(){
  if(_loading) return;
  _loading = true;
  const btn = document.getElementById('btnRefresh');
  if(btn) btn.disabled = true;
  document.getElementById('dgrid').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--muted)">⏳ កំពុងទាញទិន្នន័យ...</div>';
  try{
    const orders = await CamboOrdersData.fetchOrders(2000);
    D = orders.map(mapOrder);
    // Sort newest first (YYYY-MM-DD string compare is safe)
    D.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  }catch(e){
    document.getElementById('dgrid').innerHTML =
      '<div style="text-align:center;padding:40px;color:#f87171">⚠️ ទាញទិន្នន័យបានបរាជ័យ — សូម Refresh ម្ដងទៀត</div>';
    _loading = false;
    if(btn) btn.disabled = false;
    return;
  }
  _loading = false;
  if(btn) btn.disabled = false;
  rd();
}

function sc(si,cur){ const ci=SM[cur]??-1; return si<ci?'done':si===ci?'cur':''; }

/* Return current filtered list */
function filteredD(){
  const q  = (document.getElementById('dsrch').value||'').toLowerCase();
  const df = document.getElementById('dDate').value;
  return D.filter(d=>(
    (!q  || d.name.toLowerCase().includes(q) ||
             d.id.toLowerCase().includes(q)  ||
             d.phone.includes(q)             ||
             d.addr.toLowerCase().includes(q)) &&
    (active==='All' || d.st===active) &&
    (!df || d.date===df)
  ));
}

/* Update stats KPI cards */
function us(){
  const list = filteredD();
  document.getElementById('sTot').textContent  = list.length;
  document.getElementById('sPend').textContent = list.filter(d=>d.st==='Pending').length;
  document.getElementById('sProc').textContent = list.filter(d=>d.st==='Processing').length;
  document.getElementById('sShip').textContent = list.filter(d=>d.st==='Shipped').length;
  document.getElementById('sDone').textContent = list.filter(d=>d.st==='Delivered').length;
}

/* Render delivery cards */
function rd(){
  const list = filteredD();
  us();
  const el = document.getElementById('dgrid');
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">មិនមានការដឹកជញ្ជូន</div>';
    return;
  }
  el.innerHTML = list.map(d=>`
    <div class="dc">
      <div class="dc-top">
        <div>
          <div class="dc-id">${d.id}</div>
          <div class="dc-name">${d.name}</div>
          <div class="dc-addr">📍 ${d.addr} &nbsp;·&nbsp; 📞 ${d.phone}</div>
        </div>
        <div class="dc-right">
          <span class="pill p-${d.st.toLowerCase()}">${d.st}</span>
          <div class="dc-amt">$${d.amt.toFixed(2)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">📅 ${d.dateDisplay||d.date||'-'}</div>
        </div>
      </div>
      <div class="dc-meta">
        <span>🛍️ ${d.prod}</span>
        ${d.delivery&&d.delivery!=='-'?`<span>🚚 ${d.delivery}</span>`:''}
        ${d.deliveryFee>0?`<span>ថ្លៃដឹក: $${d.deliveryFee.toFixed(2)}</span>`:''}
        ${d.closeBy&&d.closeBy!=='-'?`<span>👤 ${d.closeBy}</span>`:''}
        ${d.payment&&d.payment!=='-'?`<span>💳 ${d.payment}</span>`:''}
      </div>
      ${d.st!=='Cancelled'?`<div class="track">${STEPS.map((s,i)=>`<div class="ts"><div class="td ${sc(i,d.st)}">${sc(i,d.st)==='done'?'✓':i+1}</div><div class="tl ${sc(i,d.st)?'active':''}">${s}</div></div>`).join('')}</div>`:''}
      <div class="dc-update"><span>Update:</span>
        <select class="schange" onchange="upd('${d.id}',this.value)">
          ${['Pending','Processing','Shipped','Delivered','Cancelled'].map(s=>`<option${s===d.st?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>`).join('');
}

/* Update status locally */
function upd(id,st){
  const d = D.find(x=>x.id===id);
  if(!d) return;
  d.st = st;
  if(window.CamboAPI){
    CamboAPI.post({action:'updateStatus', orderId:id, status:st}).catch(()=>{});
  }
  rd();
}

function initTabs(){
  const all=['All','Pending','Processing','Shipped','Delivered','Cancelled'];
  document.getElementById('tabs').innerHTML = all.map(s=>
    `<button class="stab${s===active?' on':''}" onclick="setT('${s}')">${s}</button>`
  ).join('');
}
function setT(s){ active=s; initTabs(); rd(); }

document.addEventListener('DOMContentLoaded',()=>{
  // Default to today's date so user sees only today's deliveries
  const todayYMD = (function(){
    const n=new Date();
    return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  })();
  document.getElementById('dDate').value = todayYMD;
  initTabs();
  loadDelivery();
});

/* ── Report Delivery Export ── */
function exportDeliveryReport(){
  const src = filteredD();
  if(!src.length){ _dvToast('មិនមានទិន្នន័យ','#fbbf24'); return; }
  const delivTitle = active!=='All' ? active : 'ភ្នំពេញ';
  if(typeof window.CamboDeliveryReport==='undefined'){
    _dvToast('CamboDeliveryReport not loaded','#f87171'); return;
  }
  window.CamboDeliveryReport.exportRows(src, {
    exchangeRate: 4100,
    title: delivTitle
  });
}
</script>
<script>
function _dvToast(msg,color){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.3);background:'+(color||'#1e293b')+';transition:opacity .3s';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},3000);
}
</script>
<script src="../assets/js/sw-register.js?v=158"></script>
</body>
</html>
