<!DOCTYPE html><html lang="km"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script><title>Customers - CAMBO MINI</title><link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png"><link rel="shortcut icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png"><link rel="apple-touch-icon" href="../images/logo/LOGO%20CAMBOMINI.png"><link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css"><link rel="stylesheet" href="../assets/css/main.css"><style>.customers-wrap{display:grid;gap:18px}.customers-hero{padding:22px 24px;border-radius:24px}.hero-row{display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap}.hero-row h2{margin:0 0 6px;color:var(--text)}.hero-row p{margin:0;color:var(--muted)}.customer-tools{display:flex;gap:10px;flex-wrap:wrap}.customer-tools input,.customer-tools select{min-height:42px;padding:0 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text)}.customer-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.list-card,.detail-card{padding:20px;border-radius:24px}.customer-list{display:grid;gap:12px;max-height:70vh;overflow:auto}.customer-item{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.14);cursor:pointer}.customer-item.active{border-color:rgba(125,211,252,.38);box-shadow:0 16px 34px rgba(6,182,212,.12)}.customer-item strong{display:block;color:var(--text)}.customer-item span{display:block;color:var(--muted);font-size:13px}.customer-meta{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.chip{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(148,163,184,.14);color:var(--text);font-size:12px;font-weight:700}.detail-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start}.detail-top h3{margin:0;color:var(--text)}.detail-top p{margin:4px 0 0;color:var(--muted)}.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}.summary-box{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.14)}.summary-box span{font-size:12px;font-weight:800;color:#8fb6d9;letter-spacing:.1em;text-transform:uppercase}.summary-box strong{display:block;margin-top:8px;color:var(--text);font-size:20px}.history-list{display:grid;gap:12px;margin-top:18px}.history-row{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.14)}.history-row-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.history-row strong{color:var(--text)}.history-row span,.history-row p{color:var(--muted);font-size:13px;margin:4px 0 0}.history-products{margin-top:8px;color:var(--text);font-size:14px}.priority-pill{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}.priority-high{background:rgba(239,68,68,.16);color:#fecaca;border:1px solid rgba(239,68,68,.28)}.priority-medium{background:rgba(139,92,246,.16);color:#ddd6fe;border:1px solid rgba(139,92,246,.26)}.priority-low{background:rgba(34,197,94,.14);color:#bbf7d0;border:1px solid rgba(34,197,94,.26)}@media(max-width:1080px){.customer-grid{grid-template-columns:1fr}.summary-grid{grid-template-columns:1fr 1fr}}@media(max-width:640px){.customers-hero,.list-card,.detail-card{padding:16px}.summary-grid{grid-template-columns:1fr}}</style></head><body><div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="dashboard"><div class="sidebar-overlay"></div><aside class="sidebar" id="sharedSidebar"></aside><main class="main-content"><div class="shared-topbar" id="sharedHeader"></div><div class="customers-wrap"><section class="glass-card customers-hero"><div class="hero-row"><div><h2>Customer History</h2><p>មើលប្រវត្តិអតិថិជន និងយក data ចាស់ៗទៅប្រើបន្តបានលឿន</p></div><div class="customer-tools"><input id="customerSearch" type="text" placeholder="Search customer or phone"><select id="customerProvince"><option value="">All Provinces</option></select></div></div></section><section class="customer-grid"><article class="glass-card list-card"><h3 class="card-title" style="margin:0 0 14px;color:var(--text)">Customer List</h3><div class="customer-list" id="customerList"></div></article><article class="glass-card detail-card"><div id="customerDetailEmpty" class="mini-item"><span>ជ្រើសរើសអតិថិជនម្នាក់ ដើម្បីមើល history</span></div><div id="customerDetail" hidden><div class="detail-top"><div><h3 id="detailCustomerName">-</h3><p id="detailCustomerMeta">-</p></div><button class="btn" id="copyCustomerSummary" type="button">Copy Summary</button></div><div class="summary-grid"><div class="summary-box"><span>Total Orders</span><strong id="detailTotalOrders">0</strong></div><div class="summary-box"><span>Total Spend</span><strong id="detailTotalSpend">$0</strong></div><div class="summary-box"><span>Last Order</span><strong id="detailLastOrder">-</strong></div></div><div class="history-list" id="customerHistoryList"></div></div></article></section></div></main></div><script src="../assets/js/layout.js"></script><script src="../assets/js/dashboard-layout.js"></script><script src="../assets/js/orders-data.js"></script><script src="../assets/js/customers-live.js"></script></body></html>
