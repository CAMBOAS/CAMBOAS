<!DOCTYPE html>
<html lang="km">
<head>
  <script>(function(){var r=localStorage.getItem('cambo_login_required');if(r==='false')return;var k='cambo_session';if(sessionStorage.getItem(k)==='1'||localStorage.getItem(k)==='1')return;document.documentElement.style.visibility='hidden';location.replace('../login.html');})();</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Products - CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=158">
  <link rel="stylesheet" href="../assets/css/main.css?v=158">
  <style>
    .pw{display:grid;gap:18px}
    .stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .kpi{padding:16px 18px;border-radius:20px}
    .kpi span{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .kpi strong{display:block;margin-top:8px;font-size:24px;color:var(--text)}
    .cat-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .ctab{padding:7px 15px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
    .ctab.on{background:rgba(6,182,212,.12);border-color:rgba(6,182,212,.3);color:#7dd3fc}
    .pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .pc{padding:14px;border-radius:18px;cursor:pointer;transition:.2s}
    .pc:hover{transform:translateY(-2px)}
    .pimg{width:100%;height:130px;border-radius:12px;overflow:hidden;margin-bottom:10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
    .pimg img{width:100%;height:130px;object-fit:cover;border-radius:12px;display:block}
    .pname{font-size:13px;font-weight:700;color:var(--text);margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pcat{font-size:11px;color:var(--muted);margin:0 0 9px;text-transform:capitalize}
    .pfoot{display:flex;justify-content:space-between;align-items:center}
    .pprice{font-size:14px;font-weight:800;color:#7dd3fc}
    .stk{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700;border:1px solid}
    .sk-ok{background:rgba(34,197,94,.1);color:#86efac;border-color:rgba(34,197,94,.2)}
    .sk-lo{background:rgba(251,191,36,.1);color:#fde68a;border-color:rgba(251,191,36,.18)}
    .sk-no{background:rgba(239,68,68,.1);color:#fca5a5;border-color:rgba(239,68,68,.2)}
    @media(max-width:900px){.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
<div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="dashboard">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <main class="main-content">
    <div class="shared-topbar" id="sharedHeader"></div>
    <div class="pw">

      <section class="glass-card" style="padding:20px 24px;border-radius:22px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
          <div><h2 style="margin:0 0 4px;color:var(--text)">Products</h2><p style="margin:0;color:var(--muted);font-size:14px">គ្រប់គ្រងផលិតផល CAMBO MINI</p></div>
          <div style="display:flex;gap:8px">
            <input type="text" id="srch" placeholder="ស្វែងរក..." oninput="fp()" style="min-height:38px;padding:0 12px;border-radius:10px;font-size:13px;width:180px">
            <select id="srt" onchange="fp()" style="min-height:38px;padding:0 12px;border-radius:10px;font-size:13px">
              <option value="name">Sort: Name</option>
              <option value="price">Sort: Price</option>
              <option value="stock">Sort: Stock</option>
            </select>
          </div>
        </div>
      </section>

      <div class="stats-row">
        <article class="glass-card kpi"><span>Total Products</span><strong id="stTot">0</strong></article>
        <article class="glass-card kpi"><span>In Stock</span><strong id="stOk" style="color:#86efac">0</strong></article>
        <article class="glass-card kpi"><span>Low Stock</span><strong id="stLo" style="color:#fde68a">0</strong></article>
        <article class="glass-card kpi"><span>Out of Stock</span><strong id="stNo" style="color:#fca5a5">0</strong></article>
      </div>

      <div class="cat-tabs" id="tabs"></div>
      <div class="pg" id="pgrid"></div>
    </div>
  </main>
</div>
<script src="../assets/js/layout.js?v=158"></script>
<script src="../assets/js/dashboard-layout.js?v=158"></script>
<script>
var PRODS = [];
var activeCat = 'all';

// Map Sheet type string → category key
function catKey(type) {
  var t = (type || '').toLowerCase();
  if (t.includes('face'))  return 'face';
  if (t.includes('body'))  return 'body';
  if (t.includes('hair'))  return 'hair';
  if (t.includes('drink')) return 'drink';
  return 'other';
}
var CAT_LABEL = { face:'😊 Face', body:'🧴 Body', hair:'💆 Hair', drink:'☕ Drink', other:'📦 Other' };

function normStr(s) { return String(s||'').toLowerCase().replace(/\s+/g,''); }
function sc(s) { return s===null?'':s===0?'sk-no':s<10?'sk-lo':'sk-ok'; }
function sl(s) { return s===null?'':s===0?'Out of Stock':s<10?'Low: '+s:'In: '+s; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fp() {
  var q   = document.getElementById('srch').value.toLowerCase();
  var srt = document.getElementById('srt').value;
  var list = PRODS.filter(function(p) {
    return (!q || p.name.toLowerCase().includes(q)) &&
           (activeCat === 'all' || p.cat === activeCat);
  });
  if (srt === 'price')      list.sort(function(a,b){ return a.price - b.price; });
  else if (srt === 'stock') list.sort(function(a,b){ return (b.stock===null?-1:b.stock) - (a.stock===null?-1:a.stock); });
  else                      list.sort(function(a,b){ return a.name.localeCompare(b.name, 'km'); });

  var el = document.getElementById('pgrid');
  if (!list.length) {
    el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">មិនមានផលិតផល</div>';
    return;
  }
  el.innerHTML = list.map(function(p) {
    var sClass = sc(p.stock);
    var sLabel = sl(p.stock);
    return '<article class="glass-card pc">' +
      '<div class="pimg"><img src="' + esc(p.img) + '" loading="lazy" onerror="this.parentNode.innerHTML=\'<span style=font-size:48px>\u{1F4E6}</span>\'" alt="' + esc(p.name) + '"></div>' +
      '<p class="pname">' + esc(p.name) + '</p>' +
      '<p class="pcat">' + esc(p.type) + '</p>' +
      '<div class="pfoot">' +
        '<span class="pprice">$' + p.price.toFixed(2) + '</span>' +
        (sLabel ? '<span class="stk ' + sClass + '">' + sLabel + '</span>' : '') +
      '</div>' +
    '</article>';
  }).join('');
}

function initTabs(cats) {
  document.getElementById('tabs').innerHTML = ['all'].concat(cats).map(function(c) {
    return '<button class="ctab' + (c === activeCat ? ' on' : '') + '" onclick="setC(event,\'' + c + '\')">' +
      (c === 'all' ? 'All Products' : (CAT_LABEL[c] || c)) + '</button>';
  }).join('');
}

function setC(e, c) {
  activeCat = c;
  document.querySelectorAll('.ctab').forEach(function(b){ b.classList.remove('on'); });
  e.target.classList.add('on');
  fp();
}

function updateStats() {
  var withStock = PRODS.filter(function(p){ return p.stock !== null; });
  document.getElementById('stTot').textContent = PRODS.length;
  document.getElementById('stOk').textContent  = withStock.filter(function(p){ return p.stock > 10; }).length;
  document.getElementById('stLo').textContent  = withStock.filter(function(p){ return p.stock > 0 && p.stock <= 10; }).length;
  document.getElementById('stNo').textContent  = withStock.filter(function(p){ return p.stock === 0; }).length;
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pgrid').innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">⏳ Loading...</div>';

  if (!window.CamboAPI) return;

  Promise.all([
    window.CamboAPI.get({ action: 'products' }),
    window.CamboAPI.get({ action: 'stroke'   })
  ]).then(function(res) {
    var products = (res[0] && res[0].ok) ? (res[0].products || []) : [];
    var stocks   = (res[1] && res[1].ok) ? (res[1].stroke   || []) : [];

    // Build stock lookup by ID and by name
    var stockById   = {};
    var stockByName = {};
    stocks.forEach(function(s) {
      if (s.id)      stockById[normStr(s.id)]      = s;
      if (s.product) stockByName[normStr(s.product)] = s;
    });

    var catOrder = ['face','body','hair','drink','other'];
    var catsFound = {};

    PRODS = products.map(function(p) {
      var ck  = catKey(p.type);
      var st  = stockById[normStr(p.id)] || stockByName[normStr(p.name)] || null;
      var qty = st ? (st.qty !== undefined ? st.qty : null) : null;
      // Image: use Sheet URL if present, else try local file by product name
      var imgUrl = p.url || ('../images/products/' + ck + '/' + p.name + '.png');
      catsFound[ck] = true;
      return { id:p.id, name:p.name, cat:ck, type:p.type, price:p.price, stock:qty, img:imgUrl };
    });

    var cats = catOrder.filter(function(c){ return catsFound[c]; });
    initTabs(cats);
    updateStats();
    fp();
  }).catch(function() {
    document.getElementById('pgrid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">⚠️ Load failed — សូម Refresh ម្ដងទៀត</div>';
  });
});
</script>
<script src="../assets/js/sw-register.js?v=158"></script>
</body>
</html>
