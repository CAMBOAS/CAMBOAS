<!DOCTYPE html>
<html lang="km">
<head>
  <script>(function(){var r=localStorage.getItem('cambo_login_required');if(r==='false')return;var k='cambo_session';if(sessionStorage.getItem(k)==='1'||localStorage.getItem(k)==='1')return;document.documentElement.style.visibility='hidden';location.replace('../login.html');})();</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Products - CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=161">
  <link rel="stylesheet" href="../assets/css/main.css?v=161">
  <style>
    /* ── Page wrapper ── */
    .pw { display:grid; gap:20px }

    /* ── Top bar ── */
    .ptop { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px }
    .ptop-left h2 { margin:0 0 2px; font-size:22px; font-weight:800; color:var(--text) }
    .ptop-left p  { margin:0; font-size:13px; color:var(--muted) }

    /* ── Status tabs ── */
    .stab-row { display:flex; gap:6px; flex-wrap:wrap }
    .stab {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 16px; border-radius:999px;
      border:1.5px solid var(--line);
      background:transparent; color:var(--muted);
      font-size:13px; font-weight:700; cursor:pointer;
      transition:.15s; font-family:inherit; white-space:nowrap;
    }
    .stab .stab-cnt {
      font-size:11px; font-weight:800;
      background:rgba(255,255,255,.12); color:var(--muted);
      border-radius:999px; padding:1px 7px; min-width:20px; text-align:center;
    }
    .stab.on {
      background:rgba(6,182,212,.12); border-color:rgba(6,182,212,.4);
      color:#7dd3fc;
    }
    .stab.on .stab-cnt { background:rgba(6,182,212,.18); color:#7dd3fc }
    [data-theme="light"] .stab { background:rgba(0,0,0,.03); color:#64748b; border-color:#e2e8f0 }
    [data-theme="light"] .stab.on { background:rgba(6,182,212,.08); border-color:rgba(6,182,212,.4); color:#0891b2 }
    [data-theme="light"] .stab .stab-cnt { background:rgba(0,0,0,.06); color:#64748b }
    [data-theme="light"] .stab.on .stab-cnt { background:rgba(6,182,212,.15); color:#0891b2 }

    /* ── Search + filter bar ── */
    .pbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center }
    .psearch-wrap { position:relative; flex:1; min-width:180px }
    .psearch-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none }
    #srch { width:100%; min-height:40px; padding:0 12px 0 36px; border-radius:12px; font-size:13px; box-sizing:border-box }
    #srt  { min-height:40px; padding:0 12px; border-radius:12px; font-size:13px; font-family:inherit }

    /* ── Category pills ── */
    .cat-pills { display:flex; gap:6px; flex-wrap:wrap }
    .cpill {
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 14px; border-radius:999px;
      border:1px solid var(--line); background:rgba(255,255,255,.04);
      color:var(--muted); font-size:12px; font-weight:700;
      cursor:pointer; transition:.15s; font-family:inherit;
    }
    .cpill svg { flex-shrink:0; opacity:.75 }
    .cpill.on svg { opacity:1 }
    .cpill.on { background:rgba(139,92,246,.12); border-color:rgba(139,92,246,.35); color:#c4b5fd }
    [data-theme="light"] .cpill { background:#f8fafc; color:#64748b; border-color:#e2e8f0 }
    [data-theme="light"] .cpill.on { background:rgba(139,92,246,.08); border-color:rgba(139,92,246,.3); color:#7c3aed }

    /* ── Product grid — responsive columns ── */
    .pg { display:grid; grid-template-columns:repeat(4,1fr); gap:14px }
    /* Large desktop ≥1400px → 5 col */
    @media(min-width:1400px){ .pg { grid-template-columns:repeat(5,1fr) } }
    /* Small desktop / laptop 1024–1399px → 4 col (default) */
    /* Tablet / iPad 768–1023px → 3 col */
    @media(max-width:1023px){ .pg { grid-template-columns:repeat(3,1fr) } }
    /* Large phone 540–767px → 2 col */
    @media(max-width:767px){ .pg { grid-template-columns:repeat(2,1fr); gap:10px } }
    /* Small phone ≤539px → 2 col tighter */
    @media(max-width:539px){ .pg { grid-template-columns:repeat(2,1fr); gap:8px } }

    /* ── Product card ── */
    .pc {
      border-radius:20px; overflow:hidden; cursor:pointer;
      transition:transform .18s, box-shadow .18s;
      position:relative;
      background:#ffffff;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:0 2px 12px rgba(0,0,0,.08);
      display:flex; flex-direction:column;
    }
    [data-theme="dark"] .pc {
      background:rgba(20,30,55,.9);
      border-color:rgba(148,163,200,.12);
      box-shadow:0 4px 20px rgba(0,0,0,.35);
    }
    .pc:hover { transform:translateY(-4px); box-shadow:0 12px 36px rgba(0,0,0,.14) }
    [data-theme="dark"] .pc:hover { box-shadow:0 12px 36px rgba(0,0,0,.4) }

    /* Image area */
    .pc-img-wrap {
      position:relative; width:100%; padding-top:78%;
      background:rgba(255,255,255,.05); overflow:hidden;
    }
    [data-theme="light"] .pc-img-wrap { background:#f8fafc }
    .pc-img-wrap img {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:contain; display:block; transition:transform .3s;
      padding:8px;
    }
    .pc:hover .pc-img-wrap img { transform:scale(1.04) }
    .pc-img-err {
      position:absolute; inset:0; display:flex;
      align-items:center; justify-content:center; font-size:44px;
    }

    /* Status badge — bottom-right of image, LARGE like mockup */
    .pc-badge {
      position:absolute; bottom:10px; right:10px;
      font-size:13px; font-weight:900; padding:8px 18px;
      border-radius:999px; letter-spacing:.01em;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
    }
    .badge-ok  { background:rgba(34,197,94,.18);  color:#16a34a; border:1.5px solid rgba(34,197,94,.35);  backdrop-filter:blur(8px) }
    .badge-lo  { background:rgba(245,158,11,.15); color:#d97706; border:1.5px solid rgba(245,158,11,.35); backdrop-filter:blur(8px) }
    .badge-no  { background:rgba(239,68,68,.15);  color:#dc2626; border:1.5px solid rgba(239,68,68,.35);  backdrop-filter:blur(8px) }
    .badge-unk { background:rgba(100,116,139,.12); color:#64748b; border:1.5px solid rgba(100,116,139,.28); backdrop-filter:blur(8px) }

    /* Stock bar — between image and body */
    .pc-stk {
      display:flex; align-items:center; gap:8px;
      padding:10px 14px 2px;
    }
    .pc-stk-bar {
      flex:1; height:4px; border-radius:999px;
      background:rgba(0,0,0,.08); overflow:hidden;
    }
    [data-theme="dark"] .pc-stk-bar { background:rgba(255,255,255,.12) }
    .pc-stk-fill { height:100%; border-radius:999px; transition:width .4s }
    .pc-stk-num {
      font-size:12px; font-weight:700; color:var(--muted);
      min-width:18px; text-align:right; flex-shrink:0;
    }

    /* Card body */
    .pc-img-wrap { flex-shrink:0 }
    .pc-stk { flex-shrink:0 }
    .pc-body {
      padding:6px 14px 14px;
      display:flex; flex-direction:column; flex:1;
    }
    .pc-name {
      font-size:14px; font-weight:800; color:var(--text);
      margin:4px 0 10px; line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden; flex:1;
    }
    .pc-meta {
      display:flex; align-items:center; justify-content:space-between; gap:6px;
      margin-top:auto; flex-shrink:0;
    }
    /* Category chip — green text on light bg */
    .pc-type {
      font-size:12px; font-weight:800; color:#22c55e;
      background:#f0fdf4; border-radius:999px;
      padding:6px 13px; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; max-width:50%;
      border:1.5px solid #bbf7d0;
    }
    [data-theme="dark"] .pc-type {
      background:rgba(34,197,94,.1); color:#4ade80;
      border-color:rgba(34,197,94,.2);
    }
    /* Price pill — green glass */
    .pc-price {
      font-size:14px; font-weight:900; white-space:nowrap;
      border-radius:999px; padding:6px 16px;
      background:rgba(34,197,94,.15); color:#16a34a;
      border:1.5px solid rgba(34,197,94,.35);
      backdrop-filter:blur(8px);
    }
    [data-theme="dark"] .pc-price {
      background:rgba(34,197,94,.18); color:#4ade80;
      border-color:rgba(34,197,94,.3);
    }

    /* ── Product Detail Modal ── */
    #pdOverlay {
      position:fixed; inset:0; z-index:9000; display:none;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.55); backdrop-filter:blur(6px); padding:16px;
    }
    #pdOverlay.open { display:flex }
    #pdBox {
      position:relative; background:var(--card); border:1px solid var(--line);
      border-radius:26px; width:100%; max-width:500px; max-height:90vh;
      overflow-y:auto; box-shadow:0 28px 90px rgba(0,0,0,.55);
      animation:pdIn .22s ease;
    }
    @keyframes pdIn { from{opacity:0;transform:scale(.93) translateY(18px)} to{opacity:1;transform:none} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .pd-img { width:100%; height:260px; object-fit:contain; border-radius:22px 22px 0 0; display:block; background:rgba(255,255,255,.04) }
    [data-theme="light"] .pd-img { background:#f8fafc }
    .pd-img-err { width:100%; height:240px; border-radius:22px 22px 0 0; background:rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center; font-size:64px }
    .pd-body { padding:22px 24px 26px }
    .pd-close {
      position:absolute; top:14px; right:14px; width:36px; height:36px;
      border-radius:50%; border:none; background:rgba(0,0,0,.5); color:#fff;
      font-size:17px; cursor:pointer; display:flex; align-items:center;
      justify-content:center; backdrop-filter:blur(8px); line-height:1;
    }
    .pd-close:hover { background:rgba(0,0,0,.75) }
    .pd-status { display:inline-flex; align-items:center; gap:6px; margin-bottom:12px; font-size:12px; font-weight:800 }
    .pd-name  { font-size:20px; font-weight:800; color:var(--text); margin:0 0 4px; line-height:1.3 }
    .pd-type  { font-size:12px; color:var(--muted); margin:0 0 16px; text-transform:uppercase; letter-spacing:.06em; font-weight:700 }
    .pd-divider { border:none; border-top:1px solid var(--line); margin:16px 0 }
    .pd-prices { display:flex; align-items:baseline; gap:10px; margin-bottom:16px; flex-wrap:wrap }
    .pd-price  { font-size:26px; font-weight:800; color:#7dd3fc }
    .pd-sale-tag { font-size:12px; background:rgba(167,139,250,.15); color:#a78bfa; border-radius:6px; padding:3px 8px; font-weight:800 }
    .pd-orig   { font-size:14px; color:var(--muted); text-decoration:line-through }
    [data-theme="light"] .pd-price { color:#0284c7 }
    .pd-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px }
    .pd-info-item { background:rgba(255,255,255,.04); border-radius:12px; padding:10px 13px }
    [data-theme="light"] .pd-info-item { background:#f8fafc; border:1px solid #e2e8f0 }
    .pd-info-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:4px }
    .pd-info-val   { font-size:13px; font-weight:700; color:var(--text) }
    .pd-desc { font-size:13px; color:var(--muted); line-height:1.7; white-space:pre-wrap }
    .pd-close-btn {
      display:none; width:100%; margin-top:18px;
      padding:14px; border-radius:14px; border:none;
      background:rgba(239,68,68,.12); color:#f87171;
      font-size:15px; font-weight:800; font-family:inherit;
      cursor:pointer; letter-spacing:.03em;
    }
    .pd-close-btn:active { background:rgba(239,68,68,.22) }
    [data-theme="light"] .pd-close-btn { background:rgba(239,68,68,.08); color:#dc2626 }
    @media(max-width:600px){ .pd-close-btn { display:block } }
    @media(max-width:600px){
      #pdOverlay { align-items:flex-end; padding:0 }
      #pdBox { border-radius:24px 24px 0 0; max-height:88vh; animation:pdBs .25s ease }
      @keyframes pdBs { from{transform:translateY(100%)} to{transform:none} }
    }

    @media(max-width:680px){
      .pg { grid-template-columns:repeat(2,1fr); gap:10px }
      .pc-body { padding:10px 11px 12px }
      .stab-row { gap:4px }
      .stab { padding:6px 12px; font-size:12px }
    }
    @media(max-width:380px){
      .pg { grid-template-columns:1fr 1fr; gap:8px }
    }
  </style>
</head>
<body>
<div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="dashboard">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <main class="main-content">
    <div class="shared-topbar" id="sharedHeader"></div>
    <div class="pw">

      <!-- Top header -->
      <div class="glass-card" style="padding:18px 22px;border-radius:22px">
        <div class="ptop">
          <div class="ptop-left">
            <h2>Products</h2>
            <p>គ្រប់គ្រងផលិតផល CAMBO MINI</p>
          </div>
          <div class="pbar">
            <div class="psearch-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="srch" placeholder="ស្វែងរកផលិតផល..." oninput="fp()">
            </div>
            <select id="srt" onchange="fp()">
              <option value="name">ឈ្មោះ A→Z</option>
              <option value="price">តម្លៃ ទាប→ខ្ពស់</option>
              <option value="stock">ស្តុក ច្រើន→តិច</option>
            </select>
          </div>
        </div>

        <!-- Status tabs -->
        <div class="stab-row" id="stabRow" style="margin-top:16px">
          <button class="stab on" data-stab="all" onclick="setStat(event,'all')">
            ទាំងអស់ <span class="stab-cnt" id="cntAll">0</span>
          </button>
          <button class="stab" data-stab="avail" onclick="setStat(event,'avail')">
            មានស្តុក <span class="stab-cnt" id="cntAvail">0</span>
          </button>
          <button class="stab" data-stab="low" onclick="setStat(event,'low')">
            ស្តុកតិច <span class="stab-cnt" id="cntLow">0</span>
          </button>
          <button class="stab" data-stab="out" onclick="setStat(event,'out')">
            អស់ស្តុក <span class="stab-cnt" id="cntOut">0</span>
          </button>
        </div>

        <!-- Category pills -->
        <div class="cat-pills" id="catPills" style="margin-top:10px"></div>
      </div>

      <!-- Grid -->
      <div class="pg" id="pgrid"></div>

    </div>
  </main>
</div>

<!-- Product Detail Modal -->
<div id="pdOverlay">
  <div id="pdBox">
    <button class="pd-close" id="pdClose" aria-label="Close">&#x2715;</button>
    <div id="pdImgWrap"></div>
    <div class="pd-body">
      <div class="pd-status" id="pdStatus"></div>
      <h2 class="pd-name" id="pdName"></h2>
      <p class="pd-type" id="pdType"></p>
      <hr class="pd-divider">
      <div class="pd-prices" id="pdPrices"></div>
      <div class="pd-info-grid" id="pdInfoGrid"></div>
      <p class="pd-desc" id="pdDesc" style="display:none"></p>
      <button class="pd-close-btn" id="pdCloseBtn">✕ បិទ</button>
    </div>
  </div>
</div>

<script src="../assets/js/cambo-api.js?v=161"></script>
<script src="../assets/js/auth.js?v=161"></script>
<script src="../assets/js/layout.js?v=161"></script>
<script src="../assets/js/dashboard-layout.js?v=161"></script>
<script>
var PRODS = [];
var activeCat  = 'all';
var activeStat = 'all';

function catKey(type) {
  var t = (type || '').toLowerCase();
  if (t.includes('face'))  return 'face';
  if (t.includes('body'))  return 'body';
  if (t.includes('hair'))  return 'hair';
  if (t.includes('drink')) return 'drink';
  return 'other';
}
var CAT_SVG = {
  all:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
  face:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
  body:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
  hair:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>',
  drink: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
  other: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'
};
var CAT_LABEL = { face:'Face', body:'Body', hair:'Hair', drink:'Drink', other:'Other' };

function normStr(s) { return String(s||'').toLowerCase().replace(/\s+/g,''); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var IMG_ERR_SVG = '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.3"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>';
function imgErr(el, cls) { el.parentNode.innerHTML = '<div class="' + cls + '">' + IMG_ERR_SVG + '</div>'; }

/* Stock helpers */
function stockStat(s) {
  if (s === null) return 'unk';
  if (s === 0)    return 'out';
  if (s <= 10)    return 'low';
  return 'ok';
}
function stockBadge(s) {
  var st = stockStat(s);
  var cls = {ok:'badge-ok',low:'badge-lo',out:'badge-no',unk:'badge-unk'}[st];
  var lbl = {ok:'មានស្តុក',low:'ស្តុកតិច',out:'អស់ស្តុក',unk:'មិនដឹង'}[st];
  return '<span class="pc-badge ' + cls + '">' + lbl + '</span>';
}
function stockBar(s) {
  if (s === null) return '';
  var pct = Math.min(100, s > 0 ? Math.max(4, Math.round(s / 30 * 100)) : 0);
  var color = s === 0 ? '#f87171' : s <= 10 ? '#fbbf24' : '#4ade80';
  return '<div class="pc-stk">' +
    '<div class="pc-stk-bar"><div class="pc-stk-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
    '<span class="pc-stk-num">' + (s === 0 ? 'អស់' : s) + '</span>' +
  '</div>';
}

/* Filter & render */
function fp() {
  var q   = (document.getElementById('srch').value || '').toLowerCase();
  var srt = document.getElementById('srt').value;

  var list = PRODS.filter(function(p) {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (activeCat !== 'all' && p.cat !== activeCat) return false;
    if (activeStat === 'avail') return p.stock === null || p.stock > 10;
    if (activeStat === 'low')   return p.stock !== null && p.stock > 0 && p.stock <= 10;
    if (activeStat === 'out')   return p.stock === 0;
    return true;
  });

  if (srt === 'price')      list.sort(function(a,b){ return a.price - b.price; });
  else if (srt === 'stock') list.sort(function(a,b){ return (b.stock===null?Infinity:b.stock) - (a.stock===null?Infinity:a.stock); });
  else                      list.sort(function(a,b){ return a.name.localeCompare(b.name, 'km'); });

  var el = document.getElementById('pgrid');
  if (!list.length) {
    el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">មិនមានផលិតផល</div>';
    el._filteredProds = [];
    return;
  }

  el.innerHTML = list.map(function(p, i) {
    var priceHtml = '<span class="pc-price">$' + p.price.toFixed(2) + '</span>';

    return '<article class="pc" data-pidx="' + i + '">' +
      '<div class="pc-img-wrap">' +
        '<img src="' + esc(p.img) + '" loading="lazy" alt="' + esc(p.name) + '"' +
          ' onerror="imgErr(this,\'pc-img-err\')">' +
        stockBadge(p.stock) +
      '</div>' +
      stockBar(p.stock) +
      '<div class="pc-body">' +
        '<p class="pc-name">' + esc(p.name) + '</p>' +
        '<div class="pc-meta">' +
          '<span class="pc-type">' + esc(p.type) + '</span>' +
          priceHtml +
        '</div>' +
      '</div>' +
    '</article>';
  }).join('');

  el._filteredProds = list;
}

/* Tab: status */
function setStat(e, s) {
  activeStat = s;
  document.querySelectorAll('.stab').forEach(function(b){ b.classList.remove('on'); });
  e.currentTarget.classList.add('on');
  fp();
}

/* Tab: category */
function setCat(e, c) {
  activeCat = c;
  document.querySelectorAll('.cpill').forEach(function(b){ b.classList.remove('on'); });
  e.currentTarget.classList.add('on');
  fp();
}

function initCatPills(cats) {
  document.getElementById('catPills').innerHTML = ['all'].concat(cats).map(function(c) {
    return '<button class="cpill' + (c === activeCat ? ' on' : '') + '" onclick="setCat(event,\'' + c + '\')">' +
      (c === 'all' ? CAT_SVG.all + ' ទាំងអស់' : (CAT_SVG[c]||'') + ' ' + (CAT_LABEL[c] || c)) + '</button>';
  }).join('');
}

function updateCounts() {
  var withStock = PRODS.filter(function(p){ return p.stock !== null; });
  document.getElementById('cntAll').textContent   = PRODS.length;
  document.getElementById('cntAvail').textContent = PRODS.filter(function(p){ return p.stock === null || p.stock > 10; }).length;
  document.getElementById('cntLow').textContent   = withStock.filter(function(p){ return p.stock > 0 && p.stock <= 10; }).length;
  document.getElementById('cntOut').textContent   = withStock.filter(function(p){ return p.stock === 0; }).length;
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pgrid').innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading...</div>';

  if (!window.CamboAPI) return;

  Promise.all([
    window.CamboAPI.get({ action: 'products' }),
    window.CamboAPI.get({ action: 'stroke'   })
  ]).then(function(res) {
    var products = (res[0] && res[0].ok) ? (res[0].products || []) : [];
    var stocks   = (res[1] && res[1].ok) ? (res[1].stroke   || []) : [];

    var stockById   = {};
    var stockByName = {};
    stocks.forEach(function(s) {
      if (s.id)      stockById[normStr(s.id)]        = s;
      if (s.product) stockByName[normStr(s.product)] = s;
    });

    var catOrder  = ['face','body','hair','drink','other'];
    var catsFound = {};

    PRODS = products.map(function(p) {
      var ck  = catKey(p.type);
      var st  = stockById[normStr(p.id)] || stockByName[normStr(p.name)] || null;
      var qty = st ? (st.qty !== undefined ? st.qty : null) : null;
      var imgUrl = p.url || ('../images/products/' + ck + '/' + p.name + '.png');
      catsFound[ck] = true;
      return { id:p.id, name:p.name, cat:ck, type:p.type, price:p.price, sale:p.sale||0, description:p.description||'', stock:qty, img:imgUrl };
    });

    var cats = catOrder.filter(function(c){ return catsFound[c]; });
    initCatPills(cats);
    updateCounts();
    fp();
  }).catch(function() {
    document.getElementById('pgrid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">⚠️ Load failed — សូម Refresh ម្ដងទៀត</div>';
  });
});

/* ── Product Detail Modal ── */
(function() {
  var overlay = document.getElementById('pdOverlay');

  function openModal(p) {
    var imgWrap = document.getElementById('pdImgWrap');
    imgWrap.innerHTML = '<img class="pd-img" src="' + esc(p.img) + '" alt="' + esc(p.name) +
      '" onerror="imgErr(this,\'pd-img-err\')">';

    // Status
    var st = stockStat(p.stock);
    var statusMap = {
      ok:  { cls:'badge-ok',  lbl:'មានស្តុក' },
      low: { cls:'badge-lo',  lbl:'ស្តុកតិច'  },
      out: { cls:'badge-no',  lbl:'អស់ស្តុក' },
      unk: { cls:'badge-unk', lbl:'មិនដឹង'   }
    };
    var sm = statusMap[st];
    document.getElementById('pdStatus').innerHTML =
      '<span class="pc-badge ' + sm.cls + '" style="position:static;font-size:12px;padding:5px 13px">' + sm.lbl + '</span>';

    document.getElementById('pdName').textContent = p.name;
    document.getElementById('pdType').textContent = p.type;

    // Prices
    var prEl = document.getElementById('pdPrices');
    prEl.innerHTML = '<span class="pd-price">$' + p.price.toFixed(2) + '</span>';

    // Info grid
    var ig = document.getElementById('pdInfoGrid');
    var items = [];
    if (p.id)    items.push(['ID ផលិតផល', esc(String(p.id))]);
    items.push(['ប្រភេទ', esc(p.type)]);
    items.push(['តម្លៃ', '$' + p.price.toFixed(2)]);
    if (p.sale && p.sale > 0) items.push(['ចំនួនលក់/ឈុត', p.sale]);
    items.push(['ស្តុក', p.stock === null ? 'មិនដឹង' : (p.stock === 0 ? '<span style="color:#f87171">អស់ស្តុក</span>' : p.stock)]);
    ig.innerHTML = items.map(function(r){
      return '<div class="pd-info-item"><div class="pd-info-label">' + r[0] + '</div><div class="pd-info-val">' + r[1] + '</div></div>';
    }).join('');

    // Description
    var descEl = document.getElementById('pdDesc');
    var desc = (p.description || '').trim();
    if (desc) { descEl.textContent = desc; descEl.style.display = ''; }
    else       { descEl.style.display = 'none'; }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('pdClose').addEventListener('click', closeModal);
  document.getElementById('pdCloseBtn').addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

  document.getElementById('pgrid').addEventListener('click', function(e) {
    var card = e.target.closest('.pc');
    if (!card) return;
    var idx  = parseInt(card.getAttribute('data-pidx'), 10);
    var list = document.getElementById('pgrid')._filteredProds;
    if (list && list[idx]) openModal(list[idx]);
  });
})();
</script>
