<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <title>Stock - CAMBO MINI</title>
  <link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=158">
  <link rel="stylesheet" href="../assets/css/main.css?v=158">
  <style>
    .sw{display:grid;gap:18px}
    .stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .kpi{padding:16px 18px;border-radius:20px}
    .kpi span{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .kpi strong{display:block;margin-top:8px;font-size:24px;color:var(--text)}
    .slayout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .sp{padding:20px 22px;border-radius:22px}
    .sp-title{margin:0 0 14px;font-size:16px;font-weight:700;color:var(--text)}
    .tools{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .tools input,.tools select{min-height:38px;padding:0 12px;border-radius:10px;font-size:13px}
    table{width:100%;border-collapse:collapse}
    thead th{text-align:left;padding:9px 12px;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line)}
    tbody td{padding:10px 12px;border-bottom:1px solid rgba(148,163,200,.06);font-size:13px;color:var(--text)}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:rgba(255,255,255,.02)}
    .bw{display:flex;align-items:center;gap:8px}
    .btrack{height:6px;border-radius:999px;background:rgba(148,163,200,.14);flex:1;overflow:hidden}
    .bfill{height:100%;border-radius:999px}
    .bf-g{background:linear-gradient(90deg,#10b981,#6ee7b7)}
    .bf-a{background:linear-gradient(90deg,#f59e0b,#fde68a)}
    .bf-r{background:linear-gradient(90deg,#ef4444,#fca5a5)}
    .pill{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid}
    .p-g{background:rgba(34,197,94,.1);color:#86efac;border-color:rgba(34,197,94,.2)}
    .p-a{background:rgba(251,191,36,.1);color:#fde68a;border-color:rgba(251,191,36,.18)}
    .p-r{background:rgba(239,68,68,.1);color:#fca5a5;border-color:rgba(239,68,68,.2)}
    .p-b{background:rgba(6,182,212,.1);color:#7dd3fc;border-color:rgba(6,182,212,.2)}
    .alerts{display:grid;gap:8px}
    .alert{padding:11px 13px;border-radius:13px;background:rgba(255,255,255,.04);border-left:3px solid}
    .alert.warn{border-color:#f59e0b;background:rgba(245,158,11,.06)}
    .alert.danger{border-color:#ef4444;background:rgba(239,68,68,.06)}
    .alert b{font-size:13px;color:var(--text);display:block}
    .alert small{font-size:12px;color:var(--muted)}
    .adj-wrap{padding:14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--line);margin-top:14px}
    .adj-wrap h4{margin:0 0 10px;font-size:13px;color:var(--text)}
    .adj-row{display:grid;grid-template-columns:1fr 70px auto;gap:8px;align-items:end}
    .adj-row select,.adj-row input{min-height:36px;padding:0 10px;border-radius:9px;font-size:12px}
    .abtn{min-height:36px;padding:0 14px;border-radius:9px;border:none;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
    @media(max-width:1000px){.slayout{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}

    /* Clickable rows */
    tbody tr{cursor:pointer;transition:background .15s}
    tbody tr:hover td{background:rgba(139,92,246,.08)!important}
    tbody tr.st-out td{border-left:3px solid #ef4444}
    tbody tr.st-low td:first-child{border-left:3px solid #f59e0b}
    tbody tr.st-ok td:first-child{border-left:3px solid #10b981}

    /* Edit Modal */
    .edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
    .edit-overlay.open{opacity:1;pointer-events:all}
    .edit-modal{
      background:#1a1a2e;
      border:1.5px solid rgba(139,92,246,.35);
      border-radius:20px;padding:28px 28px 22px;
      width:100%;max-width:500px;
      box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 32px 80px rgba(0,0,0,.8);
    }
    .edit-modal h3{margin:0 0 16px;font-size:16px;font-weight:700;color:#f1f5f9;display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .edit-field{display:flex;flex-direction:column;gap:6px}
    .edit-field.full{grid-column:1/-1}
    .edit-field label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em}
    .edit-field input{
      min-height:40px;padding:0 14px;
      border-radius:10px;font-size:14px;
      width:100%;box-sizing:border-box;
      background:#0f0f1a;
      border:1.5px solid rgba(255,255,255,.12);
      color:#f1f5f9;
      font-family:inherit;
      transition:border-color .15s;
    }
    .edit-field input:focus{outline:none;border-color:#8b5cf6}
    .edit-field select{
      min-height:40px;padding:0 12px;
      border-radius:10px;font-size:14px;
      width:100%;box-sizing:border-box;
      background:#0f0f1a;
      border:1.5px solid rgba(255,255,255,.12);
      color:#f1f5f9;font-family:inherit;
      cursor:pointer;transition:border-color .15s;
    }
    .edit-field select:focus{outline:none;border-color:#8b5cf6}
    .edit-field select option{background:#1a1a2e;color:#f1f5f9}
    .edit-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
    .ebtn{min-height:40px;padding:0 24px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:opacity .15s}
    .ebtn-save{background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff}
    .ebtn-cancel{background:rgba(255,255,255,.06);color:#94a3b8;border:1.5px solid rgba(255,255,255,.1)}
    .ebtn-save:hover{opacity:.88} .ebtn-cancel:hover{background:rgba(255,255,255,.1);color:#f1f5f9}

    /* Light mode — modal overrides */
    [data-theme="light"] .edit-overlay{background:rgba(15,23,42,.45)}
    [data-theme="light"] .edit-modal{background:#fff;border-color:rgba(99,102,241,.2);box-shadow:0 16px 48px rgba(15,23,42,.18)}
    [data-theme="light"] .edit-modal h3{color:#0f172a;border-bottom-color:rgba(148,163,184,.14)}
    [data-theme="light"] .edit-field label{color:#475569}
    [data-theme="light"] .edit-field input{background:#f8fafc;border-color:rgba(148,163,184,.28);color:#0f172a}
    [data-theme="light"] .edit-field input:focus{background:#fff;border-color:#8b5cf6}
    [data-theme="light"] .edit-field select{background:#f8fafc;border-color:rgba(148,163,184,.28);color:#0f172a}
    [data-theme="light"] .edit-field select:focus{background:#fff;border-color:#8b5cf6}
    [data-theme="light"] .edit-field select option{background:#fff;color:#0f172a}
    [data-theme="light"] .edit-actions{border-top-color:rgba(148,163,184,.14)}
    [data-theme="light"] .ebtn-cancel{background:#f1f5f9;color:#475569;border-color:rgba(148,163,184,.22)}
    [data-theme="light"] .ebtn-cancel:hover{background:#e2e8f0;color:#0f172a}
    [data-theme="light"] .stock-indicator{border-color:rgba(148,163,184,.2)}
    [data-theme="light"] #aPackPerBox,[data-theme="light"] #aBottPerPack{background:rgba(6,182,212,.08)!important;border-color:rgba(6,182,212,.25)}
    .stock-indicator{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;border:1px solid rgba(255,255,255,.08)}
    .add-btn{min-height:38px;padding:0 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
    .reload-btn{min-height:38px;padding:0 14px;border-radius:10px;border:none;background:rgba(255,255,255,.07);color:var(--text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;border:1px solid var(--line)}

    /* ── Mobile Card Layout ── */
    @media(max-width:640px){
      .stock-table-wrap { display:none !important; }
      .tools { flex-direction:column; gap:8px; }
      .tools input,.tools select { width:100%; box-sizing:border-box; }
      .tools .add-btn,.tools .reload-btn { width:100%; text-align:center; }
    }
    @media(min-width:641px){
      .stock-cards-wrap { display:none !important; }
    }
    .sk-card {
      display:flex;align-items:center;gap:10px;
      padding:12px 12px;border-radius:14px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(148,163,200,.1);
      cursor:pointer;transition:background .15s;
      border-left:3px solid transparent;
    }
    .sk-card.st-out { border-left-color:#ef4444; }
    .sk-card.st-low { border-left-color:#f59e0b; }
    .sk-card.st-ok  { border-left-color:#10b981; }
    .sk-card:active { background:rgba(139,92,246,.1); }
    [data-theme="light"] .sk-card { background:#f8fafc; border-color:rgba(148,163,184,.18); }
    .sk-img { width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid rgba(148,163,200,.15); }
    .sk-img-ph { width:46px;height:46px;border-radius:10px;flex-shrink:0;background:rgba(148,163,200,.1);display:flex;align-items:center;justify-content:center;font-size:20px; }
    .sk-body { flex:1;min-width:0; }
    .sk-name { font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
    [data-theme="light"] .sk-name { color:#0f172a; }
    .sk-meta { display:flex;align-items:center;gap:6px;margin-bottom:6px; }
    .sk-nums { display:flex;gap:0; }
    .sk-n { display:flex;flex-direction:column;align-items:center;min-width:52px;padding:4px 6px;border-radius:8px;background:rgba(148,163,200,.07); margin-right:4px; }
    .sk-n b { font-size:14px;font-weight:800;color:var(--text);line-height:1.2; }
    .sk-n small { font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em; }
    [data-theme="light"] .sk-n { background:rgba(148,163,184,.1); }
    [data-theme="light"] .sk-n b { color:#0f172a; }
    .sk-right { flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px; }
    .sk-edit-icon { font-size:11px;color:var(--muted); }
    .stock-cards-wrap { display:flex;flex-direction:column;gap:8px;padding-top:4px; }

    /* ── Stock Inventory header row ── */
    .sp-head { display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px; }
    .sp-head .sp-title { margin:0; }

    /* ── Date filter button ── */
    .sk-date-btn {
      display:flex;align-items:center;gap:6px;
      height:34px;padding:0 12px;border-radius:10px;border:none;
      background:rgba(139,92,246,.15);color:#a78bfa;
      font-size:12px;font-weight:800;cursor:pointer;
      font-family:inherit;white-space:nowrap;flex-shrink:0;
      border:1px solid rgba(139,92,246,.3);
      transition:background .15s;touch-action:manipulation;
    }
    .sk-date-btn:active { background:rgba(139,92,246,.25); }
    [data-theme="light"] .sk-date-btn { background:rgba(139,92,246,.09);color:#7c3aed;border-color:rgba(139,92,246,.2); }

    /* ── Date popup — Desktop dropdown ── */
    .sk-date-overlay {
      display:none;position:fixed;inset:0;z-index:9990;
    }
    .sk-date-overlay.open { display:block; }
    .sk-date-pop {
      position:fixed;z-index:9999;
      background:#1e1b3a;
      border:1px solid rgba(139,92,246,.3);
      border-radius:16px;padding:16px;width:300px;
      box-shadow:0 16px 48px rgba(0,0,0,.6);
      display:none;
    }
    .sk-date-pop.open { display:block; }
    [data-theme="light"] .sk-date-pop { background:#fff;border-color:rgba(99,102,241,.2);box-shadow:0 16px 48px rgba(15,23,42,.18); }

    /* ── Mobile: Bottom Sheet override ── */
    @media(max-width:640px){
      .sk-date-overlay.open {
        background:rgba(0,0,0,.5);
      }
      .sk-date-pop {
        position:fixed !important;
        bottom:0 !important;top:auto !important;
        left:0 !important;right:0 !important;
        width:100% !important;
        border-radius:22px 22px 0 0 !important;
        border-bottom:none !important;
        padding:8px 18px 28px !important;
        transform:translateY(100%);
        transition:transform .32s cubic-bezier(.32,.72,0,1);
        display:block !important;
        pointer-events:none;
      }
      .sk-date-pop.open {
        transform:translateY(0) !important;
        pointer-events:all;
      }
      .sk-bs-handle-bar {
        width:38px;height:4px;border-radius:2px;
        background:rgba(148,163,200,.25);
        margin:0 auto 14px;
      }
    }
    @media(min-width:641px){
      .sk-bs-handle-bar { display:none; }
    }

    .sk-preset-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px; }
    .sk-preset-btn {
      padding:10px 8px;border-radius:10px;border:none;
      background:rgba(255,255,255,.06);color:#cbd5e1;
      font-size:13px;font-weight:700;cursor:pointer;
      font-family:inherit;text-align:center;
      transition:background .12s;touch-action:manipulation;
    }
    .sk-preset-btn:active,.sk-preset-btn.active {
      background:rgba(139,92,246,.28);color:#c4b5fd;
      border:1px solid rgba(139,92,246,.4);
    }
    [data-theme="light"] .sk-preset-btn { background:#f1f5f9;color:#334155; }
    [data-theme="light"] .sk-preset-btn.active { background:rgba(139,92,246,.12);color:#7c3aed;border-color:rgba(139,92,246,.3); }
    .sk-pop-divider { border:none;border-top:1px solid rgba(148,163,200,.12);margin:12px 0 10px; }
    .sk-pop-label { font-size:10px;font-weight:800;color:#64748b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px; }
    .sk-pop-row { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px; }
    .sk-pop-field label { display:block;font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px; }
    .sk-pop-inp {
      width:100%;height:36px;padding:0 10px;border-radius:9px;
      background:rgba(255,255,255,.06);color:#e2e8f0;
      border:1px solid rgba(148,163,200,.2);font-size:13px;
      font-family:inherit;box-sizing:border-box;
    }
    [data-theme="light"] .sk-pop-inp { background:#f8fafc;color:#0f172a;border-color:rgba(148,163,184,.3); }
    .sk-pop-ok {
      width:100%;height:40px;border-radius:11px;border:none;
      background:linear-gradient(135deg,#8b5cf6,#06b6d4);
      color:#fff;font-size:14px;font-weight:800;
      cursor:pointer;font-family:inherit;touch-action:manipulation;
    }
  </style>
</head>
<body>
<div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="dashboard">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <main class="main-content">
    <div class="shared-topbar" id="sharedHeader"></div>
    <div class="sw">

      <div class="stats-row">
        <article class="glass-card kpi"><span>Total Items</span><strong id="sTot">0</strong></article>
        <article class="glass-card kpi"><span>In Stock</span><strong id="sIn" style="color:#86efac">0</strong></article>
        <article class="glass-card kpi"><span>Low Stock</span><strong id="sLo" style="color:#fde68a">0</strong></article>
        <article class="glass-card kpi"><span>Out of Stock</span><strong id="sOut" style="color:#fca5a5">0</strong></article>
      </div>
      <div class="slayout">
        <article class="glass-card sp">
          <!-- Header row: title + date button -->
          <div class="sp-head">
            <h3 class="sp-title">Stock Inventory</h3>
            <button class="sk-date-btn" id="skDateBtn" onclick="skTogglePop(event)">
              📅 <span id="skDateLabel">All Time</span> ▾
            </button>
          </div>

          <div class="tools">
            <input type="text" id="srch" placeholder="ស្វែងរក..." oninput="rt()">
            <select id="flt" onchange="rt()">
              <option value="">All</option>
              <option value="ok">In Stock</option>
              <option value="low">Low Stock</option>
              <option value="out">Out of Stock</option>
            </select>
            <button class="add-btn" onclick="openAddModal()">+ បន្ថែមផលិតផល</button>
            <button class="reload-btn" onclick="loadStroke()" title="Reload from Google Sheets">↻ Reload</button>
          </div>
          <!-- Desktop table -->
          <div class="stock-table-wrap">
            <table><thead><tr><th style="width:36px;text-align:center">#</th><th style="width:50px;text-align:center">IMG</th><th>ផលិតផល</th><th>ប្រភេទ</th><th style="text-align:center">កេស</th><th style="text-align:center">ឈុត</th><th style="text-align:center">ដប | ប្រអប់</th><th>Stock Level</th><th>Status</th></tr></thead>
            <tbody id="tbody"></tbody></table>
          </div>
          <!-- Mobile card list -->
          <div class="stock-cards-wrap" id="stockCards"></div>
        </article>

      </div>
    </div>
  </main>
</div>

<!-- Edit Product Modal -->
<div class="edit-overlay" id="editOverlay" onclick="closeEdit(event)">
  <div class="edit-modal">
    <h3 style="display:flex;align-items:center;gap:12px">
      <img id="eModalImg" src="" style="width:48px;height:48px;border-radius:11px;object-fit:cover;border:1px solid rgba(255,255,255,.12);display:none;flex-shrink:0">
      <span>✏️ កែប្រែផលិតផល</span>
    </h3>
    <div class="stock-indicator" id="editStockIndicator"></div>
    <div class="edit-grid">
      <div class="edit-field full">
        <label>ឈ្មោះផលិតផល</label>
        <input type="text" id="eN" placeholder="ឈ្មោះផលិតផល">
      </div>
      <div class="edit-field full">
        <label>ប្រភេទ (Types)</label>
        <select id="eCat">
          <option value="Face Care">😊 Face Care</option>
          <option value="Body Care">🧴 Body Care</option>
          <option value="Hair Care">💆 Hair Care</option>
          <option value="Drink">☕ Drink</option>
          <option value="-">— Other</option>
        </select>
      </div>
      <div class="edit-field">
        <label>កេស (BOX)</label>
        <input type="number" id="eBox" min="0" placeholder="0">
      </div>
      <div class="edit-field">
        <label>ឈុត / Box <span style="font-weight:400;color:#64748b;text-transform:none">(សមាមាត្រ)</span></label>
        <input type="number" id="ePackPerBox" min="0" placeholder="0" style="background:rgba(6,182,212,.07)">
      </div>
      <div class="edit-field">
        <label>ឈុត (PACK) <span style="font-weight:400;color:#64748b;text-transform:none">auto</span></label>
        <input type="number" id="ePack" min="0" placeholder="0">
      </div>
      <div class="edit-field">
        <label>ដប / ឈុត <span style="font-weight:400;color:#64748b;text-transform:none">(សមាមាត្រ)</span></label>
        <input type="number" id="eBottPerPack" min="0" placeholder="0" style="background:rgba(6,182,212,.07)">
      </div>
      <div class="edit-field">
        <label>ដប | ប្រអប់ <span style="font-weight:400;color:#64748b;text-transform:none">auto</span></label>
        <input type="number" id="eBott" min="0" placeholder="0">
      </div>
      <div class="edit-field">
        <label>ស្តុក​បច្ចុប្បន្ន <span style="font-weight:500;color:#8b5cf6;text-transform:none">(= BOX)</span></label>
        <input type="number" id="eQty" min="0" placeholder="0" readonly style="opacity:.65;cursor:default;background:rgba(139,92,246,.06)">
      </div>
      <div class="edit-field full">
        <label>រូបភាព — Custom URL <span style="font-weight:400;color:#64748b;text-transform:none">(optional, auto-detect ពី folder)</span></label>
        <div style="display:flex;gap:8px;align-items:center">

/* 3-pass fuzzy match: exact → normalized → keyword overlap */
function getLocalImg(name){
  if(!name) return '';
  // Pass 1: exact
  if(_localImgs[name]) return _localImgs[name];
  // Normalize helper: lowercase, remove spaces & punctuation
  var norm=function(s){ return s.toLowerCase().replace(/[\s\(\)\[\]\-\.\,\|\/]+/g,''); };
  var nn=norm(name);
  var keys=Object.keys(_localImgs);
  // Pass 2: normalized exact or one contains the other
  for(var i=0;i<keys.length;i++){
    var k=norm(keys[i]);
    if(nn===k||nn.includes(k)||k.includes(nn)) return _localImgs[keys[i]];
  }
  // Pass 3: keyword overlap — score by how many words match (≥2 required)
  var words=name.toLowerCase().split(/[\s\(\)\[\]\-\.\,\|\/]+/).filter(function(w){return w.length>1;});
  var best=null,bestScore=0;
  for(var i=0;i<keys.length;i++){
    var kwords=keys[i].toLowerCase().split(/[\s\(\)\[\]\-\.\,\|\/]+/).filter(function(w){return w.length>1;});
    var score=words.filter(function(w){ return kwords.some(function(kw){ return kw.includes(w)||w.includes(kw); }); }).length;
    if(score>=2&&score>bestScore){ bestScore=score; best=_localImgs[keys[i]]; }
  }
  return best||'';
}

/* ── Map category type → subfolder name ── */
function getCatFolder(cat){
  var c=(cat||'').toLowerCase();
  if(c.includes('face')) return 'face';
  if(c.includes('body')) return 'body';
  if(c.includes('hair')) return 'hair';
  if(c.includes('drink')) return 'drink';
  return '';
}

/*
 * Image fallback chain for product table:
 *   1. manualImg (user-set URL)
 *   2. images/products/[cat]/[name].png  ← NEW: just drop file here!
 *   3. images/products/[name].png         ← flat folder fallback
 *   4. getLocalImg() mapping              ← legacy existing files
 *   5. 🧴 placeholder
 */
window._imgFallback = function(el, paths){
  if(!paths || !paths.length){ el.style.display='none'; el.nextSibling.style.display='flex'; return; }
  el.onerror = function(){ window._imgFallback(el, paths.slice(1)); };
  el.src = paths[0];
};

function buildImgHtml(p){
  var manual    = p.img || '';
  var cf        = getCatFolder(p.cat);
  var catPath   = cf ? '../images/products/'+cf+'/'+p.name+'.png' : '';
  var flatPath  = '../images/products/'+p.name+'.png';
  var legacyPath= getLocalImg(p.name);

  // Build ordered fallback list (skip duplicates / blanks)
  var chain=[];
  if(manual)     chain.push(manual);
  if(catPath)    chain.push(catPath);
  chain.push(flatPath);
  if(legacyPath && chain.indexOf(legacyPath)<0) chain.push(legacyPath);

  var first=chain.shift();
  var rest=JSON.stringify(chain);
  return '<img src="'+first+'" style="width:38px;height:38px;border-radius:9px;object-fit:cover;display:block" '
        +'onerror="window._imgFallback(this,'+rest.replace(/"/g,"'")+')">'
        +'<div style="display:none;width:38px;height:38px;border-radius:9px;background:rgba(139,92,246,.12);align-items:center;justify-content:center;font-size:18px">🧴</div>';
}

/* Look up default ratio for a product name.
   1st pass: exact key match.
   2nd pass: one name contains the other (normalized).
   Returns { ppb, bpp } or null. */
function getDefaultRatio(name){
  if(!name) return null;
  // Pass 1: exact
  if(DEFAULT_RATIOS[name]) {
    var r=DEFAULT_RATIOS[name];
    return { ppb:r[0], bpp: r[1]>0&&r[0]>0 ? Math.round(r[1]/r[0]) : 0 };
  }
  // Pass 2: normalized contains
  var norm=function(s){ return s.toLowerCase().replace(/[\s\(\)\[\]\-\_\.]+/g,''); };
  var nn=norm(name);
  var keys=Object.keys(DEFAULT_RATIOS);
  for(var i=0;i<keys.length;i++){
    var k=norm(keys[i]);
    if(nn===k||nn.includes(k)||k.includes(nn)){
      var r=DEFAULT_RATIOS[keys[i]];
      return { ppb:r[0], bpp: r[1]>0&&r[0]>0 ? Math.round(r[1]/r[0]) : 0 };
    }
  }
  return null;
}

/* ── Load from Google Sheets ── */
async function loadStroke(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--muted)">⏳ កំពុងទាញទិន្នន័យពី Google Sheets...</td></tr>';
  ['sTot','sIn','sLo','sOut'].forEach(function(id){ document.getElementById(id).textContent='...'; });
  try {
    var res  = await fetch(APPS_SCRIPT_URL+'?action=stroke');
    var data = await res.json();
    if(!data.ok || !Array.isArray(data.stroke)) throw new Error(data.message||'Load failed');
    S = data.stroke.map(function(item,i){
      var qty  = parseInt(item.qty)||0;
      var box  = parseInt(item.box)||0;
      var pack = parseInt(item.pack)||0;
      var bott = parseInt(item.bottles)||0;
      // ── Resolve packPerBox (3-source priority) ──────────────────────
      // 1. Explicit field saved by saveEdit (most reliable)
      // 2. DEFAULT_RATIOS lookup table (spreadsheet base values)
      // 3. Derive from pack÷box (works when stock > 0 and box = base unit)
      var ppb = parseInt(item.packPerBox)||0;
      if(!ppb){ var _dr=getDefaultRatio(item.product||''); if(_dr) ppb=_dr.ppb; }
      if(!ppb && box>0 && pack>0) ppb=Math.round(pack/box);

      // ── Resolve bottPerPack (3-source priority) ──────────────────────
      // 1. Ratio text from Sheets e.g. "1 ឈុត = 3 ដបប្រអប់"
      // 2. DEFAULT_RATIOS lookup
      // 3. Derive from bott÷pack
      var bpp=0, ratioText=String(item.ratio||item.pack2||'');
      if(ratioText){ var m=ratioText.match(/=\s*(\d+)/); if(m) bpp=parseInt(m[1]); }
      if(!bpp){ var _dr2=getDefaultRatio(item.product||''); if(_dr2) bpp=_dr2.bpp; }
      if(!bpp && pack>0 && bott>0) bpp=Math.round(bott/pack);
      return { id:i+1, name:item.product||'', cat:item.type||'-',
               box:box, pack:pack, bottles:bott, qty:qty,
               packPerBox:ppb, bottPerPack:bpp,
               img:_imgCache[item.product]||'' };
    });
    _sCurrent = S.slice(); // backup for "All Time" restore
    saveStock();
    rt();
  } catch(err){
    var cached=null;
    try{ cached=JSON.parse(localStorage.getItem('cambo_stock_v2')||'null'); }catch(_){}
    if(cached && cached.length){ S=cached.map(function(p){ return Object.assign({},p,{img:p.img||getLocalImg(p.name)||''}); }); rt(); notify('⚠️ Offline — showing cached data',false); }
    else { document.getElementById('tbody').innerHTML='<tr><td colspan="8" style="text-align:center;padding:24px;color:#fca5a5">❌ ទាញទិន្នន័យបរាជ័យ — '+err.message+'<br><small style="color:var(--muted)">សូម Enter ទិន្នន័យនៅ Google Sheets Stroke sheet ជាមុន</small></td></tr>';
      ['sTot','sIn','sLo','sOut'].forEach(function(id){ document.getElementById(id).textContent='0'; }); }
  }
}

var _skDate = { preset:'all', start:'', end:'', label:'All Time' };
function _pad2(n){ return String(n).padStart(2,'0'); }
function _ymd(d){ return d.getFullYear()+'-'+_pad2(d.getMonth()+1)+'-'+_pad2(d.getDate()); }
function _skGetPreset(p){
  var t=_ymd(new Date()), now=new Date(t+'T00:00:00');
  if(p==='today')     return {start:t,end:t,label:'ថ្ងៃនេះ'};
  if(p==='yesterday'){var y=new Date(now);y.setDate(y.getDate()-1);var ys=_ymd(y);return {start:ys,end:ys,label:'ម្សិលមិញ'};}
  if(p==='last7')    {var w=new Date(now);w.setDate(w.getDate()-6);return {start:_ymd(w),end:t,label:'Last 7 Days'};}
  if(p==='thisMonth'){var ms=new Date(now.getFullYear(),now.getMonth(),1),me=new Date(now.getFullYear(),now.getMonth()+1,0);return {start:_ymd(ms),end:_ymd(me),label:'This Month'};}
  if(p==='lastMonth'){var lm=new Date(now.getFullYear(),now.getMonth()-1,1),lme=new Date(now.getFullYear(),now.getMonth(),0);return {start:_ymd(lm),end:_ymd(lme),label:'Last Month'};}
  return {start:'',end:'',label:'All Time'};
}

var _sCurrent = []; // backup of current Stroke data
async function loadStockHistory(start, end){
  // Show loading
  var emptyMsg = '⏳ កំពុងទាញ StockHistory...';
  document.getElementById('tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--muted)">'+emptyMsg+'</td></tr>';
  var cardsEl=document.getElementById('stockCards');
  if(cardsEl) cardsEl.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted)">'+emptyMsg+'</div>';

  try {
    var url=APPS_SCRIPT_URL+'?action=stock_history';
    if(start) url+='&start='+start;
    if(end)   url+='&end='+end;
    var res=await fetch(url+'&_='+Date.now());
    var data=await res.json();
    if(!data.ok) throw new Error(data.message||'Load failed');

    // Map history rows → same format as S
    var hist=(data.history||[]).map(function(h,i){
      return {
        id:i+1, name:h.product||h.name||'',
        cat:h.type||h.cat||'-',
        box:Number(h.box)||0,
        pack:Number(h.pack)||0,
        bottles:Number(h.bottles)||Number(h.bottle)||0,
        qty:Number(h.box)||0,
        date:h.date||'',
        img:_imgCache[h.product||h.name]||''
      };
    });

    // Deduplicate: if multiple rows same product same date, keep latest
    var seen={};
    hist=hist.reverse().filter(function(h){
      var k=h.date+'|'+h.name;
      if(seen[k]) return false;
      seen[k]=true; return true;
    }).reverse();

    S=hist;
    rt();
    notify('📅 '+( hist.length ? hist.length+' ផលិតផល — '+start+(end&&end!==start?' → '+end:'') : 'គ្មានទិន្នន័យ'), hist.length>0);
  } catch(err){
    document.getElementById('tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:#fca5a5">❌ StockHistory: '+err.message+'</td></tr>';
    if(cardsEl) cardsEl.innerHTML='<div style="text-align:center;padding:32px;color:#fca5a5;font-size:13px">❌ '+err.message+'</div>';
  }
}
function matchesDateFilter(p){
  if(_skDate.preset==='all'&&!_skDate.start) return true;
  var lu=(p.lastUpdated||'').slice(0,10);
  if(!lu) return false;
  if(_skDate.start&&lu<_skDate.start) return false;
  if(_skDate.end  &&lu>_skDate.end)   return false;
  return true;
}

/* ── Edit Modal ── */
var _editId=null, _editDirty=false;
var _ePpb=0, _eBpp=0; // ratio vars: packPerBox, bottPerPack
function openEdit(id){
  var p=S.find(function(x){ return x.id===id; });
  if(!p) return;
  _editId=id;
  document.getElementById('eN').value    =p.name;
  document.getElementById('eCat').value  =p.cat;
  document.getElementById('eBox').value  =p.box||0;
  document.getElementById('ePack').value =p.pack||0;
  document.getElementById('eBott').value =p.bottles||0;
  document.getElementById('eQty').value  =p.box||0;
  // Resolve ratios: stored → DEFAULT_RATIOS → derive from current stock
  _ePpb=p.packPerBox||(p.box>0&&p.pack>0     ? Math.round(p.pack/p.box)     : 0);
  _eBpp=p.bottPerPack||(p.pack>0&&p.bottles>0 ? Math.round(p.bottles/p.pack) : 0);
  if(!_ePpb||!_eBpp){ var _defR=getDefaultRatio(p.name);
    if(_defR){ if(!_ePpb) _ePpb=_defR.ppb; if(!_eBpp) _eBpp=_defR.bpp; } }
  // Populate editable ratio fields
  document.getElementById('ePackPerBox').value  = _ePpb||0;
  document.getElementById('eBottPerPack').value = _eBpp||0;
  // Central recalculate: BOX × ratio → PACK → BOTT
  function recalcEdit(){
    var box=parseInt(document.getElementById('eBox').value)||0;
    var ppb=parseInt(document.getElementById('ePackPerBox').value)||0;
    var bpp=parseInt(document.getElementById('eBottPerPack').value)||0;
    _ePpb=ppb; _eBpp=bpp;
    document.getElementById('eQty').value=box;
    if(ppb){
      var pack=box*ppb;
      document.getElementById('ePack').value=pack;
      if(bpp) document.getElementById('eBott').value=pack*bpp;
    }
  }
  document.getElementById('eBox').oninput        = recalcEdit;
  document.getElementById('ePackPerBox').oninput = recalcEdit;
  // BottPerPack changes only recalc BOTT from current PACK (don't touch PACK)
  document.getElementById('eBottPerPack').oninput = function(){
    var pack=parseInt(document.getElementById('ePack').value)||0;
    var bpp=parseInt(this.value)||0;
    _eBpp=bpp;
    if(bpp) document.getElementById('eBott').value=pack*bpp;
  };
  var eImg=document.getElementById('eImg');
  var eImgPrev=document.getElementById('eImgPreview');
  var eModalImg=document.getElementById('eModalImg');
  // URL field: only user-set custom URL (not auto-detected)
  eImg.value=p.img||'';
  if(p.img){ eImgPrev.src=p.img; eImgPrev.style.display='block'; } else { eImgPrev.style.display='none'; }
  eImg.oninput=function(){
    if(eImg.value){ eImgPrev.src=eImg.value; eImgPrev.style.display='block'; } else { eImgPrev.style.display='none'; }
    eModalImg.src=eImg.value||autoSrc; eModalImg.style.display='block';
  };
  // Modal header image: auto-detected path (fallback chain same as table)
  var cf=getCatFolder(p.cat);
  var autoSrc=cf?('../images/products/'+cf+'/'+p.name+'.png'):'';
  var manualSrc=p.img||'';
  eModalImg.onerror=function(){ eModalImg.style.display='none'; };
  eModalImg.onload=function(){ eModalImg.style.display='block'; };
  eModalImg.src=manualSrc||autoSrc||getLocalImg(p.name)||'';
  if(!eModalImg.src){ eModalImg.style.display='none'; }
  var s=gs(p);
  var stBg   =s==='ok'?'rgba(16,185,129,.12)':s==='low'?'rgba(245,158,11,.12)':'rgba(239,68,68,.12)';
  var stColor=s==='ok'?'#86efac':s==='low'?'#fde68a':'#fca5a5';
  var stLabel=s==='ok'?'✅ In Stock':s==='low'?'⚠️ Low Stock':'🔴 Out of Stock';
  document.getElementById('editStockIndicator').innerHTML=
    '<span style="color:'+stColor+';font-weight:700">'+stLabel+'</span>'+
    '<span style="color:var(--muted);font-size:12px;margin-left:8px">BOX: '+p.box+'</span>';
  document.getElementById('editStockIndicator').style.background=stBg;
  _editDirty=false;
  document.getElementById('editOverlay').classList.add('open');
}

  try {
    var res=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'stroke_delete',name:name})});
    var r=await res.json();
    notify(r.ok?'🗑 លុបរួចរាល់!':'⚠️ '+(r.message||'Delete failed'), r.ok);
  } catch(e){ notify('⚠️ Offline — deleted locally only',false); }
}

/* ── Add Modal ── */
function openAddModal(){
  ['aN','aImg'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('aCat').selectedIndex=0;
  ['aBox','aPackPerBox','aPack','aBottPerPack','aBott','aQty'].forEach(function(id){ document.getElementById(id).value=0; });
  // Auto-calc when BOX changes
  document.getElementById('aBox').oninput=function(){
    var box=parseInt(this.value)||0;
    var ppb=parseInt(document.getElementById('aPackPerBox').value)||0;
    var bpp=parseInt(document.getElementById('aBottPerPack').value)||0;
    document.getElementById('aQty').value=box;
    if(ppb){var pack=box*ppb; document.getElementById('aPack').value=pack;
      if(bpp) document.getElementById('aBott').value=pack*bpp;}
  };
  // Auto-calc when ratio fields change
  document.getElementById('aPackPerBox').oninput=function(){
    var box=parseInt(document.getElementById('aBox').value)||0;
    var ppb=parseInt(this.value)||0;
    var bpp=parseInt(document.getElementById('aBottPerPack').value)||0;
    if(ppb){var pack=box*ppb; document.getElementById('aPack').value=pack;
      if(bpp) document.getElementById('aBott').value=pack*bpp;}
  };
  document.getElementById('aBottPerPack').oninput=function(){
    var pack=parseInt(document.getElementById('aPack').value)||0;
    var bpp=parseInt(this.value)||0;
    if(bpp) document.getElementById('aBott').value=pack*bpp;
  };
  document.getElementById('addOverlay').classList.add('open');
}
function closeAdd(e){
  if(e && e.target!==document.getElementById('addOverlay')) return;
  document.getElementById('addOverlay').classList.remove('open');
}
async function saveAdd(){
  var name=document.getElementById('aN').value.trim();
  if(!name){ notify('⚠️ សូមបញ្ចូលឈ្មោះផលិតផល',false); return; }
  var aBox    =parseInt(document.getElementById('aBox').value)||0;
  var aPpb    =parseInt(document.getElementById('aPackPerBox').value)||0;
  var aBpp    =parseInt(document.getElementById('aBottPerPack').value)||0;
  var aRatio  =aBpp?'1 ឈុត = '+aBpp+' ដបប្រអប់':'';
  var d={
    product:name, type:document.getElementById('aCat').value.trim()||'-',
    box:aBox,
    pack:parseInt(document.getElementById('aPack').value)||0,
    bottles:parseInt(document.getElementById('aBott').value)||0,
    qty:aBox, packPerBox:aPpb, ratio:aRatio,
    img:document.getElementById('aImg').value.trim()
  };
  var newId=(S.length?Math.max.apply(null,S.map(function(x){return x.id;}))+1:1);
  S.push({id:newId,name:d.product,cat:d.type,box:d.box,pack:d.pack,bottles:d.bottles,qty:d.qty,
          packPerBox:aPpb,bottPerPack:aBpp,img:d.img,lastUpdated:new Date().toISOString()});
  if(d.img){ _imgCache[d.product]=d.img; saveImgCache(); }
  document.getElementById('addOverlay').classList.remove('open');
  rt(); saveStock(); updateDateBadges();
  try {
    var res=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'stroke_add',data:d})});
    var r=await res.json();
    notify(r.ok?'✅ បន្ថែមរួចរាល់!':'⚠️ '+(r.message||'Add failed'), r.ok);
  } catch(e){ notify('⚠️ Offline — added locally only',false); }
}

    editModal.addEventListener('change',function(){ _editDirty=true; });

});
