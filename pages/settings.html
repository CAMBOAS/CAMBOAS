  <script>(function(){var r=localStorage.getItem('cambo_login_required');if(r==='false')return;var k='cambo_session';if(sessionStorage.getItem(k)==='1'||localStorage.getItem(k)==='1')return;document.documentElement.style.visibility='hidden';location.replace('../login.html');})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script><title>Settings - CAMBO MINI</title><link rel="icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png"><link rel="shortcut icon" type="image/png" href="../images/logo/LOGO%20CAMBOMINI.png"><link rel="apple-touch-icon" href="../images/logo/LOGO%20CAMBOMINI.png"><link rel="stylesheet" href="../assets/css/templatemo-glass-admin-style.css?v=160"><link rel="stylesheet" href="../assets/css/main.css?v=160"><style>
.st-wrap{display:grid;gap:18px;max-width:860px}
.st-card{padding:24px 26px;border-radius:24px}
.st-card h2{margin:0 0 4px;color:var(--text);font-size:20px}
.st-card h3{margin:0 0 6px;color:var(--text);font-size:16px}
.st-card p{margin:0;color:var(--muted);font-size:13px}
.guard-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px;border-radius:16px;border:1px solid rgba(148,163,200,.14);background:rgba(255,255,255,.04);margin:18px 0 0}
[data-theme="light"] .guard-toggle-row{background:rgba(99,102,241,.03);border-color:rgba(99,102,241,.12)}
.guard-toggle-info strong{display:block;color:var(--text);font-size:14px;font-weight:700;margin-bottom:2px}
.guard-toggle-info span{color:var(--muted);font-size:12px}
.guard-big-toggle{position:relative;width:56px;height:28px;flex-shrink:0;cursor:pointer}
.guard-big-toggle input{opacity:0;width:0;height:0;position:absolute}
.guard-big-toggle-track{position:absolute;inset:0;border-radius:999px;background:rgba(148,163,200,.25);transition:background .25s;border:1px solid rgba(148,163,200,.2)}
.guard-big-toggle input:checked~.guard-big-toggle-track{background:#8b5cf6;border-color:#7c3aed}
.guard-big-toggle-thumb{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .25s}
.guard-big-toggle input:checked~.guard-big-toggle-thumb{transform:translateX(28px)}
.st-divider{height:1px;background:rgba(148,163,200,.1);margin:18px 0}
[data-theme="light"] .st-divider{background:rgba(99,102,241,.08)}
.st-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
.st-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.st-field input{width:100%;height:40px;padding:0 12px;border-radius:12px;border:1px solid rgba(148,163,200,.2);background:rgba(255,255,255,.05);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;transition:border-color .15s}
.st-field input:focus{border-color:rgba(139,92,246,.5)}
[data-theme="light"] .st-field input{background:#fff;border-color:rgba(99,102,241,.18)}
.st-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center}
.st-btn{height:40px;padding:0 20px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,opacity .15s}
.st-btn-primary{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
.st-btn-primary:hover{opacity:.88}
.st-btn-secondary{background:rgba(148,163,200,.12);color:var(--text);border:1px solid rgba(148,163,200,.2)}
.st-btn-secondary:hover{background:rgba(148,163,200,.2)}
.st-toast{display:none;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#86efac}
.st-toast.show{display:flex}
.st-status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;margin-top:14px}
.st-status-badge.on{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);color:#c4b5fd}
.st-status-badge.off{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2);color:#94a3b8}
.st-status-dot{width:7px;height:7px;border-radius:50%}
.st-status-badge.on .st-status-dot{background:#8b5cf6}
.st-status-badge.off .st-status-dot{background:#94a3b8}
.st-creds-section{margin-top:18px}
.st-creds-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
@media(max-width:600px){.st-fields{grid-template-columns:1fr}}
</style></head><body>
<div class="background"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="dashboard">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sharedSidebar"></aside>
  <main class="main-content">
    <div class="shared-topbar" id="sharedHeader"></div>
    <div class="st-wrap">

      <!-- Header -->
      <section class="glass-card st-card">
        <h2>Settings</h2>
        <p>ការកំណត់ប្រព័ន្ធ CAMBO MINI</p>
      </section>

      <!-- Login Guard -->
      <section class="glass-card st-card">
        <h3>🔐 Access Control</h3>
        <p>ON = ត្រូវ Login ជាមុន (Locked) ⟶ OFF = ចូល App បានដោយសេរី</p>

        <div class="guard-toggle-row">
          <div class="guard-toggle-info">
            <strong>Public Access</strong>
            <span id="guardStatusText">OFF — ត្រូវ Login ជាមុន</span>
          </div>
          <label class="guard-big-toggle" title="Toggle Access">
            <input type="checkbox" id="guardToggle">
            <div class="guard-big-toggle-track"></div>
            <div class="guard-big-toggle-thumb"></div>
          </label>
        </div>

        <div id="guardStatusBadge" class="st-status-badge off">
          <span class="st-status-dot"></span>
          <span id="guardBadgeLabel">Access: Locked</span>
        </div>

        <!-- Admin Credentials (always shown) -->
        <div class="st-creds-section">
          <div class="st-divider"></div>
          <div class="st-creds-title">🔑 Admin Credentials</div>
          <div class="st-fields">
            <div class="st-field">
              <label>Account</label>
              <input type="text" id="guardAccount" placeholder="Account" autocomplete="off">
            </div>
            <div class="st-field">
              <label>Password</label>
              <input type="password" id="guardPassword" placeholder="••••••••" autocomplete="new-password">
            </div>
          </div>
        </div>

        <!-- Confirm identity before save -->
        <div class="st-creds-section">
          <div class="st-divider"></div>
          <div class="st-creds-title">✅ Confirm Identity មុន Save</div>
          <div class="st-fields">
            <div class="st-field">
              <label>Account</label>
              <input type="text" id="confirmAccount" placeholder="Account" autocomplete="off">
            </div>
            <div class="st-field">
              <label>Password</label>
              <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
          </div>
          <p id="confirmError" style="display:none;margin-top:8px;font-size:12px;color:#fca5a5"></p>
        </div>

        <div class="st-actions">
          <button class="st-btn st-btn-primary" id="guardSaveBtn" type="button">រក្សាទុក Settings</button>
          <span class="st-toast" id="guardToast">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            Saved!
          </span>
        </div>
      </section>

      <!-- Logout Section -->
      <section class="glass-card st-card">
        <h3>🚪 Session</h3>
        <p>ចាកចេញពី session បច្ចុប្បន្ន</p>
        <div class="st-actions" style="margin-top:14px">
          <button class="st-btn st-btn-secondary" id="logoutBtn" type="button">Logout</button>
        </div>
      </section>

    </div>
  </main>
</div>

<script src="../assets/js/cambo-api.js?v=160"></script>
<script src="../assets/js/auth.js?v=160"></script>
<script src="../assets/js/layout.js?v=160"></script>
<script src="../assets/js/dashboard-layout.js?v=160"></script>
<script>
(function(){
  var toggle      = document.getElementById('guardToggle');
  var statusTx    = document.getElementById('guardStatusText');
  var badge       = document.getElementById('guardStatusBadge');
  var badgeLbl    = document.getElementById('guardBadgeLabel');
  var accInp      = document.getElementById('guardAccount');
  var passInp     = document.getElementById('guardPassword');
  var confirmAcct = document.getElementById('confirmAccount');
  var confirmPass = document.getElementById('confirmPassword');
  var confirmErr  = document.getElementById('confirmError');
  var saveBtn     = document.getElementById('guardSaveBtn');
  var toast       = document.getElementById('guardToast');

  // ON = locked (require login) | OFF = free access
  function updateUI(locked) {
    statusTx.textContent = locked ? 'ON — ត្រូវ Login ជាមុន (Locked)' : 'OFF — ចូល App បានដោយសេរី';
    badge.className = 'st-status-badge ' + (locked ? 'off' : 'on');
    badgeLbl.textContent = locked ? 'Access: Locked' : 'Access: Open';
  }

  function applySettings(cfg) {
    var locked = cfg.login_required === 'true';
    window.CamboAuth.setLoginRequired(locked);
    if (cfg.admin_account) window.CamboAuth.saveCredentials(cfg.admin_account, cfg.admin_password || '');
    toggle.checked = locked; // ON = locked
    updateUI(locked);
    if (cfg.admin_account)  accInp.value  = cfg.admin_account;
    if (cfg.admin_password) passInp.value = cfg.admin_password;
  }

  function loadFromLocal() {
    var locked = window.CamboAuth && window.CamboAuth.isLoginRequired();
    toggle.checked = locked; // ON = locked
    updateUI(locked);
    if (window.CamboAuth) {
      var creds = window.CamboAuth.getCredentials();
      if (creds.account)  accInp.value  = creds.account;
      if (creds.password) passInp.value = creds.password;
    }
  }

  // Load from Sheet first, fall back to localStorage
  if (window.CamboAPI) {
    saveBtn.disabled = true;
    window.CamboAPI.get({ action: 'get_settings' })
      .then(function(r) {
        if (r && r.success && r.data) applySettings(r.data);
        else loadFromLocal();
      })
      .catch(function() { loadFromLocal(); })
      .finally(function() { saveBtn.disabled = false; });
  } else {
    loadFromLocal();
  }

  toggle.addEventListener('change', function() { updateUI(toggle.checked); }); // checked = locked

  saveBtn.addEventListener('click', function() {
    var cAcct = confirmAcct.value.trim();
    var cPass = confirmPassword.value;
    confirmErr.style.display = 'none';

    if (!cAcct || !cPass) {
      confirmErr.textContent = 'សូមបញ្ចូល Account និង Password ដើម្បី Confirm';
      confirmErr.style.display = 'block';
      return;
    }

    saveBtn.disabled = true;
    window.CamboAuth.verify(cAcct, cPass).then(function(ok) {
      if (!ok) {
        confirmErr.textContent = 'Account ឬ Password មិនត្រូវ';
        confirmErr.style.display = 'block';
        saveBtn.disabled = false;
        return;
      }

      // Verified — save
      var locked  = toggle.checked; // ON = locked
      var account = accInp.value.trim();
      var pass    = passInp.value;

      window.CamboAuth.setLoginRequired(locked);
      if (account) window.CamboAuth.saveCredentials(account, pass);
      // Reset sync TTL so next page load re-syncs immediately
      localStorage.removeItem('cambo_settings_sync');

      // Sync to Sheet
      if (window.CamboAPI) {
        var params = { action: 'save_settings', login_required: locked ? 'true' : 'false' };
        if (account) { params.admin_account = account; params.admin_password = pass; }
        window.CamboAPI.get(params).catch(function(){}).finally(function(){ saveBtn.disabled = false; });
      } else {
        saveBtn.disabled = false;
      }

      // Clear confirm fields
      confirmAcct.value = '';
      confirmPassword.value = '';
      toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, 2500);
    }).catch(function() {
      confirmErr.textContent = 'Error — Check Connection';
      confirmErr.style.display = 'block';
      saveBtn.disabled = false;
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', function(){
    if (window.CamboAuth) window.CamboAuth.logout();
    location.href = '../login.html';
  });
})();
</script>
<script src="../assets/js/sw-register.js?v=160"></script>
</body></html>
